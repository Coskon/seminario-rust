 == nombre.to_lowercase() {\n                return Some(i)\n            }\n            i += 1;\n        }\n        None\n    }\n\n    pub fn eliminar_cancion(\u0026mut self, nombre: \u0026str) -\u003e bool {\n        if let Some(index) = self.buscar_indice_cancion(nombre) {\n            self.canciones.remove(index);\n            true\n        } else {\n            false\n        }\n    }\n\n    pub fn mover_cancion(\u0026mut self, nombre: \u0026str, index: usize) -\u003e bool {\n        if index \u003e= self.canciones.len() {\n            return false\n        }\n        if let Some(prev) = self.buscar_indice_cancion(nombre) {\n            if prev == index {\n                return true\n            }\n            let cancion = self.canciones.remove(prev);\n            self.canciones.insert(index, cancion);\n            true\n        } else {\n            false\n        }\n    }\n\n    pub fn buscar_cancion(\u0026self, nombre: \u0026str) -\u003e Option\u003c\u0026Cancion\u003e {\n        let nom = nombre.to_lowercase().to_string();\n        for cancion in \u0026self.canciones {\n            if cancion.titulo.to_lowercase() == nom {\n                return Some(cancion);\n            }\n        }\n        None\n    }\n\n    pub fn canciones_de_genero(\u0026self, genero: Genero) -\u003e Vec\u003cCancion\u003e {\n        let mut lista = vec![];\n        for cancion in \u0026self.canciones {\n            if cancion.genero.equals(\u0026genero) {\n                lista.push(cancion.clone());\n            }\n        }\n        lista\n    }\n\n    pub fn canciones_de_artista(\u0026self, artista: \u0026str) -\u003e Vec\u003cCancion\u003e {\n        let mut lista = vec![];\n        let art = artista.to_lowercase();\n        for cancion in \u0026self.canciones {\n            if cancion.artista.as_str().to_lowercase() == art {\n                lista.push(cancion.clone());\n            }\n        }\n        lista\n    }\n\n    pub fn modificar_titulo(\u0026mut self, titulo: \u0026str) {\n        self.nombre = titulo.to_string();\n    }\n\n    pub fn borrar_canciones(\u0026mut self) {\n        self.canciones.clear();\n    }\n\n    pub fn len(\u0026self) -\u003e usize {\n        self.canciones.len()\n    }\n}\n\n\n#[test]\nfn test_playlist_agregar_cancion() {\n    let mut p = Playlist::new(\"playlist1\", vec![]);\n    assert_eq!(p.canciones.len(), 0);\n    p.agregar_cancion(Cancion::new(\"Smooth Criminal\", \"Michael Jackson\", Genero::POP));\n    assert_eq!(p.canciones.len(), 1);\n    p.agregar_cancion(Cancion::new(\"\", \"\", Genero::OTROS));\n    assert_eq!(p.canciones.len(), 2);\n    p.agregar_cancion(Cancion::new(\"The Show Must Go On\", \"Queen\", Genero::ROCK));\n    assert_eq!(p.canciones.len(), 3);\n    assert_eq!(p.canciones[2].titulo, \"The Show Must Go On\".to_string());\n}\n\n#[test]\nfn test_playlist_eliminar_cancion() {\n    let mut p = Playlist::new(\"playlist1\", vec![\n        Cancion::new(\"Smooth Criminal\", \"Michael Jackson\", Genero::POP),\n        Cancion::new(\"Nothing else Matters\", \"Metallica\", Genero::OTROS),\n        Cancion::new(\"Nothing else Matters\", \"Metallica\", Genero::OTROS),\n        Cancion::new(\"The Show Must Go On\", \"Queen\", Genero::ROCK)\n    ]);\n    assert!(p.eliminar_cancion(\"Smooth Criminal\"));\n    assert!(!p.eliminar_cancion(\"Smooth Criminal\"));\n    assert!(!p.eliminar_cancion(\"Beat It\"));\n    assert_eq!(p.canciones.len(), 3);\n    assert!(p.eliminar_cancion(\"nothing else matters\")); \n    assert_eq!(p.canciones.len(), 2); // borrar cancion repetida solo borra 1\n    // checkear que preserva el orden (importante en playlist)\n    assert_eq!(p.canciones[0].titulo, \"Nothing else Matters\".to_string());\n    assert_eq!(p.canciones[1].titulo, \"The Show Must Go On\".to_string());\n}\n\n#[test]\nfn test_playlist_mover_cancion() {\n    let mut p = Playlist::new(\"playlist1\", vec![\n        Cancion::new(\"Smooth Criminal\", \"Michael Jackson\", Genero::POP),\n        Cancion::new(\"Nothing else Matters\", \"Metallica\", Genero::OTROS),\n        Cancion::new(\"The Show Must Go On\", \"Queen\", Genero::ROCK),\n        Cancion::new(\"Eye of the Tiger\", \"Survivor\", Genero::ROCK)\n    ]);\n    vec![\n        Cancion::new(\"Smooth Criminal\", \"Michael Jackson\", Genero::POP),\n        Cancion::new(\"Nothing else Matters\", \"Metallica\", Genero::OTROS),\n        Cancion::new(\"The Show Must Go On\", \"Queen\", Genero::ROCK),\n        Cancion::new(\"Eye of the Tiger\", \"Survivor\", Genero::ROCK)\n    ];\n    assert_eq!(p.canciones.len(), 4);\n    assert_eq!(p.canciones[0].titulo, \"Smooth Criminal\".to_string());\n    assert!(p.mover_cancion(\"Smooth Criminal\", 0)); // mover al mismo lugar no cambia nada\n    assert_eq!(p.canciones[0].titulo, \"Smooth Criminal\".to_string());\n    assert!(p.mover_cancion(\"Smooth Criminal\", 3)); // nothing, show, eye, smooth\n    assert_eq!(p.canciones[0].titulo, \"Nothing else Matters\".to_string());\n    assert_eq!(p.canciones[1].titulo, \"The Show Must Go On\".to_string());\n    assert_eq!(p.canciones[2].titulo, \"Eye of the Tiger\".to_string());\n    assert_eq!(p.canciones[3].titulo, \"Smooth Criminal\".to_string());\n    assert!(p.mover_cancion(\"Eye of the Tiger\", 0)); // eye, nothing, show, smooth\n    assert_eq!(p.canciones[0].titulo, \"Eye of the Tiger\".to_string());\n    assert_eq!(p.canciones[2].titulo, \"The Show Must Go On\".to_string());\n    assert!(p.mover_cancion(\"Smooth Criminal\", 1)); // eye, smooth, nothing, show\n    assert_eq!(p.canciones[1].titulo, \"Smooth Criminal\".to_string());\n    assert_eq!(p.canciones[3].titulo, \"The Show Must Go On\".to_string());\n    assert!(!p.mover_cancion(\"Smooth Criminal\", 10)); // tratar de mover a posicion invalida\n    assert!(!p.mover_cancion(\"Beat It\", 1)); // tratar de mover cancion inexistente\n}\n\n#[test]\nfn test_playlist_buscar_cancion() {\n    let p = Playlist::new(\"playlist1\", vec![\n        Cancion::new(\"Smooth Criminal\", \"Michael Jackson\", Genero::POP),\n        Cancion::new(\"Nothing else Matters\", \"Metallica\", Genero::OTROS),\n        Cancion::new(\"The Show Must Go On\", \"Queen\", Genero::ROCK),\n        Cancion::new(\"Eye of the Tiger\", \"Survivor\", Genero::ROCK),\n        Cancion::new(\"Without Me\", \"Eminem\", Genero::RAP)\n    ]);\n    assert!(p.buscar_cancion(\"Smooth Criminal\").unwrap().equals(\u0026Cancion::new(\"Smooth Criminal\", \"Michael Jackson\", Genero::POP)));\n    assert!(p.buscar_cancion(\"Eye of the Tiger\").unwrap().equals(\u0026Cancion::new(\"Eye of the Tiger\", \"Survivor\", Genero::ROCK)));\n    assert!(p.buscar_cancion(\"nothing else matters\").unwrap().equals(\u0026Cancion::new(\"Nothing else Matters\", \"Metallica\", Genero::OTROS))); // no importan las mayusculas\n    assert!(p.buscar_cancion(\"without me\").unwrap().equals(\u0026Cancion::new(\"Without Me\", \"Eminem\", Genero::RAP)));\n    assert!(p.buscar_cancion(\"Beat It\").is_none());\n    assert!(p.buscar_cancion(\"\").is_none());\n}\n\n#[test]\nfn test_playlist_canciones_genero() {\n    let p = Playlist::new(\"playlist1\", vec![\n        Cancion::new(\"Smooth Criminal\", \"Michael Jackson\", Genero::POP),\n        Cancion::new(\"Nothing else Matters\", \"Metallica\", Genero::OTROS),\n        Cancion::new(\"The Show Must Go On\", \"Queen\", Genero::ROCK),\n        Cancion::new(\"Eye of the Tiger\", \"Survivor\", Genero::ROCK)\n    ]);\n    let rock = p.canciones_de_genero(Genero::ROCK);\n    assert_eq!(rock.len(), 2);\n    assert!(rock[0].equals(\u0026Cancion::new(\"The Show Must Go On\", \"Queen\", Genero::ROCK)));\n    \n    assert_eq!(p.canciones_de_genero(Genero::OTROS).len(), 1);\n    assert_eq!(p.canciones_de_genero(Genero::JAZZ).len(), 0);\n}\n\n#[test]\nfn test_playlist_canciones_artista() {\n    let p = Playlist::new(\"playlist1\", vec![\n        Cancion::new(\"Master of Puppets\", \"Metallica\", Genero::OTROS),\n        Cancion::new(\"Nothing else Matters\", \"Metallica\", Genero::OTROS),\n        Cancion::new(\"Bohemian Rhapsody\", \"Queen\", Genero::ROCK),\n        Cancion::new(\"Burden\", \"Opeth\", Genero::OTROS)\n    ]);\n    let metallica = p.canciones_de_artista(\"Metallica\");\n    assert_eq!(metallica.len(), 2);\n    assert!(metallica[1].equals(\u0026Cancion::new(\"Nothing else Matters\", \"Metallica\", Genero::OTROS)));\n    assert_eq!(p.canciones_de_artista(\"opeth\").len(), 1);\n    assert_eq!(p.canciones_de_artista(\"MICHAEL JACKSON\").len(), 0);\n}\n\n#[test]\nfn test_playlist_modificar_titulo() {\n    let mut p = Playlist::new(\"mi playlist\", vec![]);\n    assert_eq!(p.nombre.as_str(), \"mi playlist\");\n    p.modificar_titulo(\"otra playlist\");\n    assert_eq!(p.nombre.as_str(), \"otra playlist\");\n}\n\n#[test]\nfn test_playlist_borrar_canciones() {\n    let mut p = Playlist::new(\"playlist1\", vec![\n        Cancion::new(\"Master of Puppets\", \"Metallica\", Genero::OTROS),\n        Cancion::new(\"Nothing else Matters\", \"Metallica\", Genero::OTROS),\n        Cancion::new(\"Bohemian Rhapsody\", \"Queen\", Genero::ROCK),\n        Cancion::new(\"Burden\", \"Opeth\", Genero::OTROS)\n    ]);\n    assert_eq!(p.len(), 4);\n    p.borrar_canciones();\n    assert_eq!(p.len(), 0);\n}","traces":[{"line":8,"address":[976320,976364],"length":1,"stats":{"Line":1}},{"line":9,"address":[976371,976335],"length":1,"stats":{"Line":3}},{"line":10,"address":[976446,976479],"length":1,"stats":{"Line":1}},{"line":11,"address":[976486,976465],"length":1,"stats":{"Line":2}},{"line":12,"address":[976472],"length":1,"stats":{"Line":1}},{"line":13,"address":[976453],"length":1,"stats":{"Line":1}},{"line":26,"address":[976701,976707,976496],"length":1,"stats":{"Line":3}},{"line":27,"address":[976562],"length":1,"stats":{"Line":3}},{"line":30,"address":[976720],"length":1,"stats":{"Line":1}},{"line":31,"address":[976743],"length":1,"stats":{"Line":1}},{"line":41,"address":[979637,979472],"length":1,"stats":{"Line":1}},{"line":42,"address":[979553,97950  new(nombre: \u0026str, direccion: \u0026str, telefono: \u0026str) -\u003e Self {\n        Persona { nombre: nombre.to_string(), direccion: direccion.to_string(), telefono: telefono.to_string() }\n    }\n}\n\n#[derive(Debug, Clone)]\npub struct Mascota {\n    pub nombre: String,\n    pub edad: u32,\n    pub tipo: Animal,\n    pub duenio: Persona\n}\n\nimpl Mascota {\n    pub fn new(nombre: \u0026str, edad: u32, tipo: Animal, duenio: Persona) -\u003e Self {\n        Mascota { nombre: nombre.to_string(), edad, tipo, duenio }\n    }\n\n    pub fn equals_reducido(\u0026self, other_nombre: \u0026str, other_nombre_duenio: \u0026str, other_telefono: \u0026str) -\u003e bool {\n        self.nombre.as_str() == other_nombre \u0026\u0026\n        self.duenio.nombre.as_str() == other_nombre_duenio \u0026\u0026\n        self.duenio.telefono.as_str() == other_telefono\n    }\n}\n\n#[derive(Debug, Clone)]\npub struct Atencion {\n    pub mascota: Mascota,\n    pub diagnostico: String,\n    pub tratamiento: String,\n    pub proxima_visita: Option\u003cFecha\u003e\n}\n\nimpl Atencion {\n    pub fn new(mascota: Mascota, diagnostico: \u0026str, tratamiento: \u0026str, proxima_visita: Option\u003cFecha\u003e) -\u003e Self {\n        Atencion { mascota, diagnostico: diagnostico.to_string(), tratamiento: tratamiento.to_string(), proxima_visita }\n    }\n\n    pub fn equals_reducido(\u0026self, nombre_mascota: \u0026str, nombre_duenio: \u0026str, telefono: \u0026str ) -\u003e bool {\n        self.mascota.nombre.as_str() == nombre_mascota \u0026\u0026\n        self.mascota.duenio.nombre.as_str() == nombre_duenio \u0026\u0026\n        self.mascota.duenio.telefono.as_str() == telefono\n    }\n}\n\n#[derive(Debug)]\npub struct Veterinaria {\n    pub nombre: String,\n    pub direccion: String,\n    pub id: u64,\n    pub cola_atencion: VecDeque\u003cMascota\u003e,\n    pub registro_atenciones: Vec\u003cAtencion\u003e\n}\n\nimpl Veterinaria {\n    pub fn new(nombre: \u0026str, direccion: \u0026str, id: u64) -\u003e Self {\n        Veterinaria { nombre: nombre.to_string(), direccion: direccion.to_string(), id, cola_atencion: VecDeque::new(), registro_atenciones: vec![] }\n    }\n\n    pub fn agregar_mascota(\u0026mut self, mascota: Mascota) {\n        self.cola_atencion.push_back(mascota);\n    }\n\n    pub fn agregar_mascota_prioritaria(\u0026mut self, mascota: Mascota) {\n        self.cola_atencion.push_front(mascota);\n    }\n\n    pub fn atender_mascota(\u0026mut self) -\u003e Option\u003cMascota\u003e {\n        self.cola_atencion.pop_front()\n    }\n\n    pub fn eliminar_mascota(\u0026mut self, nombre_mascota: \u0026str, nombre_duenio: \u0026str, telefono: \u0026str) -\u003e bool {\n        if let Some(index) = self.cola_atencion.iter().position(|x| x.equals_reducido(nombre_mascota, nombre_duenio, telefono)) {\n            self.cola_atencion.remove(index);\n            true\n        } else {\n            false\n        }\n    }\n\n    pub fn registrar_atencion(\u0026mut self, atencion: Atencion) {\n        self.registro_atenciones.push(atencion);\n    }\n\n    pub fn buscar_atencion(\u0026self, nombre_mascota: \u0026str, nombre_duenio: \u0026str, telefono: \u0026str) -\u003e Option\u003c\u0026Atencion\u003e {\n        for a in \u0026self.registro_atenciones {\n            if a.equals_reducido(nombre_mascota, nombre_duenio, telefono) {\n                return Some(a);\n            }\n        }\n        None\n    }\n\n    pub fn modificar_diagnostico(\u0026mut self, nombre_mascota: \u0026str, nombre_duenio: \u0026str, telefono: \u0026str, nuevo_diagnostico: \u0026str) -\u003e bool {\n        for a in self.registro_atenciones.iter_mut() {\n            if a.equals_reducido(nombre_mascota, nombre_duenio, telefono) {\n                a.diagnostico = nuevo_diagnostico.to_string();\n                return true;\n            }\n        }\n        false\n    }\n\n    pub fn modificar_proxima_visita(\u0026mut self, nombre_mascota: \u0026str, nombre_duenio: \u0026str, telefono: \u0026str, nueva_fecha: Option\u003cFecha\u003e) -\u003e bool {\n        for a in self.registro_atenciones.iter_mut() {\n            if a.equals_reducido(nombre_mascota, nombre_duenio, telefono) {\n                a.proxima_visita = nueva_fecha;\n                return true;\n            }\n        }\n        false\n    }\n\n    pub fn eliminar_atencion(\u0026mut self, nombre_mascota: \u0026str, nombre_duenio: \u0026str, telefono: \u0026str) -\u003e bool {\n        let mut index = 0;\n        for a in self.registro_atenciones.iter_mut() {\n            if a.equals_reducido(nombre_mascota, nombre_duenio, telefono) {\n                self.registro_atenciones.remove(index);\n                return true;\n            }\n            index += 1;\n        }\n        false\n    }\n}\n\n#[test]\nfn test_veterinaria_agregar_mascota() {\n    let mut v = Veterinaria::new(\"Veterinaria1\", \"Centenario\", 4839243274392);\n    v.agregar_mascota(Mascota::new(\"Bola\", 7, Animal::GATO, \n        Persona::new(\"Pedro\", \"6 y 50\", \"221 123-4567\")));\n    v.agregar_mascota(Mascota::new(\"Micky\", 4, Animal::PERRO, \n        Persona::new(\"Carlos\", \"1 y 44\", \"221 891-0111\")));\n    assert_eq!(v.cola_atencion.len(), 2);\n    assert_eq!(v.cola_atencion[0].nombre, \"Bola\".to_string());\n    assert!(v.cola_atencion[0].tipo.equals(\u0026Animal::GATO));\n    assert_eq!(v.cola_atencion[1].nombre, \"Micky\".to_string());\n    assert!(v.cola_atencion[1].tipo.equals(\u0026Animal::PERRO));\n}\n\n#[test]\nfn test_animal_equals() {\n    assert!(Animal::GATO.equals(\u0026Animal::GATO));\n    assert!(Animal::PERRO.equals(\u0026Animal::PERRO));\n    assert!(Animal::CABALLO.equals(\u0026Animal::CABALLO));\n    assert!(Animal::OTRO.equals(\u0026Animal::OTRO));\n    assert!(!Animal::GATO.equals(\u0026Animal::OTRO));\n    assert!(!Animal::OTRO.equals(\u0026Animal::GATO));\n}\n\n#[test]\nfn test_veterinaria_agregar_mascota_prioritaria() {\n    let mut v = Veterinaria::new(\"Veterinaria1\", \"Centenario\", 4839243274392);\n    v.agregar_mascota_prioritaria(Mascota::new(\"Bola\", 7, Animal::GATO, \n        Persona::new(\"Pedro\", \"6 y 50\", \"221 123-4567\")));\n    v.agregar_mascota_prioritaria(Mascota::new(\"Micky\", 4, Animal::PERRO, \n        Persona::new(\"Carlos\", \"1 y 44\", \"221 891-0111\")));\n    assert_eq!(v.cola_atencion.len(), 2);\n    assert_eq!(v.cola_atencion[0].nombre, \"Micky\".to_string());\n    assert!(v.cola_atencion[0].tipo.equals(\u0026Animal::PERRO));\n    assert_eq!(v.cola_atencion[1].nombre, \"Bola\".to_string());\n    assert!(v.cola_atencion[1].tipo.equals(\u0026Animal::GATO));\n}\n\n#[test]\nfn test_veterinaria_atender_mascota() {\n    let mut v = Veterinaria::new(\"Veterinaria1\", \"Centenario\", 4839243274392);\n    v.agregar_mascota(Mascota::new(\"Bola\", 7, Animal::GATO, \n        Persona::new(\"Pedro\", \"6 y 50\", \"221 123-4567\")));\n    v.agregar_mascota(Mascota::new(\"Micky\", 4, Animal::PERRO, \n        Persona::new(\"Carlos\", \"1 y 44\", \"221 891-0111\")));\n\n    let m1 = v.atender_mascota();\n    assert!(m1.is_some());\n    assert_eq!(m1.unwrap().nombre, \"Bola\".to_string());\n\n    let m2 = v.atender_mascota();\n    assert!(m2.is_some());\n    assert_eq!(m2.unwrap().nombre, \"Micky\".to_string());\n\n    assert_eq!(v.cola_atencion.len(), 0);\n\n    let mn = v.atender_mascota();\n    assert!(mn.is_none());\n}\n\n#[test]\nfn test_veterinaria_eliminar_mascota() {\n    let mut v = Veterinaria::new(\"Veterinaria1\", \"Centenario\", 4839243274392);\n    v.agregar_mascota(Mascota::new(\"Bola\", 7, Animal::GATO, \n        Persona::new(\"Pedro\", \"6 y 50\", \"221 123-4567\")));\n    v.agregar_mascota(Mascota::new(\"Micky\", 4, Animal::PERRO, \n        Persona::new(\"Carlos\", \"1 y 44\", \"221 891-0111\")));\n    assert_eq!(v.cola_atencion.len(), 2);\n\n    assert!(v.eliminar_mascota(\"Bola\", \"Pedro\", \"221 123-4567\"));\n    assert_eq!(v.cola_atencion.len(), 1);\n    assert!(!v.eliminar_mascota(\"Bola\", \"Pedro\", \"221 123-4567\"));\n    assert_eq!(v.cola_atencion.len(), 1);\n    assert!(!v.eliminar_mascota(\"Micky\", \"Pedro\", \"221 891-0111\")); // dueño distinto\n    assert_eq!(v.cola_atencion.len(), 1);\n    assert!(v.eliminar_mascota(\"Micky\", \"Carlos\", \"221 891-0111\"));\n    assert_eq!(v.cola_atencion.len(), 0);\n    assert!(!v.eliminar_mascota(\"\", \"\", \"\"));\n    assert_eq!(v.cola_atencion.len(), 0);\n}\n\n#[test]\nfn test_veterinaria_registrar_atencion() {\n    let mut v = Veterinaria::new(\"Veterinaria1\", \"Centenario\", 4839243274392);\n    v.registrar_atencion(Atencion::new(\n        Mascota::new(\"Bola\", 7, Animal::GATO, Persona::new(\"Pedro\", \"6 y 50\", \"221 123-4567\")),\n        \"Pulgas\",\n        \"Pipeta\",\n        None\n    ));\n    v.registrar_atencion(Atencion::new(\n        Mascota::new(\"Micky\", 4, Animal::PERRO, Persona::new(\"Carlos\", \"1 y 44\", \"221 891-0111\")),\n        \"Garrapatas\",\n        \"Antiparasitario y extraccion\",\n        Some(Fecha::new(12, 6, 2026))\n    ));\n    assert_eq!(v.registro_atenciones.len(), 2);\n\n    assert_eq!(v.registro_atenciones[0].diagnostico, \"Pulgas\".to_string());\n    assert!(v.registro_atenciones[0].proxima_visita.is_none());\n    assert_eq!(v.registro_atenciones[1].diagnostico, \"Garrapatas\".to_string());\n    assert!(v.registro_atenciones[1].proxima_visita.clone().unwrap().equals(\u0026Fecha::new(12, 6, 2026)));\n}\n\n#[test]\nfn test_veterinaria_buscar_atencion() {\n    let mut v = Veterinaria::new(\"Veterinaria1\", \"Centenario\", 4839243274392);\n    v.registrar_atencion(Atencion::new(\n        Mascota::new(\"Bola\", 7, Animal::GATO, Persona::new(\"Pedro\", \"6 y 50\", \"221 123-4567\")),\n        \"Pulgas\",\n        \"Pipeta\",\n        None\n    ));\n    v.registrar_atencion(Atencion::new(\n        Mascota::new(\"Micky\", 4, Animal::PERRO, Persona::new(\"Carlos\", \"1 y 44\", \"221 891-0111\")),\n        \"Garrapatas\",\n        \"Antiparasitario y extraccion\",\ ength":1,"stats":{"Line":2}},{"line":18,"address":[719146],"length":1,"stats":{"Line":1}},{"line":23,"address":[719590,719440],"length":1,"stats":{"Line":2}},{"line":24,"address":[719070,719056],"length":1,"stats":{"Line":8}}],"covered":11,"coverable":11},{"path":["/","home","cosk","rust","practicas","src","tp04","ej2.rs"],"content":"#![allow(unused)]\nuse std::cmp::Ordering;\n\n#[derive(PartialEq, Debug, Clone)]\npub struct Persona\u003c'a\u003e {\n    nombre: \u0026'a str,\n    apellido: \u0026'a str,\n    direccion: \u0026'a str,\n    ciudad: \u0026'a str,\n    salario: f64,\n    edad: u8\n}\n\nimpl\u003c'a\u003e Persona\u003c'a\u003e {\n    pub fn new(nombre: \u0026'a str, apellido: \u0026'a str, direccion: \u0026'a str, ciudad: \u0026'a str, salario: f64, edad: u8) -\u003e Self {\n        Persona { nombre, apellido, direccion, ciudad, salario, edad }\n    }\n\n    pub fn get_salario(\u0026self) -\u003e f64 {\n        self.salario\n    }\n\n    pub fn get_edad(\u0026self) -\u003e u8 {\n        self.edad\n    }\n\n    pub fn get_ciudad(\u0026self) -\u003e \u0026str {\n        self.ciudad\n    }\n}\n\npub fn salario_mayor\u003c'a\u003e(vp: \u0026'a Vec\u003cPersona\u003c'a\u003e\u003e, salario: f64) -\u003e Vec\u003c\u0026'a Persona\u003c'a\u003e\u003e {\n    vp.iter().filter(|p| p.get_salario() \u003e salario).collect::\u003cVec\u003c_\u003e\u003e()\n}\n\npub fn edad_mayor_y_vive_ciudad\u003c'a\u003e(vp: \u0026'a Vec\u003cPersona\u003c'a\u003e\u003e, edad: u8, ciudad: \u0026'a str) -\u003e Vec\u003c\u0026'a Persona\u003c'a\u003e\u003e {\n    vp.iter().filter(|p| p.get_ciudad() == ciudad \u0026\u0026 p.get_edad() \u003e edad).collect::\u003cVec\u003c_\u003e\u003e()\n}\n\npub fn todos_viven_en_ciudad\u003c'a\u003e(vp: \u0026'a Vec\u003cPersona\u003c'a\u003e\u003e, ciudad: \u0026'a str) -\u003e bool {\n    vp.iter().all(|p| p.get_ciudad() == ciudad)\n}\n\npub fn alguno_vive_en_ciudad\u003c'a\u003e(vp: \u0026'a Vec\u003cPersona\u003c'a\u003e\u003e, ciudad: \u0026'a str) -\u003e bool {\n    vp.iter().any(|p| p.get_ciudad() == ciudad)\n}\n\npub fn existe_persona\u003c'a, const N: usize\u003e(ap: \u0026'a[Persona\u003c'a\u003e; N], persona: \u0026'a Persona\u003c'a\u003e) -\u003e bool {\n    ap.contains(persona)\n    //ap.iter().any(|p| p == persona)\n}\n\npub fn obtener_edades\u003c'a, const N: usize\u003e(ap: \u0026[Persona\u003c'a\u003e; N]) -\u003e [u8; N] {\n    ap.iter().filter_map(|p| Some(p.get_edad())).collect::\u003cVec\u003c_\u003e\u003e().try_into().expect(\"Error convirtiendo a arreglo\")\n}\n\npub fn menor_mayor_salario\u003c'a, const N: usize\u003e(ap: \u0026'a [Persona\u003c'a\u003e; N]) -\u003e (Option\u003c\u0026'a Persona\u003c'a\u003e\u003e, Option\u003c\u0026'a Persona\u003c'a\u003e\u003e) {\n    let min = ap.iter().min_by(|p1, p2| {\n        match p1.get_salario().total_cmp(\u0026p2.get_salario()) {\n            Ordering::Equal =\u003e p2.get_edad().cmp(\u0026p1.get_edad()),\n            ord =\u003e ord\n        }\n    });\n\n    let max = ap.iter().max_by(|p1, p2| {\n        match p1.get_salario().total_cmp(\u0026p2.get_salario()) {\n            Ordering::Equal =\u003e p1.get_edad().cmp(\u0026p2.get_edad()),\n            ord =\u003e ord\n        }\n    });\n    (min, max)\n}\n\n#[cfg(test)]\nmod tests {\n    use super::{Persona, salario_mayor, edad_mayor_y_vive_ciudad, todos_viven_en_ciudad, alguno_vive_en_ciudad,\n     existe_persona, obtener_edades, menor_mayor_salario };\n\n    #[test]\n    fn test_salario_mayor() {\n        let vp = vec![\n            Persona::new(\"Pedro\", \"Perez\", \"7 y 50\", \"La Plata\", 200000.0, 22),\n            Persona::new(\"Maria\", \"Sanchez\", \"6 y 498\", \"Gonnet\", 125000.0, 25),\n            Persona::new(\"Juan\", \"Perez\", \"9 y 510\", \"Ringuelet\", 230000.0, 23),\n            Persona::new(\"Jorge\", \"Toledo\", \"2 y 47\", \"La Plata\", 95000.0, 19),\n            Persona::new(\"Liam\", \"Chelsea\", \"12 y 495\", \"Gonnet\", 300000.0, 27)\n        ];\n        assert_eq!(salario_mayor(\u0026vp, 150000.0).len(), 3);\n        assert_eq!(salario_mayor(\u0026vp, 90000.0).len(), 5);\n        assert_eq!(salario_mayor(\u0026vp, 275000.0).len(), 1);\n    }\n\n    #[test]\n    fn test_edad_mayor_y_vive_ciudad() {\n        let vp = vec![\n            Persona::new(\"Pedro\", \"Perez\", \"7 y 50\", \"La Plata\", 200000.0, 22),\n            Persona::new(\"Maria\", \"Sanchez\", \"6 y 498\", \"Gonnet\", 125000.0, 25),\n            Persona::new(\"Juan\", \"Perez\", \"9 y 510\", \"Ringuelet\", 230000.0, 23),\n            Persona::new(\"Jorge\", \"Toledo\", \"2 y 47\", \"La Plata\", 95000.0, 19),\n            Persona::new(\"Liam\", \"Chelsea\", \"12 y 495\", \"Gonnet\", 300000.0, 27)\n        ];\n        assert_eq!(edad_mayor_y_vive_ciudad(\u0026vp, 20, \"La Plata\").len(), 1);\n        assert_eq!(edad_mayor_y_vive_ciudad(\u0026vp, 28, \"Gonnet\").len(), 0);\n        assert_eq!(edad_mayor_y_vive_ciudad(\u0026vp, 18, \"Gonnet\").len(), 2);\n    }\n\n    #[test]\n    fn test_todos_viven_en_ciudad() {\n        let vp = vec![\n            Persona::new(\"Pedro\", \"Perez\", \"7 y 50\", \"La Plata\", 200000.0, 22),\n            Persona::new(\"Maria\", \"Sanchez\", \"6 y 498\", \"Gonnet\", 125000.0, 25),\n            Persona::new(\"Juan\", \"Perez\", \"9 y 510\", \"Ringuelet\", 230000.0, 23),\n            Persona::new(\"Jorge\", \"Toledo\", \"2 y 47\", \"La Plata\", 95000.0, 19),\n            Persona::new(\"Liam\", \"Chelsea\", \"12 y 495\", \"Gonnet\", 300000.0, 27)\n        ];\n        assert!(!todos_viven_en_ciudad(\u0026vp, \"La Plata\"));\n        assert!(!todos_viven_en_ciudad(\u0026vp, \"Gonnet\"));\n\n        let vp = vec![\n            Persona::new(\"Pedro\", \"Perez\", \"7 y 50\", \"Gonnet\", 200000.0, 22),\n            Persona::new(\"Maria\", \"Sanchez\", \"6 y 498\", \"Gonnet\", 125000.0, 25),\n            Persona::new(\"Juan\", \"Perez\", \"9 y 510\", \"Gonnet\", 230000.0, 23),\n            Persona::new(\"Jorge\", \"Toledo\", \"2 y 47\", \"Gonnet\", 95000.0, 19),\n            Persona::new(\"Liam\", \"Chelsea\", \"12 y 495\", \"Gonnet\", 300000.0, 27)\n        ];\n        assert!(!todos_viven_en_ciudad(\u0026vp, \"La Plata\"));\n        assert!(todos_viven_en_ciudad(\u0026vp, \"Gonnet\"));\n    }\n\n    #[test]\n    fn test_alguno_vive_en_ciudad() {\n        let vp = vec![\n            Persona::new(\"Pedro\", \"Perez\", \"7 y 50\", \"La Plata\", 200000.0, 22),\n            Persona::new(\"Maria\", \"Sanchez\", \"6 y 498\", \"Gonnet\", 125000.0, 25),\n            Persona::new(\"Juan\", \"Perez\", \"9 y 510\", \"Ringuelet\", 230000.0, 23),\n            Persona::new(\"Jorge\", \"Toledo\", \"2 y 47\", \"La Plata\", 95000.0, 19),\n            Persona::new(\"Liam\", \"Chelsea\", \"12 y 495\", \"Gonnet\", 300000.0, 27)\n        ];\n        assert!(alguno_vive_en_ciudad(\u0026vp, \"La Plata\"));\n        assert!(alguno_vive_en_ciudad(\u0026vp, \"Gonnet\"));\n        assert!(!alguno_vive_en_ciudad(\u0026vp, \"Tolosa\"));\n\n        let vp = vec![\n            Persona::new(\"Pedro\", \"Perez\", \"7 y 50\", \"Gonnet\", 200000.0, 22),\n            Persona::new(\"Maria\", \"Sanchez\", \"6 y 498\", \"Gonnet\", 125000.0, 25),\n            Persona::new(\"Juan\", \"Perez\", \"9 y 510\", \"Gonnet\", 230000.0, 23),\n            Persona::new(\"Jorge\", \"Toledo\", \"2 y 47\", \"Gonnet\", 95000.0, 19),\n            Persona::new(\"Liam\", \"Chelsea\", \"12 y 495\", \"Gonnet\", 300000.0, 27)\n        ];\n        assert!(!alguno_vive_en_ciudad(\u0026vp, \"La Plata\"));\n        assert!(alguno_vive_en_ciudad(\u0026vp, \"Gonnet\"));\n    }\n\n    #[test]\n    fn test_existe_persona() {\n        let p1 = Persona::new(\"Pedro\", \"Perez\", \"7 y 50\", \"La Plata\", 200000.0, 22);\n        let p2 = Persona::new(\"Maria\", \"Sanchez\", \"6 y 498\", \"Gonnet\", 125000.0, 25);\n        let p3 = Persona::new(\"Juan\", \"Perez\", \"9 y 510\", \"Ringuelet\", 230000.0, 23);\n        let ap = [\n            p1.clone(), p2.clone(),\n            Persona::new(\"Jorge\", \"Toledo\", \"2 y 47\", \"La Plata\", 95000.0, 19),\n            Persona::new(\"Liam\", \"Chelsea\", \"12 y 495\", \"Gonnet\", 300000.0, 27)\n        ];\n        assert!(existe_persona(\u0026ap, \u0026p1));\n        assert!(existe_persona(\u0026ap, \u0026p2));\n        assert!(!existe_persona(\u0026ap, \u0026p3));\n    }\n\n    #[test]\n    fn test_obtener_edades() {\n        let ap = [\n            Persona::new(\"Pedro\", \"Perez\", \"7 y 50\", \"La Plata\", 200000.0, 22),\n            Persona::new(\"Maria\", \"Sanchez\", \"6 y 498\", \"Gonnet\", 125000.0, 25),\n            Persona::new(\"Juan\", \"Perez\", \"9 y 510\", \"Ringuelet\", 230000.0, 23),\n            Persona::new(\"Jorge\", \"Toledo\", \"2 y 47\", \"La Plata\", 95000.0, 19),\n            Persona::new(\"Liam\", \"Chelsea\", \"12 y 495\", \"Gonnet\", 300000.0, 27)\n        ];\n        assert_eq!(obtener_edades(\u0026ap), [22, 25, 23, 19, 27]);\n        assert_eq!(obtener_edades(\u0026[]), []);\n    }\n\n    #[test]\n    fn test_menor_mayor_salario() {\n        let pmenor = Persona::new(\"Jorge\", \"Toledo\", \"2 y 47\", \"La Plata\", 95000.0, 22);\n        let pmayor = Persona::new(\"Liam\", \"Chelsea\", \"12 y 495\", \"Gonnet\", 300000.0, 27);\n        let ap = [\n            Persona::new(\"Pedro\", \"Perez\", \"7 y 50\", \"La Plata\", 95000.0, 19), // mismo salario que el menor pero menor edad\n            pmenor.clone(),\n            Persona::new(\"Maria\", \"Sanchez\", \"6 y 498\", \"Gonnet\", 300000.0, 25), // mismo salario que el mayor pero menor edad\n            pmayor.clone(),\n            Persona::new(\"Juan\", \"Perez\", \"9 y 510\", \"Ringuelet\", 230000.0, 23)\n        ];\n        assert_eq!(menor_mayor_salario(\u0026ap), (Some(\u0026pmenor), Some(\u0026pmayor)));\n\n        assert_eq!(menor_mayor_salario(\u0026[]), (None, None));\n\n        let p = Persona::new(\"Jorge\", \"Toledo\", \"2 y 47\", \"La Plata\", 95000.0, 19);\n        assert_eq!(menor_mayor_salario(\u0026[p.clone()]), (Some(\u0026p), Some(\u0026p)));\n\n        let p1 = Persona::new(\"Jorge\", \"Toledo\", \"2 y 47\", \"La Plata\", 195000.0, 19);\n        let p2 = Persona::new(\"Jorge\", \"Toledo\", \"2 y 47\", \"La Plata\", 195000.0, 22);\n        assert_eq!(menor_mayor_salario(\u0026[p1.clone(), p2.clone()]), (Some(\u0026p2), Some(\u0026p2)));\n    }\n}","traces":[{"line":15,"address":[632656],"length":1,"stats":{"Line":6}},{"line":19,"address":[632640],"length":1,"stats":{"Line":2}},{"line":20,"address":[632645],"length":1,"stats":{"Line":2}},{"line":23,"address":[632784],"length":1,"stats":{"Line":1}},{"line":24,"address":[632789],"length":1,"stats":{"Line":1}},{"line":27,"address":[632624],"length":1,"stats":{"Line":2}},{"line":28,"address":[632629],"length":1,"stats":{"Line":2}},{"line":32,"address":[632272],"length":1,"stats":{"Line":1}},{"line":33,"address":[632310],"length":1,"stats":{"Line":3}},{"line":36,"address":[632512],"length":1,"stats":{"Line":1}},{"line":37,"address":[632558],"length":1,"stats":{"Line":3}},{"line":40,"address":[632448],"length":1,"stats":{"Line":1}},{"line":41,"address":[632466],"length":1,"stats":{"Line":3}},{"line":44,"address":[632384],"length":1,"stats":{"Line":1}},{"line":45,"address":[632402],"length":1,"stats":{"Line":3}},{"line":48,"address":[780064],"length":1,"stats":{"Line":1}},{"line":49,"address":[780081],"length":1,"stats":{"Line":1}},{"line":53,"address":[780272,780112],"length":1,"stats":{"Line":2}},{"line":54,"address":[780416,780441,780393,780368,780281,780126],"length":1,"stats":{"Line":4}},{"line":57,"address":[780560,780656,780464,780752],"length":1,"stats":{"Line":4}},{"line":58,"address":[780488,780680,781552,781200,780584,781024,781728,780775],"length":1,"stats":{"Line":6}},{"line":59,"address":[781053,781757,781581,781229],"length":1,"stats":{"Line":2}},{"line":60,"address":[781294,781822,781646,781118],"length":1,"stats":{"Line":2}},{"line":61,"address":[781350,781878,781702,781174],"length":1,"stats":{"Line":1}},{"line":65,"address":[780811,780524,780620,782080,781376,780716,780848,781904],"length":1,"stats":{"Line":6}},{"line":66,"address":[781933,781405,780877,782109],"length":1,"stats":{"Line":2}},{"line":67,"address":[780942,782174,781998,781470],"length":1,"stats":{"Line":2}},{"line":68,"address":[781526,782054,782230,780998],"length":1,"stats":{"Line":1}},{"line":71,"address":[],"length":0,"stats":{"Line":0}}],"covered":28,"coverable":29},{"path":["/","home","cosk","rust","practicas","src","tp04","ej3.rs"],"content":"#![allow(unused)]\nuse crate::tp03::ej3::Fecha;\nuse std::collections::BTreeMap;\n\nimpl PartialEq for Fecha {\n    fn eq(\u0026self, o: \u0026Fecha) -\u003e bool {\n        self.equals(o)\n    }\n\n    fn ne(\u0026self, o: \u0026Fecha) -\u003e bool {\n        self.not_equals(o)\n    }\n}\n\n#[derive(PartialEq, Copy, Clone, Debug)]\npub enum TipoSuscripcion {\n    Basic, Classic, Super\n}\n\nimpl TipoSuscripcion {\n    const ALL: [Self; 3] = [\n        TipoSuscripcion::Basic,\n        TipoSuscripcion::Classic,\n        TipoSuscripcion::Super\n    ];\n\n    pub fn incrementar(tipo: \u0026TipoSuscripcion, counts: \u0026mut [usize; 3]) {\n        match tipo {\n            TipoSuscripcion::Basic =\u003e counts[0] += 1,\n            TipoSuscripcion::Classic =\u003e counts[1] += 1,\n            TipoSuscripcion::Super =\u003e counts[2] += 1\n        }\n    }\n\n    fn get_descuento_por_duracion(\u0026self, duracion_meses: u16) -\u003e f32 {\n        if duracion_meses \u003c 3 {\n            1.00 // sin descuento para 1 y 2 meses\n        } else if duracion_meses \u003c 6 {\n            0.95 // 5 % para 3 a 5 meses\n        } else if duracion_meses \u003c 12 {\n            0.9 // 10% para 6 a 11 meses\n        } else {\n            0.85 // 15% para \u003e=12 meses\n        }\n    }\n\n    pub fn get_costo_mensual(\u0026self, duracion_meses: u16) -\u003e f32 {\n        let descuento = self.get_descuento_por_duracion(duracion_meses);\n        match self {\n            TipoSuscripcion::Basic =\u003e 4.99*descuento,\n            TipoSuscripcion::Classic =\u003e 9.99*descuento,\n            TipoSuscripcion::Super =\u003e 17.99*descuento\n        }\n    }\n}\n\n#[derive(PartialEq, Clone, Debug)]\npub struct Suscripcion {\n    costo_mensual: f32,\n    duracion_meses: u16,\n    fecha_inicio: Fecha,\n    tipo: TipoSuscripcion,\n    activa: bool\n}\n\nimpl Suscripcion {\n    pub fn new(tipo: TipoSuscripcion, duracion_meses: u16, fecha_inicio: Fecha) -\u003e Self {\n        let costo_mensual = tipo.get_costo_mensual(duracion_meses);\n        Suscripcion { costo_mensual, duracion_meses, fecha_inicio, tipo, activa: true }\n    }\n\n    fn clone_nuevo_tipo(\u0026mut self, tipo: TipoSuscripcion) -\u003e Self {\n        self.activa = false;\n        Suscripcion::new(tipo, self.duracion_meses, self.fecha_inicio.clone())\n    }\n\n    pub fn upgrade(\u0026mut self) -\u003e Result\u003cSelf, \u0026'static str\u003e {\n        if self.esta_activa() {\n            match self.tipo {\n                TipoSuscripcion::Basic =\u003e Ok(self.clone_nuevo_tipo(TipoSuscripcion::Classic)),\n                TipoSuscripcion::Classic =\u003e Ok(self.clone_nuevo_tipo(TipoSuscripcion::Super)),\n                TipoSuscripcion::Super =\u003e Err(\"No se puede mejorar una suscripcion Super\")\n            }\n        } else {\n            Err(\"Suscripcion no activa\")\n        }\n        \n    }\n\n    pub fn downgrade(\u0026mut self) -\u003e Result\u003cSelf, \u0026'static str\u003e {\n        if self.esta_activa() {\n            match self.tipo {\n                TipoSuscripcion::Basic =\u003e self.cancelar(),\n                TipoSuscripcion::Classic =\u003e Ok(self.clone_nuevo_tipo(TipoSuscripcion::Basic)),\n                TipoSuscripcion::Super =\u003e Ok(self.clone_nuevo_tipo(TipoSuscripcion::Classic))\n            }\n        } else {\n            Err(\"Suscripcion no activa\")\n        }\n    }\n\n    pub fn cancelar(\u0026mut self) -\u003e Result\u003cSelf, \u0026'static str\u003e {\n        if self.esta_activa() {\n            self.activa = false;\n            Ok(self.clone())\n        } else {\n            Err(\"Suscripcion ya cancelada\")\n        }\n    }\n\n    pub fn esta_activa(\u0026self) -\u003e bool {\n        self.activa\n    }\n}\n\n#[derive(PartialEq, Copy, Clone, Debug)]\npub enum TipoMedioPago {\n    Efectivo,\n    MercadoPago,\n    TarjetaCredito,\n    Transferencia,\n    Cripto\n}\n\nimpl TipoMedioPago {\n    const ALL: [Self; 5] = [\n        Self::Efectivo,\n        Self::MercadoPago,\n        Self::TarjetaCredito,\n        Self::Transferencia,\n        Self::Cripto,\n    ];\n\n    pub fn incrementar(medio: \u0026MedioPago, counts: \u0026mut [usize; 5]) {\n        match medio {\n            MedioPago::Efectivo =\u003e counts[0] += 1,\n            MedioPago::MercadoPago { .. } =\u003e counts[1] += 1,\n            MedioPago::TarjetaCredito { .. } =\u003e counts[2] += 1,\n            MedioPago::Transferencia { .. } =\u003e counts[3] += 1,\n            MedioPago::Cripto { .. } =\u003e counts[4] += 1,\n        }\n    }\n}\n\n#[derive(PartialEq, Clone, Debug)]\npub enum MedioPago {\n    Efectivo,\n    MercadoPago {\n        alias: String\n    },\n    TarjetaCredito {\n        numero_tarjeta: String, // 1234-5678-9123-4567\n        cvv: u16\n    },\n    Transferencia {\n        numero_cuenta: u64\n    },\n    Cripto {\n        direccion_wallet: String\n    }\n}\n\nimpl MedioPago {\n    pub fn es_tipo(\u0026self, tipo: \u0026TipoMedioPago) -\u003e bool {\n        match (self, tipo) {\n            (MedioPago::Efectivo, TipoMedioPago::Efectivo) |\n            (MedioPago::MercadoPago { .. }, TipoMedioPago::MercadoPago) |\n            (MedioPago::TarjetaCredito { .. }, TipoMedioPago::TarjetaCredito) |\n            (MedioPago::Transferencia { .. }, TipoMedioPago::Transferencia) |\n            (MedioPago::Cripto { .. }, TipoMedioPago::Cripto) =\u003e true,\n            _ =\u003e false\n        }\n    }\n}\n\n#[derive(PartialEq, Clone, Debug)]\npub struct Usuario {\n    pub id: u64,\n    pub nombre: String,\n    medio_pago: MedioPago\n}\n\nimpl Usuario {\n    pub fn new(id: u64, nombre: \u0026str, medio_pago: MedioPago) -\u003e Self {\n        Usuario { id, nombre: nombre.to_string(), medio_pago }\n    }\n}\n\n#[derive(PartialEq, Clone, Debug)]\npub struct Plataforma {\n    usuarios: BTreeMap\u003cu64, Usuario\u003e,\n    suscripciones: BTreeMap\u003cu64, Vec\u003cSuscripcion\u003e\u003e,\n    curr_id: u64\n}\n\nimpl Plataforma {\n    pub fn new() -\u003e Self {\n        Plataforma { usuarios: BTreeMap::new(), suscripciones: BTreeMap::new(), curr_id: 0 }\n    }\n\n    fn get_next_userid(\u0026mut self) -\u003e u64 {\n        let tmp = self.curr_id;\n        self.curr_id += 1;\n        tmp\n    }\n\n    pub fn crear_usuario(\u0026mut self, nombre: \u0026str, suscripcion: Suscripcion, medio_pago: MedioPago) {\n        let id = self.get_next_userid();\n        self.usuarios.insert(id, Usuario::new(id, nombre, medio_pago));\n        self.suscripciones.insert(id, vec![suscripcion]);\n    }\n\n    pub fn upgrade_suscripcion(\u0026mut self, id: u64) -\u003e Result\u003c(), \u0026'static str\u003e {\n        if let Some(vecsusc) = self.suscripciones.get_mut(\u0026id) {\n            let newsusc = vecsusc.last_mut().unwrap().upgrade()?;\n            vecsusc.push(newsusc); \n            Ok(())\n        } else {\n            Err(\"Usuario no existente\")\n        }\n    }\n\n    pub fn downgrade_suscripcion(\u0026mut self, id: u64) -\u003e Result\u003c(), \u0026'static str\u003e {\n        if let Some(vecsusc) = self.suscripciones.get_mut(\u0026id) {\n            let newsusc = vecsusc.last_mut().unwrap().downgrade()?;\n            if newsusc.esta_activa() { vecsusc.push(newsusc); }\n            Ok(())\n        } else {\n            Err(\"Usuario no existente\")\n        }\n    }\n\n    pub fn cancelar_suscripcion(\u0026mut self, id: u64) -\u003e Result\u003c(), \u0026'static str\u003e {\n        if let Some(vecsusc) = self.suscripciones.get_mut(\u0026id) {\n            vecsusc.last_mut().unwrap().cancelar()?;\n            Ok(())\n        } else {\n            Err(\"Usuario no existente\")\n        }\n    }\n\n    fn tiene_suscripcion_activa(\u0026self, id: u64) -\u003e bool {\n        self.suscripciones.get(\u0026id).unwrap().last().unwrap().esta_activa()\n    }\n\n    pub fn medio_pago_mas_usado(\u0026self) -\u003e TipoMedioPago {\n        let mut counts: [usize; 5] = [0; 5];\n        for user in self.usuarios.values() {\n            TipoMedioPago::incrementar(\u0026user.medio_pago, \u0026mut counts);\n        }\n        \n        let maxpos = counts.iter().enumerate().max_by_key(|\u0026(_, v)| v).unwrap().0;\n        TipoMedioPago::ALL[maxpos]\n    }\n\n    pub fn medio_pago_mas_usado_activas(\u0026self) -\u003e TipoMedioPago {\n        let mut counts: [usize; 5] = [0; 5];\n        for user in self.usuarios.iter()\n                .filter_map(|(uid, user)| {\n                    if self.tiene_suscripcion_activa(*uid) { Some(user) } else { None }\n                }) {\n            TipoMedioPago::incrementar(\u0026user.medio_pago, \u0026mut counts);\n        }\n        \n        let maxpos = counts.iter().enumerate().max_by_key(|\u0026(_, v)| v).unwrap().0;\n        TipoMedioPago::ALL[maxpos]\n    }\n\n    pub fn suscripcion_mas_contratada(\u0026self) -\u003e TipoSuscripcion {\n        let mut counts: [usize; 3] = [0; 3];\n        for susc in self.suscripciones.values().flatten() {\n            TipoSuscripcion::incrementar(\u0026susc.tipo, \u0026mut counts);\n        }\n        let maxpos = counts.iter().enumerate().max_by_key(|\u0026(_, v)| v).unwrap().0;\n        TipoSuscripcion::ALL[maxpos]\n    }\n\n    pub fn suscripcion_mas_contratada_activas(\u0026self) -\u003e TipoSuscripcion {\n        let mut counts: [usize; 3] = [0; 3];\n        for susc in self.suscripciones.values()\n                    .filter_map(|vecsusc| {\n                        let s = vecsusc.last().unwrap();\n                        if s.esta_activa() { Some(s) } else { None }\n                    }) {\n            TipoSuscripcion::incrementar(\u0026susc.tipo, \u0026mut counts);\n        }\n        let maxpos = counts.iter().enumerate().max_by_key(|\u0026(_, v)| v).unwrap().0;\n        TipoSuscripcion::ALL[maxpos]\n    }\n\n    pub fn cant_usuarios(\u0026self) -\u003e usize {\n        self.usuarios.len()\n    }\n\n    pub fn cant_suscripciones(\u0026self) -\u003e usize {\n        self.suscripciones.values().flatten().count()\n    }\n\n    pub fn cant_suscripciones_activas(\u0026self) -\u003e usize {\n        self.suscripciones.values().filter_map(|vecsusc| {\n            let s = vecsusc.last().unwrap();\n            if s.esta_activa() { Some(s) } else { None }\n        }).count()\n    }\n\n    pub fn get_user(\u0026self, id: u64) -\u003e Option\u003c\u0026Usuario\u003e {\n        self.usuarios.get(\u0026id)\n    }\n\n    pub fn get_user_suscripciones(\u0026self, id: u64) -\u003e Option\u003c\u0026Vec\u003cSuscripcion\u003e\u003e {\n        self.suscripciones.get(\u0026id)\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    fn crear_plataforma_base() -\u003e Plataforma {\n        let mut p = Plataforma::new();\n        p.crear_usuario(\n            \"user1\", \n            Suscripcion::new(TipoSuscripcion::Classic, 3, Fecha::new(17, 6, 2026)),\n            MedioPago::TarjetaCredito { numero_tarjeta: \"4459-2323-0091-8928\".to_string(), cvv: 621 }\n        );\n        p.crear_usuario(\n            \"pedro56\", \n            Suscripcion::new(TipoSuscripcion::Basic, 6, Fecha::new(12, 2, 2026)),\n            MedioPago::MercadoPago { alias: \"pedro.martinez56.mp\".to_string() }\n        );\n        p.crear_usuario(\n            \"juan.diaz1\", \n            Suscripcion::new(TipoSuscripcion::Super, 12, Fecha::new(3, 8, 2025)),\n            MedioPago::Cripto { direccion_wallet: \"0x73210aDxnUD9A90JD82\".to_string() }\n        );\n        p\n    }\n\n    #[test]\n    fn test_crear_usuario() {\n        let mut p = crear_plataforma_base();\n        assert_eq!(p.cant_usuarios(), 3);\n        assert_eq!(p.cant_suscripciones(), 3);\n\n        let u1 = p.get_user(0);\n        assert!(u1.is_some_and(|u| u.nombre == \"user1\" \u0026\u0026 u.medio_pago.es_tipo(\u0026TipoMedioPago::TarjetaCredito) \u0026\u0026 !u.medio_pago.es_tipo(\u0026TipoMedioPago::MercadoPago)));\n\n        let u2 = p.get_user(1);\n        assert!(u2.is_some_and(|u| u.nombre == \"pedro56\" \u0026\u0026 u.medio_pago.es_tipo(\u0026TipoMedioPago::MercadoPago)));\n\n        let u3 = p.get_user(2);\n        assert!(u3.is_some_and(|u| u.nombre == \"juan.diaz1\" \u0026\u0026 u.medio_pago.es_tipo(\u0026TipoMedioPago::Cripto)));\n    \n        assert!(p.get_user(3).is_none());\n        assert_eq!(p.get_user_suscripciones(0).unwrap().get(0).unwrap().fecha_inicio, Fecha::new(17, 6, 2026));\n        assert!(p.get_user_suscripciones(1).unwrap().get(0).unwrap().fecha_inicio != Fecha::new(17, 6, 2026));\n    }\n\n    #[test]\n    fn test_upgrade_suscripcion() {\n        let mut p = crear_plataforma_base();\n\n        assert!(p.get_user_suscripciones(0).unwrap().get(0).is_some_and(|s| s.tipo == TipoSuscripcion::Classic));\n\n        // upgrade Classic a Super\n        assert!(p.upgrade_suscripcion(0).is_ok());\n        let susc0 = p.get_user_suscripciones(0).unwrap();\n        assert!(susc0.get(0).is_some_and(|s| s.tipo == TipoSuscripcion::Classic \u0026\u0026 !s.esta_activa()));\n        assert!(susc0.get(1).is_some_and(|s| s.tipo == TipoSuscripcion::Super \u0026\u0026 s.esta_activa()));\n\n        // intentar upgrade de Super falla\n        assert!(p.upgrade_suscripcion(0).is_err());\n\n        // se guardan todas las suscripciones, pero no se agregan nuevas activas (1 por usuario)\n        assert_eq!(p.cant_suscripciones_activas(), p.cant_usuarios());\n        assert_eq!(p.cant_suscripciones(), p.cant_usuarios()+1);\n\n        // upgrade Basic a Classic\n        assert!(p.upgrade_suscripcion(1).is_ok());\n        let susc1 = p.get_user_suscripciones(1).unwrap();\n        assert!(susc1.get(0).is_some_and(|s| s.tipo == TipoSuscripcion::Basic \u0026\u0026 !s.esta_activa()));\n        assert!(susc1.get(1).is_some_and(|s| s.tipo == TipoSuscripcion::Classic \u0026\u0026 s.esta_activa()));\n\n        assert_eq!(p.cant_suscripciones_activas(), p.cant_usuarios());\n        assert_eq!(p.cant_suscripciones(), p.cant_usuarios()+2);\n\n        // upgrade a suscripcion no activa\n        p.cancelar_suscripcion(0);\n        assert!(p.upgrade_suscripcion(0).is_err());\n\n        // upgrade a usuario no existente\n        assert!(p.upgrade_suscripcion(100).is_err());\n    }\n\n    #[test]\n    fn test_downgrade_suscripcion() {\n        let mut p = crear_plataforma_base();\n\n        // downgrade Classic a Basic\n        assert!(p.downgrade_suscripcion(0).is_ok());\n        let susc0 = p.get_user_suscripciones(0).unwrap();\n        assert!(susc0.get(0).is_some_and(|s| s.tipo == TipoSuscripcion::Classic \u0026\u0026 !s.esta_activa()));\n        assert!(susc0.get(1).is_some_and(|s| s.tipo == TipoSuscripcion::Basic \u0026\u0026 s.esta_activa()));\n\n        // downgrade Basic cancela, sin agregar al historial una nueva entrada\n        assert!(p.downgrade_suscripcion(0).is_ok());\n        let susc0 = p.get_user_suscripciones(0).unwrap();\n        assert!(susc0.get(0).is_some_and(|s| s.tipo == TipoSuscripcion::Classic \u0026\u0026 !s.esta_activa()));\n        assert!(susc0.get(1).is_some_and(|s| s.tipo == TipoSuscripcion::Basic \u0026\u0026 !s.esta_activa()));\n        assert!(susc0.get(2).is_none());\n\n        // intentar downgrade con cancelada falla\n        assert!(p.downgrade_suscripcion(0).is_err());\n\n        // hay 3 usuarios, pero 1 cancelo\n        // 1 suscripcion activa a lo sumo por usuario, pero se guarda el historial\n        assert_eq!(p.cant_suscripciones_activas(), p.cant_usuarios()-1);\n        assert_eq!(p.cant_suscripciones(), p.cant_usuarios()+1);\n\n        // downgrade Super a Classic\n        assert!(p.downgrade_suscripcion(2).is_ok());\n        let susc2 = p.get_user_suscripciones(2).unwrap();\n        assert!(susc2.get(0).is_some_and(|s| s.tipo == TipoSuscripcion::Super \u0026\u0026 !s.esta_activa()));\n        assert!(susc2.get(1).is_some_and(|s| s.tipo == TipoSuscripcion::Classic \u0026\u0026 s.esta_activa()));\n\n        assert_eq!(p.cant_suscripciones_activas(), p.cant_usuarios()-1);\n        assert_eq!(p.cant_suscripciones(), p.cant_usuarios()+2);\n\n        // downgrade a usuario no existente\n        assert!(p.downgrade_suscripcion(100).is_err());\n    }\n\n    #[test]\n    fn test_cancelar_suscripcion() {\n        let mut p = crear_plataforma_base();\n\n        assert!(p.get_user_suscripciones(0).unwrap().get(0).is_some_and(|s| s.tipo == TipoSuscripcion::Classic));\n\n        // cancelar suscripcion de usuario 0 (no agrega al historial)\n        assert!(p.cancelar_suscripcion(0).is_ok());\n        let susc0 = p.get_user_suscripciones(0).unwrap();\n        assert!(susc0.get(0).is_some_and(|s| s.tipo == TipoSuscripcion::Classic \u0026\u0026 !s.esta_activa()));\n        assert!(susc0.get(1).is_none());\n\n        // intentar cancelar de nuevo falla\n        assert!(p.cancelar_suscripcion(0).is_err());\n\n        // hay 3 usuarios, 1 cancelo, no cambia la cantidad de suscripciones totales\n        assert_eq!(p.cant_suscripciones_activas(), p.cant_usuarios()-1);\n        assert_eq!(p.cant_suscripciones(), p.cant_usuarios());\n\n        // cancelo a usuario no existente\n        assert!(p.cancelar_suscripcion(100).is_err());\n    }\n\n    #[test]\n    fn test_medio_pago_mas_usado_activas() {\n        let mut p = crear_plataforma_base();\n        p.crear_usuario(\n            \"maria.a13\", \n            Suscripcion::new(TipoSuscripcion::Classic, 7, Fecha::new(25, 4, 2026)),\n            MedioPago::Cripto { direccion_wallet: \"0x834hDUjd9k29dna7DH9\".to_string() }\n        );\n\n        // id 0: TarjetaCredito (activo)\n        // id 1: MercadoPago (activo)\n        // id 2: Cripto (activo)\n        // id 3: Cripto (activo)\n        // mas usado activo -\u003e Cripto\n        let mp = p.medio_pago_mas_usado_activas();\n        assert_eq!(mp, TipoMedioPago::Cripto);\n\n        assert!(p.cancelar_suscripcion(2).is_ok());\n        assert!(p.cancelar_suscripcion(3).is_ok());\n\n        p.crear_usuario(\n            \"carlos_sanchez_12\", \n            Suscripcion::new(TipoSuscripcion::Basic, 4, Fecha::new(13, 5, 2026)),\n            MedioPago::MercadoPago { alias: \"carlos.sanchez.mp\".to_string() }\n        );\n        p.crear_usuario(\n            \"messi.crack10\", \n            Suscripcion::new(TipoSuscripcion::Super, 1, Fecha::new(2, 6, 2025)),\n            MedioPago::Transferencia { numero_cuenta: 1234567 }\n        );\n        p.crear_usuario(\n            \"garcia.perez2\", \n            Suscripcion::new(TipoSuscripcion::Classic, 26, Fecha::new(29, 4, 2026)),\n            MedioPago::Efectivo\n        );\n\n        // id 0: TarjetaCredito (activo)\n        // id 1: MercadoPago (activo)\n        // id 2: Cripto (inactivo)\n        // id 3: Cripto (inactivo)\n        // id 4: MercadoPago (activo)\n        // id 5: Transferencia (inactivo)\n        // id 6: Efectivo (inactivo)\n        // mas usado activo -\u003e MercadoPago\n        let mp = p.medio_pago_mas_usado_activas();\n        assert_eq!(mp, TipoMedioPago::MercadoPago);\n    }\n\n    #[test]\n    fn test_medio_pago_mas_usado() {\n        let mut p = crear_plataforma_base();\n        p.crear_usuario(\n            \"maria.a13\", \n            Suscripcion::new(TipoSuscripcion::Classic, 7, Fecha::new(25, 4, 2026)),\n            MedioPago::Cripto { direccion_wallet: \"0x834hDUjd9k29dna7DH9\".to_string() }\n        );\n\n        // id 0: TarjetaCredito (activo)\n        // id 1: MercadoPago (activo)\n        // id 2: Cripto (activo)\n        // id 3: Cripto (activo)\n        // mas usado general -\u003e Cripto\n        let mp = p.medio_pago_mas_usado();\n        assert_eq!(mp, TipoMedioPago::Cripto);\n\n        assert!(p.cancelar_suscripcion(1).is_ok());\n        assert!(p.cancelar_suscripcion(3).is_ok());\n\n        p.crear_usuario(\n            \"carlos_sanchez_12\", \n            Suscripcion::new(TipoSuscripcion::Basic, 4, Fecha::new(13, 5, 2026)),\n            MedioPago::MercadoPago { alias: \"carlos.sanchez.mp\".to_string() }\n        );\n        p.crear_usuario(\n            \"leonardo.da.vinci_9\", \n            Suscripcion::new(TipoSuscripcion::Super, 24, Fecha::new(1, 2, 2025)),\n            MedioPago::MercadoPago { alias: \"leonardito.mp\".to_string() }\n        );\n        assert!(p.cancelar_suscripcion(4).is_ok());\n        assert!(p.cancelar_suscripcion(5).is_ok());\n\n        // id 0: TarjetaCredito (activo)\n        // id 1: MercadoPago (inactivo)\n        // id 2: Cripto (activo)\n        // id 3: Cripto (inactivo)\n        // id 4: MercadoPago (inactivo)\n        // id 5: MercadoPago (inactivo)\n        // mas usado general -\u003e MercadoPago\n        let mp = p.medio_pago_mas_usado();\n        assert_eq!(mp, TipoMedioPago::MercadoPago);\n    }\n\n    #[test]\n    fn test_suscripcion_mas_contratada_activas() {\n        let mut p = crear_plataforma_base();\n        p.crear_usuario(\n            \"maria.a13\", \n            Suscripcion::new(TipoSuscripcion::Classic, 7, Fecha::new(25, 4, 2026)),\n            MedioPago::Cripto { direccion_wallet: \"0x834hDUjd9k29dna7DH9\".to_string() }\n        );\n\n        // id 0: Classic (activo)\n        // id 1: Basic (activo)\n        // id 2: Super (activo)\n        // id 3: Classic (activo)\n        // mas usado activo -\u003e Classic\n        let sus = p.suscripcion_mas_contratada_activas();\n        assert_eq!(sus, TipoSuscripcion::Classic);\n\n        assert!(p.cancelar_suscripcion(2).is_ok());\n        assert!(p.cancelar_suscripcion(3).is_ok());\n\n        p.crear_usuario(\n            \"carlos_sanchez_12\", \n            Suscripcion::new(TipoSuscripcion::Basic, 4, Fecha::new(13, 5, 2026)),\n            MedioPago::MercadoPago { alias: \"carlos.sanchez.mp\".to_string() }\n        );\n\n        // id 0: Classic (activo)\n        // id 1: Basic (activo)\n        // id 2: Super (inactivo)\n        // id 3: Classic (inactivo)\n        // id 4: Basic (activo)\n        // mas usado activo -\u003e Classic\n        let sus = p.suscripcion_mas_contratada_activas();\n        assert_eq!(sus, TipoSuscripcion::Basic);\n    }\n\n    #[test]\n    fn test_suscripcion_mas_contratada() {\n        let mut p = crear_plataforma_base();\n        p.crear_usuario(\n            \"maria.a13\", \n            Suscripcion::new(TipoSuscripcion::Classic, 7, Fecha::new(25, 4, 2026)),\n            MedioPago::Cripto { direccion_wallet: \"0x834hDUjd9k29dna7DH9\".to_string() }\n        );\n\n        // id 0: Classic (activo)\n        // id 1: Basic (activo)\n        // id 2: Super (activo)\n        // id 3: Classic (activo)\n        // mas usado general -\u003e Classic\n        let mp = p.suscripcion_mas_contratada();\n        assert_eq!(mp, TipoSuscripcion::Classic);\n\n        assert!(p.cancelar_suscripcion(1).is_ok());\n\n        p.crear_usuario(\n            \"carlos_sanchez_12\", \n            Suscripcion::new(TipoSuscripcion::Basic, 4, Fecha::new(13, 5, 2026)),\n            MedioPago::MercadoPago { alias: \"carlos.sanchez.mp\".to_string() }\n        );\n        p.crear_usuario(\n            \"leonardo.da.vinci_9\", \n            Suscripcion::new(TipoSuscripcion::Basic, 2, Fecha::new(1, 2, 2025)),\n            MedioPago::MercadoPago { alias: \"leonardito.mp\".to_string() }\n        );\n        assert!(p.cancelar_suscripcion(4).is_ok());\n        assert!(p.cancelar_suscripcion(5).is_ok());\n\n        // id 0: Classic (activo)\n        // id 1: Basic (inactivo)\n        // id 2: Super (activo)\n        // id 3: Classic (activo)\n        // id 4: Basic (inactivo)\n        // id 5: Basic (inactivo)\n        // mas usado general -\u003e Basic\n        let mp = p.suscripcion_mas_contratada();\n        assert_eq!(mp, TipoSuscripcion::Basic);\n    }\n}\n\n\n\n\n\n\n","traces":[{"line":6,"address":[795856],"length":1,"stats":{"Line":1}},{"line":7,"address":[795870],"length":1,"stats":{"Line":1}},{"line":10,"address":[795888],"length":1,"stats":{"Line":1}},{"line":11,"address":[795902],"length":1,"stats":{"Line":1}},{"line":27,"address":[614592],"length":1,"stats":{"Line":1}},{"line":28,"address":[614611],"length":1,"stats":{"Line":1}},{"line":29,"address":[614735,614648],"length":1,"stats":{"Line":3}},{"line":30,"address":[614768,614675],"length":1,"stats":{"Line":2}},{"line":31,"address":[614796,614703],"length":1,"stats":{"Line":4}},{"line":35,"address":[614992],"length":1,"stats":{"Line":7}},{"line":36,"address":[615043,615010],"length":1,"stats":{"Line":3}},{"line":37,"address":[615029],"length":1,"stats":{"Line":2}},{"line":38,"address":[615021,615072],"length":1,"stats":{"Line":11}},{"line":39,"address":[615058],"length":1,"stats":{"Line":1}},{"line":40,"address":[615050,615088],"length":1,"stats":{"Line":8}},{"line":41,"address":[615090],"length":1,"stats":{"Line":4}},{"line":43,"address":[615074],"length":1,"stats":{"Line":4}},{"line":47,"address":[614816],"length":1,"stats":{"Line":4}},{"line":48,"address":[614838],"length":1,"stats":{"Line":1}},{"line":49,"address":[614866],"length":1,"stats":{"Line":1}},{"line":50,"address":[614904],"length":1,"stats":{"Line":4}},{"line":51,"address":[614930],"length":1,"stats":{"Line":4}},{"line":52,"address":[614956],"length":1,"stats":{"Line":4}},{"line":67,"address":[613440],"length":1,"stats":{"Line":3}},{"line":68,"address":[613479],"length":1,"stats":{"Line":1}},{"line":72,"address":[613344],"length":1,"stats":{"Line":2}},{"line":73,"address":[613372],"length":1,"stats":{"Line":2}},{"line":74,"address":[613376],"length":1,"stats":{"Line":2}},{"line":77,"addres -\u003e f64 {\n        self.precio_base * self.categoria.get_descuento()\n    }\n}\n\n#[derive(PartialEq, Clone, Debug)]\npub struct Cliente {\n    pub nombre: String,\n    pub apellido: String,\n    pub direccion: String,\n    pub email: Option\u003cString\u003e,\n    pub dni: u32\n}\n\nimpl Cliente {\n    pub fn new(nombre: \u0026str, apellido: \u0026str, direccion: \u0026str, email: Option\u003c\u0026str\u003e, dni: u32) -\u003e Self {\n        Cliente { nombre: nombre.to_string(), apellido: apellido.to_string(), direccion: direccion.to_string(), \n            email: email.map(|x| x.to_string()), dni }\n    }\n}\n\n#[derive(PartialEq, Clone, Debug)]\npub struct Vendedor {\n    pub legajo: u16,\n    pub antiguedad: u16,\n    pub salario: f64\n}\n\nimpl Vendedor {\n    pub fn new(legajo: u16, antiguedad: u16, salario: f64) -\u003e Self {\n        Vendedor { legajo, antiguedad, salario }\n    }\n}\n\n#[derive(PartialEq, Clone, Debug)]\npub enum MedioPago {\n    TarjetaCredito, TarjetaDebito, Transferencia, Efectivo\n}\n\n#[derive(PartialEq, Clone, Debug)]\npub struct Venta {\n    fecha: Fecha,\n    cliente: Cliente,\n    vendedor: Vendedor,\n    medio_pago: MedioPago,\n    productos: Vec\u003c(Producto, u32)\u003e\n}\n\nimpl Venta {\n    pub fn new(fecha: Fecha, cliente: Cliente, vendedor: Vendedor, medio_pago: MedioPago, productos: Vec\u003c(Producto, u32)\u003e) -\u003e Self {\n        Venta { fecha, cliente, vendedor, medio_pago, productos }\n    }\n}\n\n#[derive(PartialEq, Debug, Clone)]\npub enum ErrorVenta {\n    ListaProductosVacia, PrecioCeroNegativo, CantidadCero\n}\n\npub struct SistemaVentas {\n    ventas: Vec\u003cVenta\u003e,\n    vendedores: HashMap\u003cu16, Vendedor\u003e,\n}\n\nimpl SistemaVentas {\n    pub fn new() -\u003e Self {\n        SistemaVentas { ventas: vec![], vendedores: HashMap::new() }\n    }\n\n    pub fn registrar_venta(\u0026mut self, fecha: Fecha, cliente: Cliente, vendedor: Vendedor, \n        medio_pago: MedioPago, productos: Vec\u003c(Producto, u32)\u003e) -\u003e Result\u003c(), ErrorVenta\u003e {\n        if productos.is_empty() {\n            Err(ErrorVenta::ListaProductosVacia)\n        } else {\n            productos.iter().try_for_each(|(p, cant)| {\n                if p.precio_base \u003c= 0.0 {\n                    Err(ErrorVenta::PrecioCeroNegativo)\n                } else if *cant == 0 {\n                    Err(ErrorVenta::CantidadCero)\n                } else {\n                    Ok(())\n                }\n            })?;\n            let venta = Venta::new(fecha, cliente, vendedor.clone(), medio_pago, productos);\n            self.vendedores.entry(vendedor.legajo).or_insert(vendedor);\n\n            self.ventas.push(venta);\n            Ok(())\n        }\n    }\n\n    fn get_descuento_newsteller(\u0026self, cliente: \u0026Cliente) -\u003e f64 {\n        if cliente.email.is_some() { 0.9 } // 10% si esta suscrito\n        else { 1.0 } // sin descuento si no esta suscrito\n    }\n\n    fn calcular_precio_final(\u0026self, prod: \u0026Producto, cant: u32) -\u003e f64 {\n        prod.get_precio_final()*f64::from(cant)\n    }\n\n    pub fn calcular_precio_total(\u0026self, venta: \u0026Venta) -\u003e f64 {\n        let precio_prods: f64 = venta.productos.iter()\n            .map(|(p, cant)| self.calcular_precio_final(p, *cant))\n            .sum();\n        precio_prods*self.get_descuento_newsteller(\u0026venta.cliente)\n    }\n\n    pub fn get_venta(\u0026self, index: usize) -\u003e Option\u003c\u0026Venta\u003e {\n        self.ventas.get(index)\n    }\n\n    pub fn get_vendedor(\u0026self, legajo: u16) -\u003e Option\u003c\u0026Vendedor\u003e {\n        self.vendedores.get(\u0026legajo)\n    }\n\n    pub fn reporte_ventas_categoria(\u0026self) -\u003e HashMap\u003cCategoria, f64\u003e {\n        let mut reporte = HashMap::new();\n\n        self.ventas.iter().for_each(|v| {\n            let descuento = self.get_descuento_newsteller(\u0026v.cliente);\n            v.productos.iter().for_each(|(p, cant)|\n                *reporte.entry(p.categoria.clone()).or_insert(0.0) += self.calcular_precio_final(p, *cant)*descuento\n            )\n        });\n\n        reporte\n    }\n\n    pub fn reporte_ventas_vendedor(\u0026self) -\u003e HashMap\u003cu16, f64\u003e {\n        let mut reporte = HashMap::new();\n\n        self.ventas.iter().for_each(|v|\n            *reporte.entry(v.vendedor.legajo).or_insert(0.0) += self.calcular_precio_total(\u0026v)\n        );\n\n        reporte\n    }\n}\n\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    \n    fn crear_sistema_base() -\u003e SistemaVentas {\n        let mut sv = SistemaVentas::new();\n        assert!(sv.registrar_venta(\n            Fecha::new(1, 2, 2026),\n            Cliente::new(\"Pedro\", \"Perez\", \"7 y 47\", Some(\"pedro.perez@gmail.com\"), 43_298_371), \n            Vendedor::new(1234, 6, 900_000.0), \n            MedioPago::Efectivo, \n            vec![\n                (Producto::new(\"Arroz 1Kg\", Categoria::Comida, 1050.0), 2),\n                (Producto::new(\"Fideos Tallarin\", Categoria::Comida, 1250.0), 4),\n                (Producto::new(\"Cargador Celular\", Categoria::Electronica, 5649.99), 1),\n                (Producto::new(\"Par Medias\", Categoria::Ropa, 3999.99), 1),\n            ]).is_ok());\n        assert!(sv.registrar_venta(\n            Fecha::new(26, 5, 2026),\n            Cliente::new(\"Maria\", \"Sanchez\", \"4 y 42\", None, 39_876_019), \n            Vendedor::new(1234, 6, 900_000.0), \n            MedioPago::Efectivo, \n            vec![\n                (Producto::new(\"Queso Crema\", Categoria::Comida, 2349.99), 2),\n                (Producto::new(\"Aceite Auto\", Categoria::Automotor, 44499.99), 1),\n                (Producto::new(\"36u Bloques Construccion\", Categoria::Juguetes, 30000.0), 1),\n            ]).is_ok());\n        assert!(sv.registrar_venta(\n            Fecha::new(3, 6, 2026),\n            Cliente::new(\"Juan\", \"Martinez\", \"2 y 37\", Some(\"juan.martinez@gmail.com\"), 44_414_141), \n            Vendedor::new(5678, 15, 1_200_000.0), \n            MedioPago::TarjetaDebito, \n            vec![\n                (Producto::new(\"Desodorante\", Categoria::Belleza, 6500.0), 1),\n                (Producto::new(\"Mancuerna 5kg\", Categoria::Deportes, 14999.99), 2),\n                (Producto::new(\"Harry Potter\", Categoria::Libros, 34999.99), 1),\n                (Producto::new(\"Lampara LED\", Categoria::Hogar, 7000.0), 1)\n            ]).is_ok());\n\n        sv\n    }\n\n    #[test]\n    fn test_crear_venta() {\n        let mut sv = SistemaVentas::new();\n        assert!(sv.registrar_venta(\n            Fecha::new(1, 2, 2026),\n            Cliente::new(\"Pedro\", \"Perez\", \"7 y 47\", Some(\"pedro.perez@gmail.com\"), 43_298_371), \n            Vendedor::new(1234, 6, 900_000.0), \n            MedioPago::Efectivo, \n            vec![ \n                (Producto::new(\"Arroz 1Kg\", Categoria::Comida, 1050.0), 2),\n                (Producto::new(\"Fideos Tallarin\", Categoria::Comida, 1250.0), 4),\n                (Producto::new(\"Cargador Celular\", Categoria::Electronica, 5649.99), 1),\n                (Producto::new(\"Par Medias\", Categoria::Ropa, 3999.99), 1),\n            ]).is_ok());\n        assert!(sv.registrar_venta(\n            Fecha::new(26, 5, 2026),\n            Cliente::new(\"Maria\", \"Sanchez\", \"4 y 42\", None, 39_876_019), \n            Vendedor::new(1234, 6, 900_000.0), \n            MedioPago::Efectivo, \n            vec![ \n                (Producto::new(\"Queso Crema\", Categoria::Comida, 2349.99), 2),\n                (Producto::new(\"Aceite Auto\", Categoria::Automotor, 44499.99), 1),\n                (Producto::new(\"36u Bloques Construccion\", Categoria::Juguetes, 30000.0), 1),\n            ]).is_ok());\n        assert!(sv.registrar_venta(\n            Fecha::new(3, 6, 2026),\n            Cliente::new(\"Juan\", \"Martinez\", \"2 y 37\", Some(\"juan.martinez@gmail.com\"), 44_414_141), \n            Vendedor::new(5678, 15, 1_200_000.0), \n            MedioPago::TarjetaDebito, \n            vec![\n                (Producto::new(\"Desodorante\", Categoria::Belleza, 6500.0), 1),\n                (Producto::new(\"Mancuerna 5kg\", Categoria::Deportes, 14999.99), 2),\n                (Producto::new(\"Harry Potter\", Categoria::Libros, 34999.99), 1),\n                (Producto::new(\"Lampara LED\", Categoria::Hogar, 7000.0), 1),\n                (Producto::new(\"Suplemento Vitamina C\", Categoria::Salud, 15000.0), 1),\n            ]).is_ok());\n        assert!(sv.get_venta(0).is_some_and(|v| v.cliente.dni == 43_298_371 \u0026\u0026 v.productos.len() == 4));\n        assert!(sv.get_venta(1).is_some_and(|v| v.cliente.dni == 39_876_019 \u0026\u0026 v.productos.len() == 3));\n        assert!(sv.get_venta(2).is_some_and(|v| v.cliente.dni == 44_414_141 \u0026\u0026 v.productos.len() == 5));\n        assert!(sv.get_venta(3).is_none());\n\n        assert!(sv.get_vendedor(1234).is_some());\n        assert!(sv.get_vendedor(5678).is_some());\n        assert!(sv.get_vendedor(2345).is_none());\n    }\n\n    #[test]\n    fn test_crear_venta_error() {\n        let mut sv = SistemaVentas::new();\n        assert!(sv.registrar_venta(\n            Fecha::new(1, 2, 2026),\n            Cliente::new(\"Pedro\", \"Perez\", \"7 y 47\", Some(\"pedro.perez@gmail.com\"), 43_298_371), \n            Vendedor::new(1234, 6, 900_000.0), \n            MedioPago::Efectivo, \n            vec![]).is_err_and(|e| e == ErrorVenta::ListaProductosVacia));\n\n        assert!(sv.registrar_venta(\n            Fecha::new(1, 2, 2026),\n            Cliente::new(\"Pedro\", \"Perez\", \"7 y 47\", Some(\"pedro.perez@gmail.com\"), 43_298_371), \n            Vendedor::new(1234, 6, 900_000.0), \n            MedioPago::Efectivo, \n            vec![\n                (Producto::new(\"Arroz 1Kg\", Categoria::Comida, 1050.0), 2),\n                (Producto::new(\"Fideos Tallarin\", Categoria::Comida, -1250.0), 4)\n            ]).is_err_and(|e| e == ErrorVenta::PrecioCeroNegativo));\n        assert!(sv.registrar_venta(\n            Fecha::new(1, 2, 2026),\n            Cliente::new(\"Pedro\", \"Perez\", \"7 y 47\", Some(\"pedro.perez@gmail.com\"), 43_298_371), \n            Vendedor::new(1234, 6, 900_000.0), \n            MedioPago::Efectivo, \n            vec![\n                (Producto::new(\"Arroz 1Kg\", Categoria::Comida, 0.0), 2),\n                (Producto::new(\"Fideos Tallarin\", Categoria::Comida, 1250.0), 4)\n            ]).is_err_and(|e| e == ErrorVenta::PrecioCeroNegativo));\n\n        assert!(sv.registrar_venta(\n            Fecha::new(1, 2, 2026),\n            Cliente::new(\"Pedro\", \"Perez\", \"7 y 47\", Some(\"pedro.perez@gmail.com\"), 43_298_371), \n            Vendedor::new(1234, 6, 900_000.0), \n            MedioPago::Efectivo, \n            vec![\n                (Producto::new(\"Arroz 1Kg\", Categoria::Comida, 1050.0), 2),\n                (Producto::new(\"Fideos Tallarin\", Categoria::Comida, 1250.0), 0)\n            ]).is_err_and(|e| e == ErrorVenta::CantidadCero));\n    }\n\n    #[test]\n    fn test_calcular_precio_total() {\n        let mut sv = crear_sistema_base();\n        assert_eq!(sv.calcular_precio_total(sv.get_venta(0).unwrap()), (1050.0*2.0*0.95+1250.0*4.0*0.95+5649.99+3999.99*0.95)*0.9);\n        assert_eq!(sv.calcular_precio_total(sv.get_venta(1).unwrap()), 2349.99*0.95*2.0+44499.99+30000.0);\n        assert_eq!(sv.calcular_precio_total(sv.get_venta(2).unwrap()), (6500.0*0.95+14999.99*2.0+34999.99*0.9+7000.0*0.9)*0.9);\n    }\n\n    #[test]\n    fn test_reporte_ventas_categoria() {\n        let mut sv = crear_sistema_base();\n        let reporte = sv.reporte_ventas_categoria();\n        assert_eq!(reporte.len(), 9);\n        assert!(reporte.get(\u0026Categoria::Automotor).is_some_and(|v| *v == 44499.99));\n        assert!(reporte.get(\u0026Categoria::Belleza).is_some_and(|v| *v == 6500.0*0.95*0.9));\n        assert!(reporte.get(\u0026Categoria::Comida).is_some_and(|v| *v == (1050.0*0.95*2.0+1250.0*0.95*4.0)*0.9+2349.99*0.95*2.0));\n        assert!(reporte.get(\u0026Categoria::Deportes).is_some_and(|v| *v == 14999.99*2.0*0.9));\n        assert!(reporte.get(\u0026Categoria::Electronica).is_some_and(|v| *v == 5649.99*0.9));\n        assert!(reporte.get(\u0026Categoria::Hogar).is_some_and(|v| *v == 7000.0*0.9*0.9));\n        assert!(reporte.get(\u0026Categoria::Juguetes).is_some_and(|v| *v == 30000.0));\n        assert!(reporte.get(\u0026Categoria::Libros).is_some_and(|v| *v == 34999.99*0.9*0.9));\n        assert!(reporte.get(\u0026Categoria::Ropa).is_some_and(|v| *v == 3999.99*0.95*0.9));\n        assert!(reporte.get(\u0026Categoria::Salud).is_none());\n\n        sv.registrar_venta(\n            Fecha::new(1, 1, 2026), \n            Cliente::new(\"\", \"\", \"\", Some(\"\"), 123), \n            Vendedor::new(5678, 15, 1_200_000.0),\n            MedioPago::TarjetaDebito,\n            vec![\n                (Producto::new(\"Suplemento Vitamina C\", Categoria::Salud, 15000.0), 2)\n            ]);\n        let reporte = sv.reporte_ventas_categoria();\n        assert_eq!(reporte.len(), 10);\n        assert!(reporte.get(\u0026Categoria::Salud).is_some_and(|v| *v == 15000.0*2.0*0.9));\n    }\n\n    #[test]\n    fn test_reporte_ventas_vendedor() {\n        let mut sv = crear_sistema_base();\n        let reporte = sv.reporte_ventas_vendedor();\n        assert_eq!(reporte.len(), 2);\n        assert!(reporte.get(\u00261234).is_some_and(|v| *v == (1050.0*0.95*2.0+1250.0*0.95*4.0+5649.99+3999.99*0.95)*0.9 + (2349.99*0.95*2.0+44499.99+30000.0) ));\n        assert!(reporte.get(\u00265678).is_some_and(|v| *v == (6500.0*0.95+14999.99*2.0+34999.99*0.9+7000.0*0.9)*0.9 ));\n        assert!(reporte.get(\u00262345).is_none());\n    }\n}","traces":[{"line":12,"address":[937440],"length":1,"stats":{"Line":1}},{"line":13,"address":[937445],"length":1,"stats":{"Line":1}},{"line":14,"address":[937476],"length":1,"stats":{
