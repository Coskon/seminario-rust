<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <style>:root {
  --color: black;
  --bg: white;
  --head-bg: white;
  --link: #338;

  --blue: #ccf;
  --red: #fcc;
  --yellow: #ffc;
  --green: #cfc;
}

[data-theme='dark'] {
  --color: white;
  --bg: black;
  --head-bg: #333;
  --link: #aaf;

  --blue: #225;
  --red: #522;
  --yellow: #552;
  --green: #252;
}

html,
body {
  margin: 0;
  padding: 0;
  color: var(--color);
  background: var(--bg);
}

.app {
  margin: 10px;
  padding: 0;
}

.files-list {
  margin: 10px 0 0;
  width: 100%;
  border-collapse: collapse;
}
.files-list__head {
  border: 1px solid #999;
}
.files-list__head > tr > th {
  padding: 10px;
  border: 1px solid #999;
  text-align: left;
  font-weight: normal;
  background: var(--head-bg);
}
.files-list__body {
}
.files-list__file {
  cursor: pointer;
}
.files-list__file:hover {
  background: var(--blue);
}
.files-list__file > td {
  padding: 10px;
  border: 1px solid #999;
}
.files-list__file > td:first-child::before {
  content: '\01F4C4';
  margin-right: 1em;
}
.files-list__file_low {
  background: var(--red);
}
.files-list__file_medium {
  background: var(--yellow);
}
.files-list__file_high {
  background: var(--green);
}
.files-list__file_folder > td:first-child::before {
  content: '\01F4C1';
  margin-right: 1em;
}

.file-header {
  border: 1px solid #999;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  background: var(--bg);
}

.file-header__back {
  margin: 10px;
  cursor: pointer;
  flex-shrink: 0;
  flex-grow: 0;
  text-decoration: underline;
  color: var(--link);
}

.file-header__name {
  margin: 10px;
  flex-shrink: 2;
  flex-grow: 2;
}

.file-header__stat {
  margin: 10px;
  flex-shrink: 0;
  flex-grow: 0;
}

.file-content {
  margin: 10px 0 0;
  border: 1px solid #999;
  padding: 10px;
  counter-reset: line;
  display: flex;
  flex-direction: column;
}

.code-line::before {
  content: counter(line);
  margin-right: 72px;
}
.code-line {
  margin: 0;
  height: 1em;
  counter-increment: line;

  position: absolute;
  padding: 0 0.3em 0.3em 0.3em;
  display: inherit;
  width: 100%;
}
.code-line_covered {
  background: var(--green);
}
.code-line_uncovered {
  background: var(--red);
}

.code-text-container {
  position: relative;
  height: 1em;
  padding: 0.3em 0;
}

.cover-indicator {
  display: flex;
  width: 100%;
  position: absolute;
  justify-content: end;
  height: 1em;
  align-items: center;
  padding: 0 0.3em 0.3em 0.3em;
}

.cover-indicator.check-cover::after {
  content: "\2713";
  font-weight: bold;
  background-color: var(--green);
  height: 1em;
}

.cover-indicator.no-cover::after {
  content: "\2716";
  font-weight: bold;
  background-color: var(--red);
  height: 1em;
}

.stat-line-hit {
  max-width: 48px;
  overflow: hidden;
  font-weight: bold;
  margin-right: 4px;
  background-color: var(--green);
  position: relative;
  top: 0.1em;
}

#theme-toggle-label {
  margin-left: 1ch;
}
</style>
</head>

dir) =\u003e format!(\"{}; {}; {}\", self.nombre, self.edad, dir),\n            _ =\u003e format!(\"{}; {}\", self.nombre, self.edad)\n        }\n    }\n\n    pub fn obtener_edad(\u0026self) -\u003e u8 {\n        self.edad\n    }\n\n    pub fn actualizar_direccion(\u0026mut self, nueva_direccion: \u0026str) {\n        self.direccion = Some(nueva_direccion.to_string());\n    }\n}\n\n\n#[test]\nfn test_persona_creacion() {\n    let p1 = Persona::new(\"Juan Pedro\", 23, None);\n    assert_eq!(p1.nombre, \"Juan Pedro\".to_string());\n    assert_eq!(p1.edad, 23 as u8);\n    assert_eq!(p1.direccion, None);\n\n    let p2 = Persona::new(\"Maria\", 28, Some(\"3 y 47 Nro 1111\".to_string()));\n    assert_eq!(p2.nombre, \"Maria\".to_string());\n    assert_eq!(p2.obtener_edad(), 28 as u8);\n    assert_eq!(p2.direccion, Some(\"3 y 47 Nro 1111\".to_string()));\n}\n\n#[test]\nfn test_persona_actualizar_direccion() {\n    let mut p1 = Persona::new(\"Juan Pedro\", 23, None);\n    p1.actualizar_direccion(\"2 y 50 Nro 1234\");\n    assert_eq!(p1.direccion, Some(\"2 y 50 Nro 1234\".to_string()));\n    p1.actualizar_direccion(\"\");\n    assert_eq!(p1.direccion, Some(\"\".to_string()));\n}\n\n#[test]\nfn test_persona_to_string() {\n    let p1 = Persona::new(\"Carlos\", 26, None);\n    assert_eq!(p1.to_string(), \"Carlos; 26\".to_string());\n    let p2 = Persona::new(\"Violeta\", 22, Some(\"4 y 49 Nro 3421\".to_string()));\n    assert_eq!(p2.to_string(), \"Violeta; 22; 4 y 49 Nro 3421\".to_string());\n    let p3 = Persona::new(\"Ricardo\", 24, Some(\"\".to_string()));\n    assert_eq!(p3.to_string(), \"Ricardo; 24; \".to_string());\n}","traces":[{"line":9,"address":[929206,929024],"length":1,"stats":{"Line":3}},{"line":10,"address":[929119,929067],"length":1,"stats":{"Line":6}},{"line":13,"address":[929232],"length":1,"stats":{"Line":1}},{"line":14,"address":[929262],"length":1,"stats":{"Line":1}},{"line":15,"address":[929321],"length":1,"stats":{"Line":1}},{"line":16,"address":[929549],"length":1,"stats":{"Line":1}},{"line":20,"address":[928832],"length":1,"stats":{"Line":1}},{"line":21,"address":[928837],"length":1,"stats":{"Line":1}},{"line":24,"address":[928848,928950],"length":1,"stats":{"Line":1}},{"line":25,"address":[928981,928923,928877],"length":1,"stats":{"Line":2}}],"covered":10,"coverable":10},{"path":["/","home","cosk","rust","practicas","src","tp03","ej10.rs"],"content":"#![allow(unused)]\nuse std::collections::HashMap;\nuse super::ej3::Fecha;\n\n#[derive(Debug, Clone)]\npub enum Genero {\n    NOVELA, INFANTIL, TECNICO, OTRO\n}\n\nimpl Genero {\n    pub fn equals(\u0026self, other: \u0026Self) -\u003e bool {\n        match (self, other) {\n            (Genero::NOVELA, Genero::NOVELA) =\u003e true, (Genero::TECNICO, Genero::TECNICO) =\u003e true,\n            (Genero::INFANTIL, Genero::INFANTIL) =\u003e true, (Genero::OTRO, Genero::OTRO) =\u003e true,\n            _ =\u003e false\n        }\n    }\n}\n\n#[derive(Debug, Clone)]\npub enum Estado {\n    Devuelto, EnPrestamo\n}\n\nimpl Estado {\n    pub fn equals(\u0026self, other: \u0026Self) -\u003e bool {\n        match (self, other) {\n            (Estado::Devuelto, Estado::Devuelto) =\u003e true,\n            (Estado::EnPrestamo, Estado::EnPrestamo) =\u003e true,\n            _ =\u003e false\n        }\n    }\n}\n\n#[derive(Debug, Clone)]\npub struct Libro {\n    isbn: String,\n    titulo: String,\n    autor: String,\n    paginas: usize,\n    genero: Genero\n}\n\nimpl Libro {\n    pub fn new(isbn: \u0026str, titulo: \u0026str, autor: \u0026str, paginas: usize, genero: Genero) -\u003e Self {\n        Libro { isbn: isbn.to_string(), titulo: titulo.to_string(), autor: autor.to_string(), paginas, genero }\n    }\n\n    pub fn equals(\u0026self, other: \u0026Self) -\u003e bool {\n        self.isbn == other.isbn \u0026\u0026 self.titulo == other.titulo \u0026\u0026 self.autor == other.autor \u0026\u0026\n        self.paginas == other.paginas \u0026\u0026 self.genero.equals(\u0026other.genero)\n    }\n}\n\n#[derive(Debug, Clone)]\npub struct Cliente {\n    nombre: String,\n    telefono: String,\n    email: String\n}\n\nimpl Cliente {\n    pub fn new(nombre: \u0026str, telefono: \u0026str, email: \u0026str) -\u003e Self {\n        Cliente { nombre: nombre.to_string(), telefono: telefono.to_string(), email: email.to_string() }\n    }\n\n    pub fn equals(\u0026self, other: \u0026Self) -\u003e bool {\n        self.nombre == other.nombre \u0026\u0026 self.telefono == other.telefono \u0026\u0026 self.email == other.email\n    }\n}\n\n#[derive(Debug)]\npub struct Prestamo {\n    libro: Libro,\n    cliente: Cliente,\n    fecha_vencimiento: Fecha,\n    fecha_devolucion: Option\u003cFecha\u003e,\n    estado: Estado\n}\n\nimpl Prestamo {\n    pub fn new(libro: Libro, cliente: Cliente, fecha_vencimiento: Fecha, fecha_devolucion: Option\u003cFecha\u003e, estado: Estado) -\u003e Self {\n        Prestamo { libro, cliente, fecha_devolucion, fecha_vencimiento, estado }\n    }\n}\n\n#[derive(Debug)]\npub struct Biblioteca {\n    nombre: String,\n    direccion: String,\n    libros_disponibles: HashMap\u003cString, usize\u003e,\n    prestamos_efectuados: Vec\u003cPrestamo\u003e\n}\n\nimpl Biblioteca {\n    pub fn new(nombre: \u0026str, direccion: \u0026str) -\u003e Self {\n        Biblioteca { nombre: nombre.to_string(), direccion: direccion.to_string(), libros_disponibles: HashMap::new(), prestamos_efectuados: vec![] }\n    }\n\n    pub fn cantidad_copias(\u0026self, libro: \u0026Libro) -\u003e usize {\n        if let Some(cant) = self.libros_disponibles.get(\u0026libro.isbn) {\n            return *cant\n        }\n        0\n    }\n\n    pub fn decrementar_copias(\u0026mut self, libro: \u0026Libro) -\u003e bool {\n        if let Some(cant) = self.libros_disponibles.get_mut(\u0026libro.isbn) {\n            if *cant \u003e 0 {\n                *cant -= 1;\n                return true\n            }\n        }\n        false\n    }\n\n    pub fn incrementar_copias(\u0026mut self, libro: \u0026Libro) {\n        if let Some(cant) = self.libros_disponibles.get_mut(\u0026libro.isbn) {\n            *cant += 1;\n        } else {\n            self.libros_disponibles.insert(libro.isbn.clone(), 1);\n        }\n    }\n\n    pub fn contar_prestamos(\u0026self, email_cliente: \u0026str) -\u003e usize {\n        let mut cant = 0_usize;\n        for prestamo in \u0026self.prestamos_efectuados {\n            if prestamo.cliente.email.as_str() == email_cliente \u0026\u0026 prestamo.estado.equals(\u0026Estado::EnPrestamo) {\n                cant += 1;\n            }\n        }\n        cant\n    }\n\n    pub fn realizar_prestamo(\u0026mut self, cliente: Cliente, libro: Libro, fecha_vencimiento: Fecha) -\u003e bool {\n        if self.contar_prestamos(\u0026cliente.email) \u003e 5 {\n            return false\n        }\n\n        if (!self.decrementar_copias(\u0026libro)) {\n            return false\n        }\n\n        self.prestamos_efectuados.push(Prestamo::new(\n            libro, cliente, fecha_vencimiento, None, Estado::EnPrestamo\n        ));\n        true\n    }\n\n    pub fn prestamos_a_vencer(\u0026self, antes_de_dias: u32) -\u003e Vec\u003c\u0026Prestamo\u003e {\n        let mut prest_vencer = vec![];\n        let mut fecha_limite = Fecha::fecha_actual(); fecha_limite.sumar_dias(antes_de_dias);\n        for prestamo in \u0026self.prestamos_efectuados {\n            if prestamo.estado.equals(\u0026Estado::EnPrestamo) \u0026\u0026 fecha_limite.es_mayor(\u0026prestamo.fecha_vencimiento) {\n                prest_vencer.push(prestamo);\n            }\n        }\n        prest_vencer\n    }\n\n    pub fn prestamos_vencidos(\u0026self) -\u003e Vec\u003c\u0026Prestamo\u003e {\n        self.prestamos_a_vencer(0)\n    }\n\n    pub fn buscar_prestamo(\u0026mut self, libro: \u0026Libro, cliente: \u0026Cliente) -\u003e Option\u003c\u0026mut Prestamo\u003e {\n        for prestamo in self.prestamos_efectuados.iter_mut() {\n            if prestamo.libro.equals(libro) \u0026\u0026 prestamo.cliente.equals(cliente) {\n                return Some(prestamo)\n            }\n        }\n        None\n    }\n\n    pub fn devolver_libro(\u0026mut self, libro: \u0026Libro, cliente: \u0026Cliente, fecha_devolucion: Fecha) -\u003e bool {\n        if let Some(prestamo) = self.buscar_prestamo(libro, cliente) {\n            if prestamo.estado.equals(\u0026Estado::EnPrestamo) {\n                prestamo.estado = Estado::Devuelto;\n                prestamo.fecha_devolucion = Some(fecha_devolucion);\n                self.incrementar_copias(libro);\n                return true\n            }\n        }\n        false\n    }\n}\n\n#[test]\nfn test_biblioteca_cantidad_copias() {\n    let mut b = Biblioteca::new(\"Biblioteca La Plata\", \"Plaza Dardo Rocha 137\");\n    let l1 = Libro::new(\n        \"978-0-306-40615-7\", \"Harry Potter y la Piedra Filosofal\", \n        \"J. K. Rowling\", 260, Genero::NOVELA\n    );\n    assert_eq!(b.cantidad_copias(\u0026l1), 0);\n    b.incrementar_copias(\u0026l1);\n    assert_eq!(b.cantidad_copias(\u0026l1), 1);\n}\n\n#[test]\nfn test_biblioteca_incrementar_copias() {\n    let mut b = Biblioteca::new(\"Biblioteca La Plata\", \"Plaza Dardo Rocha 137\");\n    let l1 = Libro::new(\n        \"978-8-478-88445-2\" , \"Harry Potter y la Piedra Filosofal\", \n        \"J. K. Rowling\", 260, Genero::NOVELA\n    );\n    let l2 = Libro::new(\n        \"978-8-427-20212-2\", \"Los Juegos del Hambre\", \n        \"Suzanne Collins\", 396, Genero::OTRO\n    );\n    b.incrementar_copias(\u0026l1);\n    assert_eq!(b.cantidad_copias(\u0026l1), 1);\n    b.incrementar_copias(\u0026l1);\n    assert_eq!(b.cantidad_copias(\u0026l1), 2);\n    b.incrementar_copias(\u0026l2);\n    assert_eq!(b.cantidad_copias(\u0026l2), 1);\n}\n\n#[test]\nfn test_biblioteca_decrementar_copias() {\n    let mut b = Biblioteca::new(\"Biblioteca La Plata\", \"Plaza Dardo Rocha 137\");\n    let l1 = Libro::new(\n        \"978-8-478-88445-2\" , \"Harry Potter y la Piedra Filosofal\", \n        \"J. K. Rowling\", 260, Genero::NOVELA\n    );\n    let l2 = Libro::new(\n        \"978-8-427-20212-2\", \"Los Juegos del Hambre\", \n        \"Suzanne Collins\", 396, Genero::OTRO\n    );\n    assert!(!b.decrementar_copias(\u0026l1));\n    assert!(!b.decrementar_copias(\u0026l2));\n\n    b.incrementar_copias(\u0026l1);\n    b.incrementar_copias(\u0026l1);\n\n    b.incrementar_copias(\u0026l2);\n    b.incrementar_copias(\u0026l2);\n    b.incrementar_copias(\u0026l2);\n\n    assert!(b.decrementar_copias(\u0026l1));\n    assert_eq!(b.cantidad_copias(\u0026l1), 1);\n    assert!(b.decrementar_copias(\u0026l1));\n    assert_eq!(b.cantidad_copias(\u0026l1), 0);\n    assert!(!b.decrementar_copias(\u0026l1));\n\n    assert!(b.decrementar_copias(\u0026l2));\n    assert_eq!(b.cantidad_copias(\u0026l2), 2);\n    assert!(b.decrementar_copias(\u0026l2));\n    assert_eq!(b.cantidad_copias(\u0026l2), 1);\n    assert!(b.decrementar_copias(\u0026l2));\n    assert_eq!(b.cantidad_copias(\u0026l2), 0);\n    assert!(!b.decrementar_copias(\u0026l2));\n}\n\n#[test]\nfn test_biblioteca_contar_prestamos() {\n    let mut b = Biblioteca::new(\"Biblioteca La Plata\", \"Plaza Dardo Rocha 137\");\n    let l1 = Libro::new(\n        \"978-8-478-88445-2\" , \"Harry Potter y la Piedra Filosofal\", \n        \"J. K. Rowling\", 260, Genero::NOVELA\n    );\n    let l2 = Libro::new(\n        \"978-8-427-20212-2\", \"Los Juegos del Hambre\", \n        \"Suzanne Collins\", 396, Genero::OTRO\n    );\n    b.incrementar_copias(\u0026l1); b.incrementar_copias(\u0026l1); b.incrementar_copias(\u0026l1);\n    \n\n    let cliente = Cliente::new(\"Pedro\", \"221 123-4567\", \"pedro@gmail.com\");\n    assert_eq!(b.contar_prestamos(\"pedro@gmail.com\"), 0);\n    assert!(b.realizar_prestamo(cliente.clone(), l1.clone(), Fecha::new(16, 6, 2026)));\n    assert_eq!(b.contar_prestamos(\"pedro@gmail.com\"), 1);\n    assert!(b.realizar_prestamo(cliente.clone(), l1.clone(), Fecha::new(16, 6, 2026)));\n    assert_eq!(b.contar_prestamos(\"pedro@gmail.com\"), 2);\n\n    assert_eq!(b.contar_prestamos(\"maria@hotmail.com\"), 0);\n\n    assert!(b.devolver_libro(\u0026l1, \u0026cliente, Fecha::new(19, 5, 2026)));\n    assert_eq!(b.contar_prestamos(cliente.email.as_str()), 1);\n}\n\n#[test]\nfn test_biblioteca_realizar_prestamo() {\n    let mut b = Biblioteca::new(\"Biblioteca La Plata\", \"Plaza Dardo Rocha 137\");\n    let l1 = Libro::new(\n        \"978-8-478-88445-2\" , \"Harry Potter y la Piedra Filosofal\", \n        \"J. K. Rowling\", 260, Genero::NOVELA\n    );\n    let l2 = Libro::new(\n        \"978-8-427-20212-2\", \"Los Juegos del Hambre\", \n        \"Suzanne Collins\", 396, Genero::OTRO\n    );\n    for i in 0..5 { // 5 copias de cada libro\n        b.incrementar_copias(\u0026l1);\n        b.incrementar_copias(\u0026l2);\n    }\n    \n\n    let cliente = Cliente::new(\"Pedro\", \"221 123-4567\", \"pedro@gmail.com\");\n    assert!(!b.realizar_prestamo(cliente.clone(), Libro::new(\"1234\", \"libro\", \"autor\", 1000, Genero::OTRO), Fecha::new(15, 7, 2026))); // libro no existe\n    assert!(b.realizar_prestamo(cliente.clone(), l1.clone(), Fecha::new(16, 6, 2026)));\n    assert!(b.realizar_prestamo(cliente.clone(), l1.clone(), Fecha::new(18, 6, 2026)));\n    assert!(b.realizar_prestamo(cliente.clone(), l2.clone(), Fecha::new(5, 6, 2026)));\n    assert!(b.realizar_prestamo(cliente.clone(), l2.clone(), Fecha::new(24, 5, 2026)));\n    assert!(b.realizar_prestamo(cliente.clone(), l1.clone(), Fecha::new(29, 7, 2026)));\n    assert!(b.realizar_prestamo(cliente.clone(), l2.clone(), Fecha::new(4, 8, 2026)));\n    assert!(!b.realizar_prestamo(cliente.clone(), l2.clone(), Fecha::new(15, 7, 2026))); // mas de 5 prestamos \"en prestamo\" alcanzados\n\n    b.devolver_libro(\u0026l1, \u0026cliente, Fecha::new(19, 5, 2026));\n    assert!(b.realizar_prestamo(cliente.clone(), l1.clone(), Fecha::new(15, 7, 2026))); // mas de 5 prestamos alcanzados pero 5 \"en prestamo\", 1 \"devuelto\"\n}\n\n#[test]\nfn test_biblioteca_prestamos_a_vencer() {\n    let mut b = Biblioteca::new(\"Biblioteca La Plata\", \"Plaza Dardo Rocha 137\");\n    let l1 = Libro::new(\n        \"978-8-478-88445-2\" , \"Harry Potter y la Piedra Filosofal\", \n        \"J. K. Rowling\", 260, Genero::NOVELA\n    );\n    let l2 = Libro::new(\n        \"978-8-427-20212-2\", \"Los Juegos del Hambre\", \n        \"Suzanne Collins\", 396, Genero::OTRO\n    );\n    for i in 0..5 {\n        b.incrementar_copias(\u0026l1);\n        b.incrementar_copias(\u0026l2);\n    }\n    \n    // fecha actual es 17/5/2026 (para testear)\n    assert!(Fecha::fecha_actual().equals_fecha(17, 5, 2026));\n\n    let cliente = Cliente::new(\"Pedro\", \"221 123-4567\", \"pedro@gmail.com\");\n    assert!(b.realizar_prestamo(cliente.clone(), l2.clone(), Fecha::new(24, 5, 2026))); // vence en 8 dias (dia siguiente al 24)\n    assert!(b.realizar_prestamo(cliente.clone(), l2.clone(), Fecha::new( 5, 6, 2026))); // vence en 20 dias\n    assert!(b.realizar_prestamo(cliente.clone(), l1.clone(), Fecha::new(16, 6, 2026))); // vence en 31 dias\n    assert!(b.realizar_prestamo(cliente.clone(), l1.clone(), Fecha::new(18, 6, 2026))); // vence en 33 dias\n    assert!(b.realizar_prestamo(cliente.clone(), l1.clone(), Fecha::new(29, 7, 2026))); // vence en 74 dias\n    assert!(b.realizar_prestamo(cliente.clone(), l2.clone(), Fecha::new( 4, 8, 2026))); // vence en 80 dias\n\n    assert_eq!(b.prestamos_a_vencer(15).len(), 1); // en 15 dias -\u003e 1/6/2026\n    assert_eq!(b.prestamos_a_vencer(30).len(), 2); // en 30 dias -\u003e 16/6/2026\n    assert_eq!(b.prestamos_a_vencer(31).len(), 3); // en 31 dias -\u003e 17/6/2026\n    assert_eq!(b.prestamos_a_vencer(74).len(), 5); // en 60 dias -\u003e 30/7/2026\n    assert_eq!(b.prestamos_a_vencer(100).len(), 6); // en 100 dias -\u003e 25/8/2026\n}\n\n#[test]\nfn test_biblioteca_prestamos_vencidos() {\n    let mut b = Biblioteca::new(\"Biblioteca La Plata\", \"Plaza Dardo Rocha 137\");\n    let l1 = Libro::new(\n        \"978-8-478-88445-2\" , \"Harry Potter y la Piedra Filosofal\", \n        \"J. K. Rowling\", 260, Genero::NOVELA\n    );\n    let l2 = Libro::new(\n        \"978-8-427-20212-2\", \"Los Juegos del Hambre\", \n        \"Suzanne Collins\", 396, Genero::OTRO\n    );\n    for i in 0..5 {\n        b.incrementar_copias(\u0026l1);\n        b.incrementar_copias(\u0026l2);\n    }\n    \n    // fecha actual es 17/5/2026 (para testear)\n    assert!(Fecha::fecha_actual().equals_fecha(17, 5, 2026));\n\n    let cliente = Cliente::new(\"Pedro\", \"221 123-4567\", \"pedro@gmail.com\");\n    assert!(b.realizar_prestamo(cliente.clone(), l2.clone(), Fecha::new(10, 4, 2026))); // vencido\n    assert!(b.realizar_prestamo(cliente.clone(), l2.clone(), Fecha::new(28, 4, 2026))); // vencido \n    assert!(b.realizar_prestamo(cliente.clone(), l1.clone(), Fecha::new(13, 5, 2026))); // vencido\n    assert!(b.realizar_prestamo(cliente.clone(), l1.clone(), Fecha::new(18, 5, 2026))); // no vencido\n    assert!(b.realizar_prestamo(cliente.clone(), l1.clone(), Fecha::new( 5, 6, 2026))); // no vencido\n    assert!(b.realizar_prestamo(cliente.clone(), l2.clone(), Fecha::new(15, 7, 2026))); // no vencido\n\n    assert_eq!(b.prestamos_vencidos().len(), 3);\n}\n\n#[test]\nfn test_biblioteca_buscar_prestamo() {\n    let mut b = Biblioteca::new(\"Biblioteca La Plata\", \"Plaza Dardo Rocha 137\");\n    let l1 = Libro::new(\n        \"978-8-478-88445-2\" , \"Harry Potter y la Piedra Filosofal\", \n        \"J. K. Rowling\", 260, Genero::NOVELA\n    );\n    let l2 = Libro::new(\n        \"978-8-427-20212-2\", \"Los Juegos del Hambre\", \n        \"Suzanne Collins\", 396, Genero::OTRO\n    );\n    for i in 0..5 {\n        b.incrementar_copias(\u0026l1);\n        b.incrementar_copias(\u0026l2);\n    }\n\n    let cliente = Cliente::new(\"Pedro\", \"221 123-4567\", \"pedro@gmail.com\");\n    assert!(b.realizar_prestamo(cliente.clone(), l2.clone(), Fecha::new(10, 6, 2026)));\n    assert!(b.realizar_prestamo(cliente.clone(), l1.clone(), Fecha::new(13, 7, 2026)));\n\n    assert!(b.buscar_prestamo(\u0026l1, \u0026cliente).unwrap().cliente.equals(\u0026cliente));\n    assert!(b.buscar_prestamo(\n        \u0026Libro::new(\n            \"978-8-427-20212-2\", \"Los Juegos del Hambre\", \n            \"Suzanne Collins\", 396, Genero::OTRO\n        ),\n        \u0026Cliente::new(\"Pedro\", \"221 123-4567\", \"pedro@gmail.com\")\n    ).unwrap().estado.equals(\u0026Estado::EnPrestamo));\n\n    assert!(b.devolver_libro(\u0026l1, \u0026cliente, Fecha::new(20, 5, 2026)));\n    assert!(b.buscar_prestamo(\u0026l1, \u0026cliente).unwrap().estado.equals(\u0026Estado::Devuelto));\n\n    assert!(b.buscar_prestamo(\u0026l1, \u0026Cliente::new(\"abc\", \"def\", \"ghi@jkl.mno\")).is_none()); // prestamo que no existe\n    let mut l2 = l1.clone();\n    l2.genero = Genero::INFANTIL;\n    assert!(b.buscar_prestamo(\u0026l2, \u0026cliente).is_none()); // libro de distinto genero\n}\n\n#[test]\nfn test_biblioteca_devolver_libro() {\n    let mut b = Biblioteca::new(\"Biblioteca La Plata\", \"Plaza Dardo Rocha 137\");\n    let l1 = Libro::new(\n        \"978-8-478-88445-2\" , \"Harry Potter y la Piedra Filosofal\", \n        \"J. K. Rowling\", 260, Genero::NOVELA\n    );\n    let l2 = Libro::new(\n        \"978-8-427-20212-2\", \"Los Juegos del Hambre\", \n        \"Suzanne Collins\", 396, Genero::OTRO\n    );\n    for i in 0..5 {\n        b.incrementar_copias(\u0026l1);\n        b.incrementar_copias(\u0026l2);\n    }\n\n    let cliente = Cliente::new(\"Pedro\", \"221 123-4567\", \"pedro@gmail.com\");\n    assert!(b.realizar_prestamo(cliente.clone(), l2.clone(), Fecha::new(10, 6, 2026)));\n    assert!(b.realizar_prestamo(cliente.clone(), l1.clone(), Fecha::new(13, 7, 2026)));\n\n    assert!(b.devolver_libro(\u0026l1, \u0026cliente, Fecha::new(20, 5, 2026)));\n    assert!(!b.devolver_libro(\u0026l1, \u0026cliente, Fecha::new(20, 5, 2026))); // libro ya devuelto, no se puede volver a devolver\n    assert!(b.devolver_libro(\u0026l2, \u0026cliente, Fecha::new(20, 5, 2026)));\n}","traces":[{"line":11,"address":[925052,925008],"length":1,"stats":{"Line":3}},{"line":12,"address":[925059,925023],"length":1,"stats":{"Line":6}},{"line":13,"address":[925118,925144],"length":1,"stats":{"Line":3}},{"line":14,"address":[925137,925151],"length":1,"stats":{"Line":1}},{"line":15,"address":[925125],"length":1,"stats":{"Line":1}},{"line":26,"address":[924896],"length":1,"stats":{"Line":4}},{"line":27,"address":[924911],"length":1,"stats":{"Line":4}},{"line":28,"address":[924975],"length":1,"stats":{"Line":1}},{"line":29,"address":[924987],"length":1,"stats":{"Line":4}},{"line":30,"address":[924968],"length":1,"stats":{"Line":2}},{"line":45,"address":[924715,924352,924709],"length":1,"stats":{"Line":7}},{"line":46,"address":[924473],"length":1,"stats":{"Line":7}},{"line":49,"address":[924736],"length":1,"stats":{"Line":3}},{"line":50,"address":[924768,924759],"length":1,"stats":{"Line":5}},{"line":51,"address":[924840],"length":1,"stats":{"Line":1}},{"line":63,"address":[925168,925479,925485],"length":1,"stats":{"Line":3}},{"line":64,"address":[925262],"length":1,"stats":{"Line":3}},{"line":67,"address":[925504],"length":1,"stats":{"Line":3}},{"line":68,"address":[925527],"length":1,"stats":{"Line":3}},{"line":82,"address":[925616],"length":1,"stats":{"Line":4}},{"line":96,"address":[903887,903536,903893],"length":1,"stats":{"Line":7}},{"line":97,"address":[903599],"length":1,"stats":{"Line":7}},{"line":100,"address":[901744],"length":1,"stats":{"Line":1}},{"line":101,"address":[901758],"length":1,"stats":{"Line":1}},{"line":102,"address":[901810],"length":1,"stats":{"Line":2}},{"line":104,"address":[901819],"length":1,"stats":{"Line":1}},{"line":107,"address":[902720],"length":1,"stats":{"Line":1}},{"line":108,"address":[902734],"length":1,"stats":{"Line":1}},{"line":109,"address":[902791],"length":1,"stats":{"Line":1}},{"line ayor a 0\")]\n#[test]\nfn test_rectangulo_creacion_longitud_cero() {\n    Rectangulo::new(0.0, 1.0);\n}\n\n#[should_panic(expected=\"El ancho debe ser mayor a 0\")]\n#[test]\nfn test_rectangulo_creacion_ancho_cero() {\n    Rectangulo::new(1.5, -0.0);\n}\n\n#[test]\nfn test_rectangulo_area() {\n    let r = Rectangulo::new(3.0, 4.0);\n    assert_eq!(r.calcular_area(), 12.0);\n\n    let r = Rectangulo::new(1.45, 3.76);\n    assert_eq!(r.calcular_area(), 5.452);\n\n    let r = Rectangulo::new(1.0, 1.0);\n    assert_eq!(r.calcular_area(), 1.0);\n}\n\n#[test]\nfn test_rectangulo_perimetro() {\n    let r = Rectangulo::new(3.0, 4.0);\n    assert_eq!(r.calcular_perimetro(), 14.0);\n\n    let r = Rectangulo::new(1.45, 3.76);\n    assert_eq!(r.calcular_perimetro(), 10.42);\n\n    let r = Rectangulo::new(1.0, 1.0);\n    assert_eq!(r.calcular_perimetro(), 4.0);\n}\n\n#[test]\nfn test_rectangulo_es_cuadrado() {\n    let r = Rectangulo::new(3.0, 4.0);\n    assert_eq!(r.es_cuadrado(), false);\n\n    let r = Rectangulo::new(1.45, 3.76);\n    assert_eq!(r.es_cuadrado(), false);\n\n    let r = Rectangulo::new(1.0, 1.0);\n    assert_eq!(r.es_cuadrado(), true);\n\n    let r = Rectangulo::new(f64::MAX, f64::MAX);\n    assert_eq!(r.es_cuadrado(), true);\n}","traces":[{"line":8,"address":[716016],"length":1,"stats":{"Line":7}},{"line":9,"address":[716057],"length":1,"stats":{"Line":7}},{"line":10,"address":[716083],"length":1,"stats":{"Line":2}},{"line":12,"address":[716072],"length":1,"stats":{"Line":5}},{"line":13,"address":[716136],"length":1,"stats":{"Line":2}},{"line":18,"address":[715952],"length":1,"stats":{"Line":1}},{"line":19,"address":[715957],"length":1,"stats":{"Line":1}},{"line":22,"address":[715968],"length":1,"stats":{"Line":1}},{"line":23,"address":[715973],"length":1,"stats":{"Line":1}},{"line":26,"address":[715920],"length":1,"stats":{"Line":1}},{"line":27,"address":[715925],"length":1,"stats":{"Line":1}}],"covered":11,"coverable":11},{"path":["/","home","cosk","rust","practicas","src","tp03","ej3.rs"],"content":"#![allow(unused)]\n#[derive(Debug, Clone)] // TODO\npub struct Fecha {\n    pub dia: u32,\n    pub mes: u32,\n    pub anio: u64\n}\n\nimpl Fecha {\n    pub fn new(dia: u32, mes: u32, anio: u64) -\u003e Self {\n        Fecha { dia, mes, anio }\n    }\n\n    fn dias_del_mes(\u0026self) -\u003e [u32; 12] {\n        let febrero: u32 = if self.es_bisiesto() { 29 } else { 28 };\n        [31, febrero, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31]\n    }\n\n    pub fn es_bisiesto(\u0026self) -\u003e bool {\n        self.anio % 4 == 0 \u0026\u0026 (self.anio % 100 != 0 || self.anio % 400 == 0)\n    }\n\n    pub fn es_fecha_valida(\u0026self) -\u003e bool {\n        let dias_por_mes = self.dias_del_mes();\n        self.mes \u003e 0 \u0026\u0026 self.mes \u003c= 12 \u0026\u0026 self.dia \u003e 0 \u0026\u0026 self.dia \u003c= dias_por_mes[(self.mes-1) as usize]\n    }\n\n    pub fn sumar_dias(\u0026mut self, mut dias: u32) {\n        if !self.es_fecha_valida() {\n            panic!(\"Fecha invalida\")\n        }\n\n        while dias \u003e 0 {\n            // calculo en cada iteracion por si el año cambia a uno bisiesto\n            let dias_por_mes = self.dias_del_mes();\n            let dias_mes_actual: u32 = dias_por_mes[(self.mes-1) as usize];\n\n            let restantes = dias_mes_actual - self.dia;\n            if dias \u003c= restantes {\n                self.dia += dias;\n                break;\n            } else {\n                dias -= restantes + 1;\n                self.dia = 1;\n                self.mes += 1;\n                if self.mes \u003e 12 {\n                    self.mes = 1;\n                    self.anio += 1;\n                }\n            }\n        }\n    }\n\n    pub fn restar_dias(\u0026mut self, mut dias: u32) {\n        if !self.es_fecha_valida() {\n            panic!(\"Fecha invalida\")\n        }\n\n        while dias \u003e 0 {\n            if dias \u003c self.dia {\n                self.dia -= dias;\n                break;\n            } else {\n                dias -= self.dia;\n\n                self.mes -= 1;\n                if self.mes == 0 {\n                    self.mes = 12;\n                    self.anio -= 1;\n                }\n\n                let dias_por_mes = self.dias_del_mes();\n                let dias_mes_actual: u32 = dias_por_mes[(self.mes-1) as usize];\n                \n                self.dia = dias_mes_actual;\n            }\n        }\n    }\n\n    pub fn es_mayor(\u0026self, other: \u0026Fecha) -\u003e bool {\n        if !self.es_fecha_valida() || !other.es_fecha_valida() {\n            panic!(\"Fechas invalidas a comparar\")\n        }\n        self.anio \u003e other.anio || \n        (self.anio == other.anio \u0026\u0026 self.mes \u003e other.mes) ||\n        (self.anio == other.anio \u0026\u0026 self.mes == other.mes \u0026\u0026 self.dia \u003e other.dia)\n    }\n\n    pub fn equals_fecha(\u0026self, dia: u32, mes: u32, anio: u64) -\u003e bool {\n        self.dia == dia \u0026\u0026 self.mes == mes \u0026\u0026 self.anio == anio\n    }\n\n    pub fn not_equals_fecha(\u0026self, dia: u32, mes: u32, anio: u64) -\u003e bool {\n        !self.equals_fecha(dia, mes, anio)\n    }\n\n    pub fn equals(\u0026self, other: \u0026Self) -\u003e bool {\n        self.equals_fecha(other.dia, other.mes, other.anio)\n    }\n    pub fn not_equals(\u0026self, other: \u0026Self) -\u003e bool {\n        !self.equals(other)\n    }\n\n    // para usar en el ejercicio 10\n    pub fn fecha_actual() -\u003e Fecha {\n        Fecha::new(17, 5, 2026)\n    }\n}\n\n#[test]\nfn test_fecha_equals() {\n    let f = Fecha::new(2, 6, 2004);\n    assert!(f.equals(\u0026Fecha::new(2, 6, 2004)));\n    assert!(f.equals_fecha(2, 6, 2004));\n    assert!(f.not_equals(\u0026Fecha::new(3, 6, 2004)));\n    assert!(f.not_equals_fecha(3, 6, 2004));\n    assert!(f.not_equals(\u0026Fecha::new(2, 7, 2004)));\n    assert!(f.not_equals_fecha(2, 7, 2004));\n    assert!(f.not_equals(\u0026Fecha::new(2, 6, 2005)));\n    assert!(f.not_equals_fecha(2, 6, 2005));\n}\n\n#[test]\nfn test_fecha_es_valida() {\n    let f = Fecha::new(15, 12, 2026);\n    assert!(f.es_fecha_valida());\n\n    let f = Fecha::new(32, 12, 2026); // dia 32\n    assert!(!f.es_fecha_valida());\n\n    let f = Fecha::new(31, 2, 2026); // 31 de febrero\n    assert!(!f.es_fecha_valida());\n\n    let f = Fecha::new(15, 14, 2026); // mes 14\n    assert!(!f.es_fecha_valida());\n\n    let f = Fecha::new(29, 2, 2026); // 29 de febrero año no bisiesto\n    assert!(!f.es_fecha_valida());\n\n    let f = Fecha::new(29, 2, 2024); // 29 de febrero año bisiesto\n    assert!(f.es_fecha_valida());\n}\n\n#[test]\nfn test_fecha_bisiesto() {\n    let f = Fecha::new(15, 12, 2026);\n    assert!(!f.es_bisiesto());\n\n    let f = Fecha::new(15, 12, 2024);\n    assert!(f.es_bisiesto());\n\n    let f = Fecha::new(15, 12, 2000);\n    assert!(f.es_bisiesto());\n\n    let f = Fecha::new(15, 12, 1600);\n    assert!(f.es_bisiesto());\n\n    let f = Fecha::new(15, 12, 1700);\n    assert!(!f.es_bisiesto());\n}\n\n#[test]\nfn test_fecha_sumar_dias() {\n    let mut f = Fecha::new(15, 12, 2026);\n    f.sumar_dias(4); // suma normal\n    assert!(f.equals_fecha(19, 12, 2026));\n    f.sumar_dias(12); // se queda al borde de cambiar de mes/año\n    assert!(f.equals_fecha(31, 12, 2026));\n    f.sumar_dias(1); // pasa de año\n    assert!(f.equals_fecha(1, 1, 2027));\n    f.sumar_dias(365); // todo un año\n    assert!(f.equals_fecha(1, 1, 2028));\n    f.sumar_dias(60); // como 2028 es bisiesto, queda 1/3/2028 en lugar de 2/3/2028\n    assert!(f.equals_fecha(1, 3, 2028));\n\n    let mut f = Fecha::new(1, 1, 2025);\n    f.sumar_dias(60); // como 2025 no es bisiesto, queda 2/3/2025 en lugar de 1/3/2025\n    assert!(f.equals_fecha(2, 3, 2025));\n}\n\n#[should_panic(expected=\"Fecha invalida\")]\n#[test]\nfn test_fecha_sumar_dias_invalido() {\n    let mut f = Fecha::new(100, 27, 2025);\n    f.sumar_dias(10);\n}\n\n#[test]\nfn test_fecha_restar_dias() {\n    let mut f = Fecha::new(15, 12, 2026);\n    f.restar_dias(6); // resta normal\n    assert!(f.equals_fecha(9, 12, 2026));\n    f.restar_dias(8); // se queda en el primer dia\n    assert!(f.equals_fecha(1, 12, 2026));\n    f.restar_dias(1); // cambia al siguiente mes con la cantidad de dias de ese mes\n    assert!(f.equals_fecha(30, 11, 2026));\n    f.restar_dias(365); // todo un año\n    assert!(f.equals_fecha(30, 11, 2025));\n    f.restar_dias(365*2u32); // dos años donde uno de los años es bisiesto\n    assert!(f.equals_fecha(1, 12, 2023));\n}\n\n#[should_panic(expected=\"Fecha invalida\")]\n#[test]\nfn test_fecha_restar_dias_invalido() {\n    let mut f = Fecha::new(100, 27, 2025);\n    f.restar_dias(10);\n}\n\n#[test]\nfn test_fecha_es_mayor() {\n    let f1 = Fecha::new(16, 12, 2026);\n    let f2 = Fecha::new(15, 12, 2026);\n    assert!(f1.es_mayor(\u0026f2)); // mayor por 1 dia\n\n    let f1 = Fecha::new(10, 12, 2026);\n    let f2 = Fecha::new(15, 12, 2026);\n    assert!(!f1.es_mayor(\u0026f2)); // menor\n\n    let f1 = Fecha::new(15, 12, 2026);\n    let f2 = Fecha::new(15, 11, 2026);\n    assert!(f1.es_mayor(\u0026f2)); // mayor por 1 mes\n\n    let f1 = Fecha::new(15, 12, 2027);\n    let f2 = Fecha::new(15, 12, 2026);\n    assert!(f1.es_mayor(\u0026f2)); // mayor por 1 año\n\n    let f1 = Fecha::new(15, 12, 2026);\n    let f2 = Fecha::new(15, 12, 2026);\n    assert!(!f1.es_mayor(\u0026f2)); // iguales\n}\n\n#[should_panic(expected=\"Fechas invalidas a comparar\")]\n#[test]\nfn test_fecha_es_mayor_self_invalido() {\n    let f1 = Fecha::new(67, 21, 2026);\n    let f2 = Fecha::new(15, 12, 2026);\n    f1.es_mayor(\u0026f2);\n}\n\n#[should_panic(expected=\"Fechas invalidas a comparar\")]\n#[test]\nfn test_fecha_es_mayor_other_invalido() {\n    let f1 = Fecha::new(15, 12, 2026);\n    let f2 = Fecha::new(1, 69, 2026);\n    f1.es_mayor(\u0026f2);\n}","traces":[{"line":10,"address":[795552],"length":1,"stats":{"Line":1}},{"line":14,"address" n}\n\npub struct Triangulo {\n    pub a: f64,\n    pub b: f64,\n    pub c: f64\n}\n\nimpl Triangulo {\n    pub fn new(a: f64, b: f64, c: f64) -\u003e Self {\n        if a \u003c= 0.0 || b \u003c= 0.0 || c \u003c= 0.0 {\n            panic!(\"Lados del triangulo deben ser mayor a 0\")\n        }\n        let (min1, min2, max) = Triangulo::valores_ordenados(a, b, c);\n        if max \u003e= min1 + min2 {\n            panic!(\"Lado mayor debe ser menor que la suma de los 2 menores\");\n        }\n        Triangulo { a, b, c }\n    }\n\n    fn valores_ordenados(a: f64, b: f64, c: f64) -\u003e (f64, f64, f64) {\n        let mut vals = [a, b, c];\n        vals.sort_by(|a, b| a.total_cmp(b)); // vals.sort() no sirve por NaN =(\n        (vals[0], vals[1], vals[2])\n    }\n\n    pub fn determinar_tipo(\u0026self) -\u003e TipoTriangulo {\n        if self.a == self.b \u0026\u0026 self.b == self.c {\n            TipoTriangulo::EQUILATERO\n        } else if (self.a == self.b) || (self.a == self.c) || (self.b == self.c) {\n            TipoTriangulo::ISOSCELES\n        } else {\n            TipoTriangulo::ESCALENO\n        }\n    }\n\n    pub fn calcular_area(\u0026self) -\u003e f64 {\n        let s = (self.a+self.b+self.c)/2.0;\n        (s*(s-self.a)*(s-self.b)*(s-self.c)).sqrt()\n    }\n\n    pub fn calcular_perimetro(\u0026self) -\u003e f64 {\n        self.a + self.b + self.c\n    }\n}\n\n#[should_panic(expected=\"Lados del triangulo deben ser mayor a 0\")]\n#[test]\nfn test_triangulo_creacion_negativo_a() {\n    Triangulo::new(-1.0, 0.1, 0.0);\n}\n#[should_panic(expected=\"Lados del triangulo deben ser mayor a 0\")]\n#[test]\nfn test_triangulo_creacion_negativo_b() {\n    Triangulo::new(0.5, 0.0, 0.3);\n}\n#[should_panic(expected=\"Lados del triangulo deben ser mayor a 0\")]\n#[test]\nfn test_triangulo_creacion_negativo_c() {\n    Triangulo::new(0.1, 0.2, -0.1);\n}\n#[should_panic(expected=\"Lado mayor debe ser menor que la suma de los 2 menores\")]\n#[test]\nfn test_triangulo_creacion_invalida() {\n    Triangulo::new(1.0, 2.0, 1.0);\n}\n\n\n#[test]\nfn test_triangulo_tipo() {\n    let tipo = Triangulo::new(1.0, 1.0, 1.0).determinar_tipo();\n    assert!(tipo.equals(\u0026TipoTriangulo::EQUILATERO));\n    assert!(!tipo.equals(\u0026TipoTriangulo::ISOSCELES));\n    assert!(!tipo.equals(\u0026TipoTriangulo::ESCALENO));\n\n    let tipo = Triangulo::new(2.0, 2.0, 1.0).determinar_tipo();\n    assert!(tipo.equals(\u0026TipoTriangulo::ISOSCELES));\n    assert!(!tipo.equals(\u0026TipoTriangulo::EQUILATERO));\n    assert!(!tipo.equals(\u0026TipoTriangulo::ESCALENO));\n\n    let tipo = Triangulo::new(1.0, 2.0, 2.0).determinar_tipo();\n    assert!(tipo.equals(\u0026TipoTriangulo::ISOSCELES));\n    assert!(!tipo.equals(\u0026TipoTriangulo::EQUILATERO));\n    assert!(!tipo.equals(\u0026TipoTriangulo::ESCALENO));\n\n    let tipo = Triangulo::new(2.0, 1.0, 2.0).determinar_tipo();\n    assert!(tipo.equals(\u0026TipoTriangulo::ISOSCELES));\n    assert!(!tipo.equals(\u0026TipoTriangulo::EQUILATERO));\n    assert!(!tipo.equals(\u0026TipoTriangulo::ESCALENO));\n\n    let tipo = Triangulo::new(1.4, 2.5, 3.6).determinar_tipo();\n    assert!(tipo.equals(\u0026TipoTriangulo::ESCALENO));\n    assert!(!tipo.equals(\u0026TipoTriangulo::EQUILATERO));\n    assert!(!tipo.equals(\u0026TipoTriangulo::ISOSCELES));\n}\n\n#[test]\nfn test_triangulo_area() {\n    let t = Triangulo::new(1.0, 1.0, 1.0);\n    assert_eq!(t.calcular_area(), 0.1875_f64.sqrt());\n\n    let t = Triangulo::new(2.0, 3.0, 4.0);\n    assert_eq!(t.calcular_area(), (4.5*(4.5-2.0)*(4.5-3.0)*(4.5-4.0) as f64).sqrt());\n\n    let t = Triangulo::new(1.5, 2.0, 1.0);\n    assert_eq!(t.calcular_area(), (2.25*(2.25-1.5)*(2.25-2.0)*(2.25-1.0) as f64).sqrt());\n}\n\n#[test]\nfn test_triangulo_perimetro() {\n    let t = Triangulo::new(1.0, 1.0, 1.0);\n    assert_eq!(t.calcular_perimetro(), 3.0);\n\n    let t = Triangulo::new(2.0, 3.0, 4.0);\n    assert_eq!(t.calcular_perimetro(), 9.0);\n\n    let t = Triangulo::new(1.5, 2.0, 1.0);\n    assert_eq!(t.calcular_perimetro(), 4.5);\n}","traces":[{"line":7,"address":[764592,764637],"length":1,"stats":{"Line":1}},{"line":8,"address":[764644,764607],"length":1,"stats":{"Line":2}},{"line":9,"address":[764687],"length":1,"stats":{"Line":1}},{"line":10,"address":[764706],"length":1,"stats":{"Line":1}},{"line":11,"address":[764713],"length":1,"stats":{"Line":1}},{"line":12,"address":[764694],"length":1,"stats":{"Line":1}},{"line":24,"address":[767104],"length":1,"stats":{"Line":2}},{"line":25,"address":[767229,767163],"length":1,"stats":{"Line":4}},{"line":26,"address":[767187],"length":1,"stats":{"Line":3}},{"line":28,"address":[767256],"length":1,"stats":{"Line":2}},{"line":29,"address":[767302],"length":1,"stats":{"Line":2}},{"line":30,"address":[767359],"length":1,"stats":{"Line":1}},{"line":35,"address":[766960],"length":1,"stats":{"Line":2}},{"line":36,"address":[766992],"length":1,"stats":{"Line":2}},{"line":37,"address":[767010],"length":1,"stats":{"Line":6}},{"line":38,"address":[767035],"length":1,"stats":{"Line":2}},{"line":41,"address":[766832],"length":1,"stats":{"Line":1}},{"line":42,"address":[766882,766901,766842],"length":1,"stats":{"Line":3}},{"line":43,"address":[766896],"length":1,"stats":{"Line":1}},{"line":44,"address":[766862,766908,766926],"length":1,"stats":{"Line":3}},{"line":45,"address":[766921],"length":1,"stats":{"Line":1}},{"line":47,"address":[766949],"length":1,"stats":{"Line":1}},{"line":51,"address":[766736],"length":1,"stats":{"Line":1}},{"line":52,"address":[766745],"length":1,"stats":{"Line":1}},{"line":53,"address":[766777],"length":1,"stats":{"Line":1}},{"line":56,"address":[767072],"length":1,"stats":{"Line":1}},{"line":57,"address":[767077],"length":1,"stats":{"Line":1}}],"covered":27,"coverable":27},{"path":["/","home","cosk","rust","practicas","src","tp03","ej5.rs"],"content":"#![allow(unused)]\npub struct Producto {\n    pub nombre: String,\n    pub precio_bruto: f64,\n    pub id: u64\n}\n\nimpl .0;\n        for ex in \u0026self.calificaciones {\n            suma += ex.nota;\n        }\n        suma / self.calificaciones.len() as f32\n    }\n\n    pub fn obtener_calificacion_mas_alta(\u0026self) -\u003e f32 {\n        assert!(self.calificaciones.len() \u003e 0, \"El estudiante no tiene examenes registrados\");\n        let mut max = 0.0;\n        for ex in \u0026self.calificaciones {\n            if ex.nota \u003e max {\n                max = ex.nota;\n            }\n        }\n        max\n    }\n\n    pub fn obtener_calificacion_mas_baja(\u0026self) -\u003e f32 {\n        assert!(self.calificaciones.len() \u003e 0, \"El estudiante no tiene examenes registrados\");\n        let mut min = f32::MAX;\n        for ex in \u0026self.calificaciones {\n            if ex.nota \u003c min{\n                min = ex.nota;\n            }\n        }\n        min\n    }\n}\n\n#[test]\nfn test_examen_creacion_valido() {\n    Examen::new(\"Seminario de lenguajes\", 5.0);\n}\n\n#[should_panic(expected=\"La nota debe estar entre 0 y 10\")]\n#[test]\nfn test_examen_creacion_invalido_menor_0() {\n    Examen::new(\"Seminario de lenguajes\", -1.0);\n}\n\n#[should_panic(expected=\"La nota debe estar entre 0 y 10\")]\n#[test]\nfn test_examen_creacion_invalido_mayor_10() {\n    Examen::new(\"Seminario de lenguajes\", 11.0);\n}\n\n#[test]\nfn test_estudiante_promedio() {\n    let e = Estudiante::new(\"Juan\", 1234, \n    vec![Examen::new(\"mate1\", 7.0), Examen::new(\"mate2\", 8.5)]);\n    assert_eq!(e.obtener_promedio(), 7.75);\n\n    let e = Estudiante::new(\"Maria\", 91011, \n    vec![Examen::new(\"mate1\", 0.0), Examen::new(\"mate2\", 0.0), Examen::new(\"mate3\", 0.0)]);\n    assert_eq!(e.obtener_promedio(), 0.0);\n}\n\n#[should_panic(expected=\"El estudiante no tiene examenes registrados\")]\n#[test]\nfn test_estudiante_promedio_0_examenes() {\n    let e = Estudiante::new(\"Pedro\", 5678, \n    vec![]);\n    e.obtener_promedio();\n}\n\n#[test]\nfn test_estudiante_calificacion_m n equals(\u0026self, other: \u0026Self) -\u003e bool {\n        match (self, other) {\n            (Color::ROJO, Color::ROJO) =\u003e true, (Color::AMARILLO, Color::AMARILLO) =\u003e true,\n            (Color::VERDE, Color::VERDE) =\u003e true, (Color::BLANCO, Color::BLANCO) =\u003e true, \n            (Color::AZUL, Color::AZUL) =\u003e true,(Color::NEGRO, Color::NEGRO) =\u003e true,\n            _ =\u003e false\n        }\n    }\n}\n\n#[derive(Debug, Clone)]\npub struct Auto {\n    marca: String,\n    modelo: String,\n    anio: u64,\n    precio_bruto: f64,\n    color: Color\n}\n\nimpl Auto {\n    pub fn new(marca: \u0026str, modelo: \u0026str, anio: u64, precio_bruto: f64, color: Color) -\u003e Self {\n        Auto { marca: marca.to_string(), modelo: modelo.to_string(), anio, precio_bruto, color }\n    }\n\n    pub fn calcular_precio(\u0026self) -\u003e f64 {\n        let mut precio_final = self.precio_bruto;\n        if self.color.es_primario() {\n            precio_final += precio_final * 0.25;\n        } else {\n            precio_final -= precio_final * 0.1;\n        }\n\n        if self.marca.to_lowercase() == \"bmw\" {\n            precio_final += precio_final * 0.15;\n        }\n\n        if self.anio \u003c 2000 {\n            precio_final -= precio_final * 0.05;\n        }\n\n        precio_final\n    }\n\n    pub fn equals(\u0026self, other: \u0026Self) -\u003e bool {\n        self.marca == other.marca \u0026\u0026 self.modelo == other.modelo \u0026\u0026 self.anio == other.anio \u0026\u0026\n        self.precio_bruto == other.precio_bruto \u0026\u0026 self.color.equals(\u0026other.color)\n    }\n}\n\npub struct ConcesionarioAuto {\n    pub nombre: String,\n    pub direccion: String,\n    autos: Vec\u003cAuto\u003e,\n    capacidad: usize\n}\n\nimpl ConcesionarioAuto {\n    pub fn new(nombre: \u0026str, direccion: \u0026str, autos: Vec\u003cAuto\u003e, capacidad: usize) -\u003e Self {\n        ConcesionarioAuto { nombre: nombre.to_string(), direccion: direccion.to_string(), autos, capacidad }\n    }\n\n    pub fn agregar_auto(\u0026mut self, auto: Auto) -\u003e bool {\n        if self.autos.len() \u003c self.capacidad  {\n            self.autos.push(auto);\n            true\n        } else {\n            false\n        }\n    }\n\n    pub fn buscar_auto(\u0026self, auto: \u0026Auto) -\u003e Option\u003c\u0026Auto\u003e {\n        for au in \u0026self.autos {\n            if au.equals(auto) {\n                return Some(au);\n            }\n        }\n        None\n    }\n\n    fn buscar_indice_auto(\u0026self, auto: \u0026Auto) -\u003e usize {\n        let mut i = 0;\n        for a in \u0026self.autos {\n            if a.equals(auto) {\n                return i\n            }\n            i += 1;\n        }\n        i // se asume que existe\n    }\n    \n    pub fn eliminar_auto(\u0026mut self, auto: \u0026Auto) -\u003e bool {\n        if let Some(auto_borrar) = self.buscar_auto(auto) {\n            self.autos.swap_remove(self.buscar_indice_auto(auto_borrar));\n            true\n        } else {\n            false\n        }\n    }\n}\n\n#[test]\nfn test_color_es_primario() {\n    assert!(Color::ROJO.es_primario());\n    assert!(!Color::NEGRO.es_primario());\n}\n\n#[test]\nfn test_auto_calcular_precio() {\n    let a = Auto::new(\"Peugeot\", \"208\", 2006, 10_000_000.0, Color::BLANCO);\n    assert_eq!(a.calcular_precio(), 9_000_000.0);\n\n    let a = Auto::new(\"Peugeot\", \"206\", 1999, 5_000_000.0, Color::AZUL);\n    assert_eq!(a.calcular_precio(), 5_937_500.0);\n\n    let a = Auto::new(\"BMW\", \"Serie 1\", 2012, 75_000_000.0, Color::ROJO);\n    assert_eq!(a.calcular_precio(), 107_812_500.0);\n}\n\n#[test]\nfn test_concesionario_agregar_auto() {\n    let mut c = ConcesionarioAuto::new(\"Concesionario Peugeot\", \"4 y 50\", vec![], 3);\n    assert!(c.agregar_auto(Auto::new(\"Peugeot\", \"208\", 2006, 10_000_000.0, Color::BLANCO)));\n    assert!(c.agregar_auto(Auto::new(\"Peugeot\", \"206\", 1999, 5_000_000.0, Color::ROJO)));\n    assert!(c.agregar_auto(Auto::new(\"Peugeot\", \"301\", 2010, 19_000_000.0, Color::AZUL)));\n    assert!(!c.agregar_auto(Auto::new(\"Peugeot\", \"306\", 2015, 30_000_000.0, Color::NEGRO))); // max capacidad alcanzada\n}\n\n#[test]\nfn test_concesionario_eliminar_auto() {\n    let mut c = ConcesionarioAuto::new(\"Concesionario Peugeot\", \"4 y 50\", \n    vec![\n            Auto::new(\"Peugeot\", \"208\", 2006, 10_000_000.0, Color::BLANCO),\n            Auto::new(\"Peugeot\", \"206\", 1999, 5_000_000.0, Color::ROJO),\n            Auto::new(\"Peugeot\", \"301\", 2010, 19_000_000.0, Color::AZUL),\n            Auto::new(\"Peugeot\", \"306\", 2015, 30_000_000.0, Color::NEGRO)\n        ], 5);\n    assert!(c.eliminar_auto(\u0026Auto::new(\"Peugeot\", \"208\", 2006, 10_000_000.0, Color::BLANCO)));\n    assert!(!c.eliminar_auto(\u0026Auto::new(\"Peugeot\", \"206\", 1999, 5_000_000.0, Color::AZUL))); // todo igual menos el color\n    assert!(!c.eliminar_auto(\u0026Auto::new(\"BMW\", \"Serie 1\", 2012, 75_000_000.0, Color::AMARILLO))) // todo distinto\n}\n\n#[test]\nfn test_concesionario_buscar_auto() {\n    let c = ConcesionarioAuto::new(\"Concesionario Peugeot\", \"4 y 50\", \n    vec![\n            Auto::new(\"Peugeot\", \"208\", 2006, 10_000_000.0, Color::BLANCO),\n            Auto::new(\"Peugeot\", \"206\", 1999, 5_000_000.0, Color::ROJO),\n            Auto::new(\"Peugeot\", \"301\", 2010, 19_000_000.0, Color::AZUL),\n            Auto::new(\"Peugeot\", \"306\", 2015, 30_000_000.0, Color::NEGRO)\n        ], 5);\n    assert!(c.buscar_auto(\u0026Auto::new(\"Peugeot\", \"208\", 2006, 10_000_000.0, Color::BLANCO)).is_some());\n    assert!(c.buscar_auto(\u0026Auto::new(\"Peugeot\", \"206\", 1999, 5_000_000.0, Color::AZUL)).is_none()); // todo igual menos el color\n    assert!(c.buscar_auto(\u0026Auto::new(\"BMW\", \"Serie 1\", 2012, 75_000_000.0, Color::AMARILLO)).is_none()) // todo distinto\n}\n\n","traces":[{"line":9,"address":[641776],"length":1,"stats":{"Line n        self.titulo == other.titulo \u0026\u0026 self.artista == other.artista \u0026\u0026 self.genero.equals(\u0026other.genero)\n    }\n}\n\npub struct Playlist {\n    pub nombre: String,\n    canciones: Vec\u003cCancion\u003e\n}\n\nimpl Playlist {\n    pub fn new(nombre: \u0026str, canciones: Vec\u003cCancion\u003e) -\u003e Self {\n        Playlist { nombre: nombre.to_string(), canciones }\n    }\n\n    pub fn agregar_cancion(\u0026mut self, cancion: Cancion) {\n        self.canciones.push(cancion);\n    }\n\n    fn buscar_indice_cancion(\u0026self, nombre: \u0026str) -\u003e Option\u003cusize\u003e {\n        let mut i = 0;\n        for c in \u0026self.canciones {\n            if c.titulo.as_str().to_lowercase() == nombre.to_lowercase() {\n                return Some(i)\n            }\n            i += 1;\n        }\n        None\n    }\n\n    pub fn eliminar_cancion(\u0026mut self, nombre: \u0026str) -\u003e bool {\n        if let Some(index) = self.buscar_indice_cancion(nombre) {\n            self.canciones.remove(index);\n            true\n        } else {\n            false\n        }\n    }\n\n    pub fn mover_cancion(\u0026mut self, nombre: \u0026str, index: usize) -\u003e bool {\n        if index \u003e= self.canciones.len() {\n            return false\n        }\n        if let Some(prev) = self.buscar_indice_cancion(nombre) {\n            if prev == index {\n                return true\n            }\n            let cancion = self.canciones.remove(prev);\n            self.canciones.insert(index, cancion);\n            true\n        } else {\n            false\n        }\n    }\n\n    pub fn buscar_cancion(\u0026self, nombre: \u0026str) -\u003e Option\u003c\u0026Cancion\u003e {\n        let nom = nombre.to_lowercase().to_string();\n        for cancion in \u0026self.canciones {\n            if cancion.titulo.to_lowercase() == nom {\n                return Some(cancion);\n            }\n        }\n        None\n    }\n\n    pub fn canciones_de_genero(\u0026self, genero: Genero) -\u003e Vec\u003cCancion\u003e {\n        let mut lista = vec![];\n        for cancion in \u0026self.canciones {\n            if cancion.genero.equals(\u0026genero) {\n                lista.push(cancion.clone());\n            }\n        }\n        lista\n    }\n\n    pub fn canciones_de_artista(\u0026self, artista: \u0026str) -\u003e Vec\u003cCancion\u003e {\n        let mut lista = vec![];\n        let art = artista.to_lowercase();\n        for cancion in \u0026self.canciones {\n            if cancion.artista.as_str().to_lowercase() == art {\n                lista.push(cancion.clone());\n            }\n        }\n        lista\n    }\n\n    pub fn modificar_titulo(\u0026mut self, titulo: \u0026str) {\n        self.nombre = titulo.to_string();\n    }\n\n    pub fn borrar_canciones(\u0026mut self) {\n        self.canciones.clear();\n    }\n\n    pub fn len(\u0026self) -\u003e usize {\n        self.canciones.len()\n    }\n}\n\n\n#[test]\nfn test_playlist_agregar_cancion() {\n    let mut p = Playlist::new(\"playlist1\", vec![]);\n    assert_eq!(p.canciones.len(), 0);\n    p.agregar_cancion(Cancion::new(\"Smooth Criminal\", \"Michael Jackson\", Genero::POP));\n    assert_eq!(p.canciones.len(), 1);\n    p.agregar_cancion(Cancion::new(\"\", \"\", Genero::OTROS));\n    assert_eq!(p.canciones.len(), 2);\n    p.agregar_cancion(Cancion::new(\"The Show Must Go On\", \"Queen\", Genero::ROCK));\n    assert_eq!(p.canciones.len(), 3);\n    assert_eq!(p.canciones[2].titulo, \"The Show Must Go On\".to_string());\n}\n\n#[test]\nfn test_playlist_eliminar_cancion() {\n    let mut p = Playlist::new(\"playlist1\", vec![\n        Cancion::new(\"Smooth Criminal\", \"Michael Jackson\", Genero::POP),\n        Cancion::new(\"Nothing else Matters\", \"Metallica\", Genero::OTROS),\n        Cancion::new(\"Nothing else Matters\", \"Metallica\", Genero::OTROS),\n        Cancion::new(\"The Show Must Go On\", \"Queen\", Genero::ROCK)\n    ]);\n    assert!(p.eliminar_cancion(\"Smooth Criminal\"));\n    assert!(!p.eliminar_cancion(\"Smooth Criminal\"));\n    assert!(!p.eliminar_cancion(\"Beat It\"));\n    assert_eq!(p.canciones.len(), 3);\n    assert!(p.eliminar_cancion(\"nothing else matters\")); \n    assert_eq!(p.canciones.len(), 2); // borrar cancion repetida solo borra 1\n    // checkear que preserva el orden (importante en playlist)\n    assert_eq!(p.canciones[0].titulo, \"Nothing else Matters\".to_string());\n    assert_eq!(p.canciones[1].titulo, \"The Show Must Go On\".to_string());\n}\n\n#[test]\nfn test_playlist_mover_cancion() {\n    let mut p = Playlist::new(\"playlist1\", vec![\n        Cancion::new(\"Smooth Criminal\", \"Michael Jackson\", Genero::POP),\n        Cancion::new(\"Nothing else Matters\", \"Metallica\", Genero::OTROS),\n        Cancion::new(\"The Show Must Go On\", \"Queen\", Genero::ROCK),\n        Cancion::new(\"Eye of the Tiger\", \"Survivor\", Genero::ROCK)\n    ]);\n    vec![\n        Cancion::new(\"Smooth Criminal\", \"Michael Jackson\", Genero::POP),\n        Cancion::new(\"Nothing else Matters\", \"Metallica\", Genero::OTROS),\n        Cancion::new(\"The Show Must Go On\", \"Queen\", Genero::ROCK),\n        Cancion::new(\"Eye of the Tiger\", \"Survivor\", Genero::ROCK)\n    ];\n    assert_eq!(p.canciones.len(), 4);\n    assert_eq!(p.canciones[0].titulo, \"Smooth Criminal\".to_string());\n    assert!(p.mover_cancion(\"Smooth Criminal\", 0)); // mover al mismo lugar no cambia nada\n    assert_eq!(p.canciones[0].titulo, \"Smooth Criminal\".to_string());\n    assert!(p.mover_cancion(\"Smooth Criminal\", 3)); // nothing, show, eye, smooth\n    assert_eq!(p.canciones[0].titulo, \"Nothing else Matters\".to_string());\n    assert_eq!(p.canciones[1].titulo, \"The Show Must Go On\".to_string());\n    assert_eq!(p.canciones[2].titulo, \"Eye of the Tiger\".to_string());\n    assert_eq!(p.canciones[3].titulo, \"Smooth Criminal\".to_string());\n    assert!(p.mover_cancion(\"Eye of the Tiger\", 0)); // eye, nothing, show, smooth\n    assert_eq!(p.canciones[0].titulo, \"Eye of the Tiger\".to_string());\n    assert_eq!(p.canciones[2].titulo, \"The Show Must Go On\".to_string());\n    assert!(p.mover_cancion(\"Smooth Criminal\", 1)); // eye, smooth, nothing, show\n    assert_eq!(p.canciones[1].titulo, \"Smooth Criminal\".to_string());\n    assert_eq!(p.canciones[3].titulo, \"The Show Must Go On\".to_string());\n    assert!(!p.mover_cancion(\"Smooth Criminal\", 10)); // tratar de mover a posicion invalida\n    assert!(!p.mover_cancion(\"Beat It\", 1)); // tratar de mover cancion inexistente\n}\n\n#[test]\nfn test_playlist_buscar_cancion() {\n    let p = Playlist::new(\"playlist1\", vec![\n        Cancion::new(\"Smooth Criminal\", \"Michael Jackson\", Genero::POP),\n        Cancion::new(\"Nothing else Matters\", \"Metallica\", Genero::OTROS),\n        Cancion::new(\"The Show Must Go On\", \"Queen\", Genero::ROCK),\n        Cancion::new(\"Eye of the Tiger\", \"Survivor\", Genero::ROCK),\n        Cancion::new(\"Without Me\", \"Eminem\", Genero::RAP)\n    ]);\n    assert!(p.buscar_cancion(\"Smooth Criminal\").unwrap().equals(\u0026Cancion::new(\"Smooth Criminal\", \"Michael Jackson\", Genero::POP)));\n    assert!(p.buscar_cancion(\"Eye of the Tiger\").unwrap().equals(\u0026Cancion::new(\"Eye of the Tiger\", \"Survivor\", Genero::ROCK)));\n    assert!(p.buscar_cancion(\"nothing else matters\").unwrap().equals(\u0026Cancion::new(\"Nothing else Matters\", \"Metallica\", Genero::OTROS))); // no importan las mayusculas\n    assert!(p.buscar_cancion(\"without me\").unwrap().equals(\u0026Cancion::new(\"Without Me\", \"Eminem\", Genero::RAP)));\n    assert!(p.buscar_cancion(\"Beat It\").is_none());\n    assert!(p.buscar_cancion(\"\").is_none());\n}\n\n#[test]\nfn test_playlist_canciones_genero() {\n    let p = Playlist::new(\"playlist1\", vec![\n        Cancion::new(\"Smooth Criminal\", \"Michael Jackson\", Genero::POP),\n        Cancion::new(\"Nothing else Matters\", \"Metallica\", Genero::OTROS),\n        Cancion::new(\"The Show Must Go On\", \"Queen\", Genero::ROCK),\n        Cancion::new(\"Eye of the Tiger\", \"Survivor\", Genero::ROCK)\n    ]);\n    let rock = p.canciones_de_genero(Genero::ROCK);\n    assert_eq!(rock.len(), 2);\n    assert!(rock[0].equals(\u0026Cancion::new(\"The Show Must Go On\", \"Queen\", Genero::ROCK)));\n    \n    assert_eq!(p.canciones_de_genero(Genero::OTROS).len(), 1);\n    assert_eq!(p.canciones_de_genero(Genero::JAZZ).len(), 0);\n}\n\n#[test]\nfn test_playlist_canciones_artista() {\n    let p = Playlist::new(\"playlist1\", vec![\n        Cancion::new(\"Master of Puppets\", \"Metallica\", Genero::OTROS),\n        Cancion::new(\"Nothing else Matters\", \"Metallica\", Genero::OTROS),\n        Cancion::new(\"Bohemian Rhapsody\", \"Queen\", Genero::ROCK),\n        Cancion::new(\"Burden\", \"Opeth\", Genero::OTROS)\n    ]);\n    let metallica = p.canciones_de_artista(\"Metallica\");\n    assert_eq!(metallica.len(), 2);\n    assert!(metallica[1].equals(\u0026Cancion::new(\"Nothing else Matters\", \"Metallica\", Genero::OTROS)));\n    assert_eq!(p.canciones_de_artista(\"opeth\").len(), 1);\n    assert_eq!(p.canciones_de_artista(\"MICHAEL JACKSON\").len(), 0);\n}\n\n#[test]\nfn test_playlist_modificar_titulo() {\n    let mut p = Playlist::new(\"mi playlist\", vec![]);\n    assert_eq!(p.nombre.as_str(), \"mi playlist\");\n    p.modificar_titulo(\"otra playlist\");\n    assert_eq!(p.nombre.as_str(), \"otra playlist\");\n}\n\n#[test]\nfn test_playlist_borrar_canciones() {\n    let mut p = Playlist::new(\"playlist1\", vec![\n        Cancion::new(\"Master of Puppets\", \"Metallica\", Genero::OTROS),\n        Cancion::new(\"Nothing else Matters\", \"Metallica\", Genero::OTROS),\n        Cancion::new(\"Bohemian Rhapsody\", \"Queen\", Genero::ROCK),\n        Cancion::new(\"Burden\", \"Opeth\", Genero::OTROS)\n    ]);\n    assert_eq!(p.len(), 4);\n    p.borrar_canciones();\n    assert_eq!(p.len(), 0);\n}","traces":[{"line":8,"address":[9763 cticas","src","tp03","ej9.rs"],"content":"#![allow(unused)]\nuse super::ej3::Fecha;\nuse std::collections::VecDeque;\n\n#[derive(Debug, Clone)]\npub enum Animal {\n    PERRO, GATO, CABALLO, OTRO\n}\n\nimpl Animal {\n    pub fn equals(\u0026self, other: \u0026Self) -\u003e bool {\n        match (self, other) {\n            (Animal::PERRO, Animal::PERRO) =\u003e true, (Animal::CABALLO, Animal::CABALLO) =\u003e true,\n            (Animal::GATO, Animal::GATO) =\u003e true, (Animal::OTRO, Animal::OTRO) =\u003e true,\n            _ =\u003e false\n        }\n    }\n}\n\n#[derive(Debug, Clone)]\npub struct Persona {\n    pub nombre: String,\n    pub direccion: String,\n    pub telefono: String\n}\n\nimpl Persona {\n    pub fn new(nombre: \u0026str, direccion: \u0026str, telefono: \u0026str) -\u003e Self {\n        Persona { nombre: nombre.to_string(), direccion: direccion.to_string(), telefono: telefono.to_string() }\n    }\n}\n\n#[derive(Debug, Clone)]\npub struct Mascota {\n    pub nombre: String,\n    pub edad: u32,\n    pub tipo: Animal,\n    pub duenio: Persona\n}\n\nimpl Mascota {\n    pub fn new(nombre: \u0026str, edad: u32, tipo: Animal, duenio: Persona) -\u003e Self {\n        Mascota { nombre: nombre.to_string(), edad, tipo, duenio }\n    }\n\n    pub fn equals_reducido(\u0026self, other_nombre: \u0026str, other_nombre_duenio: \u0026str, other_telefono: \u0026str) -\u003e bool {\n        self.nombre.as_str() == other_nombre \u0026\u0026\n        self.duenio.nombre.as_str() == other_nombre_duenio \u0026\u0026\n        self.duenio.telefono.as_str() == other_telefono\n    }\n}\n\n#[derive(Debug, Clone)]\npub struct Atencion {\n    pub mascota: Mascota,\n    pub diagnostico: String,\n    pub tratamiento: String,\n    pub proxima_visita: Option\u003cFecha\u003e\n}\n\nimpl Atencion {\n    pub fn new(mascota: Mascota, diagnostico: \u0026str, tratamiento: \u0026str, proxima_visita: Option\u003cFecha\u003e) -\u003e Self {\n        Atencion { mascota, diagnostico: diagnostico.to_string(), tratamiento: tratamiento.to_string(), proxima_visita }\n    }\n\n    pub fn equals_reducido(\u0026self, nombre_mascota: \u0026str, nombre_duenio: \u0026str, telefono: \u0026str ) -\u003e bool {\n        self.mascota.nombre.as_str() == nombre_mascota \u0026\u0026\n        self.mascota.duenio.nombre.as_str() == nombre_duenio \u0026\u0026\n        self.mascota.duenio.telefono.as_str() == telefono\n    }\n}\n\n#[derive(Debug)]\npub struct Veterinaria {\n    pub nombre: String,\n    pub direccion: String,\n    pub id: u64,\n    pub cola_atencion: VecDeque\u003cMascota\u003e,\n    pub registro_atenciones: Vec\u003cAtencion\u003e\n}\n\nimpl Veterinaria {\n    pub fn new(nombre: \u0026str, direccion: \u0026str, id: u64) -\u003e Self {\n        Veterinaria { nombre: nombre.to_string(), direccion: direccion.to_string(), id, cola_atencion: VecDeque::new(), registro_atenciones: vec![] }\n    }\n\n    pub fn agregar_mascota(\u0026mut self, mascota: Mascota) {\n        self.cola_atencion.push_back(mascota);\n    }\n\n    pub fn agregar_mascota_prioritaria(\u0026mut self, mascota: Mascota) {\n        self.cola_atencion.push_front(mascota);\n    }\n\n    pub fn atender_mascota(\u0026mut self) -\u003e Option\u003cMascota\u003e {\n        self.cola_atencion.pop_front()\n    }\n\n    pub fn eliminar_mascota(\u0026mut self, nombre_mascota: \u0026str, nombre_duenio: \u0026str, telefono: \u0026str) -\u003e bool {\n        if let Some(index) = self.cola_atencion.iter().position(|x| x.equals_reducido(nombre_mascota, nombre_duenio, telefono)) {\n            self.cola_atencion.remove(index);\n            true\n        } else {\n            false\n        }\n    }\n\n    pub fn registrar_atencion(\u0026mut self, atencion: Atencion) {\n        self.registro_atenciones.push(atencion);\n    }\n\n    pub fn buscar_atencion(\u0026self, nombre_mascota: \u0026str, nombre_duenio: \u0026str, telefono: \u0026str) -\u003e Option\u003c\u0026Atencion\u003e {\n        for a in \u0026self.registro_atenciones {\n            if a.equals_reducido(nombre_mascota, nombre_duenio, telefono) {\n                return Some(a);\n            }\n        }\n        None\n    }\n\n    pub fn modificar_diagnostico(\u0026mut self, nombre_mascota: \u0026str, nombre_duenio: \u0026str, telefono: \u0026str, nuevo_diagnostico: \u0026str) -\u003e bool {\n        for a in self.registro_atenciones.iter_mut() {\n            if a.equals_reducido(nombre_mascota, nombre_duenio, telefono) {\n                a.diagnostico = nuevo_diagnostico.to_string();\n                return true;\n            }\n        }\n        false\n    }\n\n    pub fn modificar_proxima_visita(\u0026mut self, nombre_mascota: \u0026str, nombre_duenio: \u0026str, telefono: \u0026str, nueva_fecha: Option\u003cFecha\u003e) -\u003e bool {\n        for a in self.registro_atenciones.iter_mut() {\n            if a.equals_reducido(nombre_mascota, nombre_duenio, telefono) {\n                a.proxima_visita = nueva_fecha;\n                return true;\n            }\n        }\n        false\n    }\n\n    pub fn eliminar_atencion(\u0026mut self, nombre_mascota: \u0026str, nombre_duenio: \u0026str, telefono: \u0026str) -\u003e bool {\n        let mut index = 0;\n        for a in self.registro_atenciones.iter_mut() {\n            if a.equals_reducido(nombre_mascota, nombre_duenio, telefono) {\n                self.registro_atenciones.remove(index);\n                return true;\n            }\n            index += 1;\n        }\n        false\n    }\n}\n\n#[test]\nfn test_veterinaria_agregar_mascota() {\n    let mut v = Veterinaria::new(\"Veterinaria1\", \"Centenario\", 4839243274392);\n    v.agregar_mascota(Mascota::new(\"Bola\", 7, Animal::GATO, \n        Persona::new(\"Pedro\", \"6 y 50\", \"221 123-4567\")));\n    v.agregar_mascota(Mascota::new(\"Micky\", 4, Animal::PERRO, \n        Persona::new(\"Carlos\", \"1 y 44\", \"221 891-0111\")));\n    assert_eq!(v.cola_atencion.len(), 2);\n    assert_eq!(v.cola_atencion[0].nombre, \"Bola\".to_string());\n    assert!(v.cola_atencion[0].tipo.equals(\u0026Animal::GATO));\n    assert_eq!(v.cola_atencion[1].nombre, \"Micky\".to_string());\n    assert!(v.cola_atencion[1].tipo.equals(\u0026Animal::PERRO));\n}\n\n#[test]\nfn test_animal_equals() {\n    assert!(Animal::GATO.equals(\u0026Animal::GATO));\n    assert!(Animal::PERRO.equals(\u0026Animal::PERRO));\n    assert!(Animal::CABALLO.equals(\u0026Animal::CABALLO));\n    assert!(Animal::OTRO.equals(\u0026Animal::OTRO));\n    assert!(!Animal::GATO.equals(\u0026Animal::OTRO));\n    assert!(!Animal::OTRO.equals(\u0026Animal::GATO));\n}\n\n#[test]\nfn test_veterinaria_agregar_mascota_prioritaria() {\n    let mut v = Veterinaria::new(\"Veterinaria1\", \"Centenario\", 4839243274392);\n    v.agregar_mascota_prioritaria(Mascota::new(\"Bola\", 7, Animal::GATO, \n        Persona::new(\"Pedro\", \"6 y 50\", \"221 123-4567\")));\n    v.agregar_mascota_prioritaria(Mascota::new(\"Micky\", 4, Animal::PERRO, \n        Persona::new(\"Carlos\", \"1 y 44\", \"221 891-0111\")));\n    assert_eq!(v.cola_atencion.len(), 2);\n    assert_eq!(v.cola_atencion[0].nombre, \"Micky\".to_string());\n    assert!(v.cola_atencion[0].tipo.equals(\u0026Animal::PERRO));\n    assert_eq!(v.cola_atencion[1].nombre, \"Bola\".to_string());\n    assert!(v.cola_atencion[1].tipo.equals(\u0026Animal::GATO));\n}\n\n#[test]\nfn test_veterinaria_atender_mascota() {\n    let mut v = Veterinaria::new(\"Veterinaria1\", \"Centenario\", 4839243274392);\n    v.agregar_mascota(Mascota::new(\"Bola\", 7, Animal::GATO, \n        Persona::new(\"Pedro\", \"6 y 50\", \"221 123-4567\")));\n    v.agregar_mascota(Mascota::new(\"Micky\", 4, Animal::PERRO, \n        Persona::new(\"Carlos\", \"1 y 44\", \"221 891-0111\")));\n\n    let m1 = v.atender_mascota();\n    assert!(m1.is_some());\n    assert_eq!(m1.unwrap().nombre, \"Bola\".to_string());\n\n    let m2 = v.atender_mascota();\n    assert!(m2.is_some());\n    assert_eq!(m2.unwrap().nombre, \"Micky\".to_string());\n\n    assert_eq!(v.cola_atencion.len(), 0);\n\n    let mn = v.atender_mascota();\n    assert!(mn.is_none());\n}\n\n#[test]\nfn test_veterinaria_eliminar_mascota() {\n    let mut v = Veterinaria::new(\"Veterinaria1\", \"Centenario\", 4839243274392);\n    v.agregar_mascota(Mascota::new(\"Bola\", 7, Animal::GATO, \n        Persona::new(\"Pedro\", \"6 y 50\", \"221 123-4567\")));\n    v.agregar_mascota(Mascota::new(\"Micky\", 4, Animal::PERRO, \n        Persona::new(\"Carlos\", \"1 y 44\", \"221 891-0111\")));\n    assert_eq!(v.cola_atencion.len(), 2);\n\n    assert!(v.eliminar_mascota(\"Bola\", \"Pedro\", \"221 123-4567\"));\n    assert_eq!(v.cola_atencion.len(), 1);\n    assert!(!v.eliminar_mascota(\"Bola\", \"Pedro\", \"221 123-4567\"));\n    assert_eq!(v.cola_atencion.len(), 1);\n    assert!(!v.eliminar_mascota(\"Micky\", \"Pedro\", \"221 891-0111\")); // dueño distinto\n    assert_eq!(v.cola_atencion.len(), 1);\n    assert!(v.eliminar_mascota(\"Micky\", \"Carlos\", \"221 891-0111\"));\n    assert_eq!(v.cola_atencion.len(), 0);\n    assert!(!v.eliminar_mascota(\"\", \"\", \"\"));\n    assert_eq!(v.cola_atencion.len(), 0);\n}\n\n#[test]\nfn test_veterinaria_registrar_atencion() {\n    let mut v = Veterinaria::new(\"Veterinaria1\", \"Centenario\", 4839243274392);\n    v.registrar_atencion(Atencion::new(\n        Mascota::new(\"Bola\", 7, Animal::GATO, Persona::new(\"Pedro\", \"6 y 50\", \"221 123-4567\")),\n        \"Pulgas\",\n        \"Pipeta\",\n        None\n    ));\n    v.registrar_atencion(Atencion::new(\n        Mascota::new(\"Micky\", 4, Animal::PERRO, Persona::new(\"Carlos\", \"1 y 44\", \"221 891-0111\")),\n        \"Garrapatas\",\n        \"Antiparasitario y extraccion\",\n        Some(Fecha::new(12, 6, 2026))\n    ));\n    assert_eq!(v.registro_atenciones.len(), 2);\n\n    assert_eq!(v.registro_atenciones[0].diagnostico, \"Pulgas\".to_string());\n    assert!(v.registro_atenciones[0].proxima_visita.is_none());\n    assert_eq!(v.registro_atenci e {\n    vp.iter().filter(|p| p.get_salario() \u003e salario).collect::\u003cVec\u003c_\u003e\u003e()\n}\n\npub fn edad_mayor_y_vive_ciudad\u003c'a\u003e(vp: \u0026'a Vec\u003cPersona\u003c'a\u003e\u003e, edad: u8, ciudad: \u0026'a str) -\u003e Vec\u003c\u0026'a Persona\u003c'a\u003e\u003e {\n    vp.iter().filter(|p| p.get_ciudad() == ciudad \u0026\u0026 p.get_edad() \u003e edad).collect::\u003cVec\u003c_\u003e\u003e()\n}\n\npub fn todos_viven_en_ciudad\u003c'a\u003e(vp: \u0026'a Vec\u003cPersona\u003c'a\u003e\u003e, ciudad: \u0026'a str) -\u003e bool {\n    vp.iter().all(|p| p.get_ciudad() == ciudad)\n}\n\npub fn alguno_vive_en_ciudad\u003c'a\u003e(vp: \u0026'a Vec\u003cPersona\u003c'a\u003e\u003e, ciudad: \u0026'a str) -\u003e bool {\n    vp.iter().any(|p| p.get_ciudad() == ciudad)\n}\n\npub fn existe_persona\u003c'a, const N: usize\u003e(ap: \u0026'a[Persona\u003c'a\u003e; N], persona: \u0026'a Persona\u003c'a\u003e) -\u003e bool {\n    ap.contains(persona)\n    //ap.iter().any(|p| p == persona)\n}\n\npub fn obtener_edades\u003c'a, const N: usize\u003e(ap: \u0026[Persona\u003c'a\u003e; N]) -\u003e [u8; N] {\n    ap.iter().filter_map(|p| Some(p.get_edad())).collect::\u003cVec\u003c_\u003e\u003e().try_into().expect(\"Error convirtiendo a arreglo\")\n}\n\npub fn menor_mayor_salario\u003c'a, const N: usize\u003e(ap: \u0026'a [Persona\u003c'a\u003e; N]) -\u003e (Option\u003c\u0026'a Persona\u003c'a\u003e\u003e, Option\u003c\u0026'a Persona\u003c'a\u003e\u003e) {\n    let min = ap.iter().min_by(|p1, p2| {\n        match p1.get_salario().total_cmp(\u0026p2.get_salario()) {\n            Ordering::Equal =\u003e p2.get_edad().cmp(\u0026p1.get_edad()),\n            ord =\u003e ord\n        }\n    });\n\n    let max = ap.iter().max_by(|p1, p2| {\n        match p1.get_salario().total_cmp(\u0026p2.get_salario()) {\n            Ordering::Equal =\u003e p1.get_edad().cmp(\u0026p2.get_edad()),\n            ord =\u003e ord\n        }\n    });\n    (min, max)\n}\n\n#[cfg(test)]\nmod tests {\n    use super::{Persona, salario_mayor, edad_mayor_y_vive_ciudad, todos_viven_en_ciudad, alguno_vive_en_ciudad,\n     existe_persona, obtener_edades, menor_mayor_salario };\n\n    #[test]\n    fn test_salario_mayor() {\n        let vp = vec![\n            Persona::new(\"Pedro\", \"Perez\", \"7 y 50\", \"La Plata\", 200000.0, 22),\n            Persona::new(\"Maria\", \"Sanchez\", \"6 y 498\", \"Gonnet\", 125000.0, 25),\n            Persona::new(\"Juan\", \"Perez\", \"9 y 510\", \"Ringuelet\", 230000.0, 23),\n            Persona::new(\"Jorge\", \"Toledo\", \"2 y 47\", \"La Plata\", 95000.0, 19),\n            Persona::new(\"Liam\", \"Chelsea\", \"12 y 495\", \"Gonnet\", 300000.0, 27)\n        ];\n        assert_eq!(salario_mayor(\u0026vp, 150000.0).len(), 3);\n        assert_eq!(salario_mayor(\u0026vp, 90000.0).len(), 5);\n        assert_eq!(salario_mayor(\u0026vp, 275000.0).len(), 1);\n    }\n\n    #[test]\n    fn test_edad_mayor_y_vive_ciudad() {\n        let vp = vec![\n            Persona::new(\"Pedro\", \"Perez\", \"7 y 50\", \"La Plata\", 200000.0, 22),\n            Persona::new(\"Maria\", \"Sanchez\", \"6 y 498\", \"Gonnet\", 125000.0, 25),\n            Persona::new(\"Juan\", \"Perez\", \"9 y 510\", \"Ringuelet\", 230000.0, 23),\n            Persona::new(\"Jorge\", \"Toledo\", \"2 y 47\", \"La Plata\", 95000.0, 19),\n            Persona::new(\"Liam\", \"Chelsea\", \"12 y 495\", \"Gonnet\", 300000.0, 27)\n        ];\n        assert_eq!(edad_mayor_y_vive_ciudad(\u0026vp, 20, \"La Plata\").len(), 1);\n        assert_eq!(edad_mayor_y_vive_ciudad(\u0026vp, 28, \"Gonnet\").len(), 0);\n        assert_eq!(edad_mayor_y_vive_ciudad(\u0026vp, 18, \"Gonnet\").len(), 2);\n    }\n\n    #[test]\n    fn test_todos_viven_en_ciudad() {\n        let vp = vec![\n            Persona::new(\"Pedro\", \"Perez\", \"7 y 50\", \"La Plata\", 200000.0, 22),\n            Persona::new(\"Maria\", \"Sanchez\", \"6 y 498\", \"Gonnet\", 125000.0, 25),\n            Persona::new(\"Juan\", \"Perez\", \"9 y 510\", \"Ringuelet\", 230000.0, 23),\n            Persona::new(\"Jorge\", \"Toledo\", \"2 y 47\", \"La Plata\", 95000.0, 19),\n            Persona::new(\"Liam\", \"Chelsea\", \"12 y 495\", \"Gonnet\", 300000.0, 27)\n        ];\n        assert!(!todos_viven_en_ciudad(\u0026vp, \"La Plata\"));\n        assert!(!todos_viven_en_ciudad(\u0026vp, \"Gonnet\"));\n\n        let vp = vec![\n            Persona::new(\"Pedro\", \"Perez\", \"7 y 50\", \"Gonnet\", 200000.0, 22),\n            Persona::new(\"Maria\", \"Sanchez\", \"6 y 498\", \"Gonnet\", 125000.0, 25),\n            Persona::new(\"Juan\", \"Perez\", \"9 y 510\", \"Gonnet\", 230000.0, 23),\n            Persona::new(\"Jorge\", \"Toledo\", \"2 y 47\", \"Gonnet\", 95000.0, 19),\n            Persona::new(\"Liam\", \"Chelsea\", \"12 y 495\", \"Gonnet\", 300000.0, 27)\n        ];\n        assert!(!todos_viven_en_ciudad(\u0026vp, \"La Plata\"));\n        assert!(todos_viven_en_ciudad(\u0026vp, \"Gonnet\"));\n    }\n\n    #[test]\n    fn test_alguno_vive_en_ciudad() {\n        let vp = vec![\n            Persona::new(\"Pedro\", \"Perez\", \"7 y 50\", \"La Plata\", 200000.0, 22),\n            Persona::new(\"Maria\", \"Sanchez\", \"6 y 498\", \"Gonnet\", 125000.0, 25),\n            Persona::new(\"Juan\", \"Perez\", \"9 y 510\", \"Ringuelet\", 230000.0, 23),\n            Persona::new(\"Jorge\", \"Toledo\", \"2 y 47\", \"La Plata\", 95000.0, 19),\n            Persona::new(\"Liam\", \"Chelsea\", \"12 y 495\", \"Gonnet\", 300000.0, 27)\n        ];\n        assert!(alguno_vive_en_ciudad(\u0026vp, \"La Plata\"));\n        assert!(alguno_vive_en_ciudad(\u0026vp, \"Gonnet\"));\n        assert!(!alguno_vive_en_ciudad(\u0026vp, \"Tolosa\"));\n\n        let vp = vec![\n            Persona::new(\"Pedro\", \"Perez\", \"7 y 50\", \"Gonnet\", 200000.0, 22),\n            Persona::new(\"Maria\", \"Sanchez\", \"6 y 498\", \"Gonnet\", 125000.0, 25),\n            Persona::new(\"Juan\", \"Perez\", \"9 y 510\", \"Gonnet\", 230000.0, 23),\n            Persona::new(\"Jorge\", \"Toledo\", \"2 y 47\", \"Gonnet\", 95000.0, 19),\n            Persona::new(\"Liam\", \"Chelsea\", \"12 y 495\", \"Gonnet\", 300000.0, 27)\n        ];\n        assert!(!alguno_vive_en_ciudad(\u0026vp, \"La Plata\"));\n        assert!(alguno_vive_en_ciudad(\u0026vp, \"Gonnet\"));\n    }\n\n    #[test]\n    fn test_existe_persona() {\n        let p1 = Persona::new(\"Pedro\", \"Perez\", \"7 y 50\", \"La Plata\", 200000.0, 22);\n        let p2 = Persona::new(\"Maria\", \"Sanchez\", \"6 y 498\", \"Gonnet\", 125000.0, 25);\n        let p3 = Persona::new(\"Juan\", \"Perez\", \"9 y 510\", \"Ringuelet\", 230000.0, 23);\n        let ap = [\n            p1.clone(), p2.clone(),\n            Persona::new(\"Jorge\", \"Toledo\", \"2 y 47\", \"La Plata\", 95000.0, 19),\n            Persona::new(\"Liam\", \"Chelsea\", \"12 y 495\", \"Gonnet\", 300000.0, 27)\n        ];\n        assert!(existe_persona(\u0026ap, \u0026p1));\n        assert!(existe_persona(\u0026ap, \u0026p2));\n        assert!(!existe_persona(\u0026ap, \u0026p3));\n    }\n\n    #[test]\n    fn test_obtener_edades() {\n        let ap = [\n            Persona::new(\"Pedro\", \"Perez\", \"7 y 50\", \"La Plata\", 200000.0, 22),\n            Persona::new(\"Maria\", \"Sanchez\", \"6 y 498\", \"Gonnet\", 125000.0, 25),\n            Persona::new(\"Juan\", \"Perez\", \"9 y 510\", \"Ringuelet\", 230000.0, 23),\n            Persona::new(\"Jorge\", \"Toledo\", \"2 y 47\", \"La Plata\", 95000.0, 19),\n            Persona::new(\"Liam\", \"Chelsea\", \"12 y 495\", \"Gonnet\", 300000.0, 27)\n        ];\n        assert_eq!(obtener_edades(\u0026ap), [22, 25, 23, 19, 27]);\n        assert_eq!(obtener_edades(\u0026[]), []);\n    }\n\n    #[test]\n    fn test_menor_mayor_salario() {\n        let pmenor = Persona::new(\"Jorge\", \"Toledo\", \"2 y 47\", \"La Plata\", 95000.0, 22);\n        let pmayor = Persona::new(\"Liam\", \"Chelsea\", \"12 y 495\", \"Gonnet\", 300000.0, 27);\n        let ap = [\n            Persona::new(\"Pedro\", \"Perez\", \"7 y 50\", \"La Plata\", 95000.0, 19), // mismo salario que el menor pero menor edad\n            pmenor.clone(),\n            Persona::new(\"Maria\", \"Sanchez\", \"6 y 498\", \"Gonnet\", 300000.0, 25), // mismo salario que el mayor pero menor edad\n            pmayor.clone(),\n            Persona::new(\"Juan\", \"Perez\", \"9 y 510\", \"Ringuelet\", 230000.0, 23)\n        ];\n        assert_eq!(menor_mayor_salario(\u0026ap), (Some(\u0026pmenor), Some(\u0026pmayor)));\n\n        assert_eq!(menor_mayor_salario(\u0026[]), (None, None));\n\n        let p = Persona::new(\"Jorge\", \"Toledo\", \"2 y 47\", \"La Plata\", 95000.0, 19);\n        assert_eq!(menor_mayor_salario(\u0026[p.clone()]), (Some(\u0026p), Some(\u0026p)));\n\n        let p1 = Persona::new(\"Jorge\", \"Toledo\", \"2 y 47\", \"La Plata\", 195000.0, 19);\n        let p2 = Persona::new(\"Jorge\", \"Toledo\", \"2 y 47\", \"La Plata\", 195000.0, 22);\n        assert_eq!(menor_mayor_salario(\u0026[p1.clone(), p2.clone()]), (Some(\u0026p2), Some(\u0026p2)));\n    }\n}","traces":[{"line":15,"address":[632656],"length":1,"stats":{"Line":6}},{"line":19,"address":[632640],"length":1,"stats":{"Line":2}},{"line":20,"address":[632645],"length":1,"stats":{"Line":2}},{"line":23,"address":[632784],"length":1,"stats":{"Line":1}},{"line":24,"address":[632789],"length":1,"stats":{"Line":1}},{"line":27,"address":[632624],"length":1,"stats":{"Line":1}},{"line":28,"address":[632629],"length":1,"stats":{"Line":1}},{"line":32,"address":[632272],"length":1,"stats":{"Line":1}},{"line":33,"address":[632310],"length":1,"stats":{"Line":3}},{"line":36,"address":[632512],"length":1,"stats":{"Line":1}},{"line":37,"address":[632558],"length":1,"stats":{"Line":3}},{"line":40,"address":[632448],"length":1,"stats":{"Line":1}},{"line":41,"address":[632466],"length":1,"stats":{"Line":3}},{"line":44,"address":[632384],"length":1,"stats":{"Line":1}},{"line":45,"address":[632402],"length":1,"st
