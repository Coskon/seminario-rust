TipoSuscripcion::Classic =\u003e counts[1] += 1,\n            TipoSuscripcion::Super =\u003e counts[2] += 1\n        }\n    }\n\n    fn get_descuento_por_duracion(\u0026self, duracion_meses: u16) -\u003e f32 {\n        if duracion_meses \u003c 3 {\n            1.00 // sin descuento para 1 y 2 meses\n        } else if duracion_meses \u003c 6 {\n            0.95 // 5 % para 3 a 5 meses\n        } else if duracion_meses \u003c 12 {\n            0.9 // 10% para 6 a 11 meses\n        } else {\n            0.85 // 15% para \u003e=12 meses\n        }\n    }\n\n    pub fn get_costo_mensual(\u0026self, duracion_meses: u16) -\u003e f32 {\n        let descuento = self.get_descuento_por_duracion(duracion_meses);\n        match self {\n            TipoSuscripcion::Basic =\u003e 4.99*descuento,\n            TipoSuscripcion::Classic =\u003e 9.99*descuento,\n            TipoSuscripcion::Super =\u003e 17.99*descuento\n        }\n    }\n}\n\n#[derive(PartialEq, Clone, Debug)]\npub struct Suscripcion {\n    costo_mensual: f32,\n    duracion_meses: u16,\n    fecha_inicio: Fecha,\n    tipo: TipoSuscripcion,\n    activa: bool\n}\n\nimpl Suscripcion {\n    pub fn new(tipo: TipoSuscripcion, duracion_meses: u16, fecha_inicio: Fecha) -\u003e Self {\n        let costo_mensual = tipo.get_costo_mensual(duracion_meses);\n        Suscripcion { costo_mensual, duracion_meses, fecha_inicio, tipo, activa: true }\n    }\n\n    fn clone_nuevo_tipo(\u0026mut self, tipo: TipoSuscripcion) -\u003e Self {\n        self.activa = false;\n        Suscripcion::new(tipo, self.duracion_meses, self.fecha_inicio.clone())\n    }\n\n    pub fn upgrade(\u0026mut self) -\u003e Result\u003cSelf, \u0026'static str\u003e {\n        if self.esta_activa() {\n            match self.tipo {\n                TipoSuscripcion::Basic =\u003e Ok(self.clone_nuevo_tipo(TipoSuscripcion::Classic)),\n                TipoSuscripcion::Classic =\u003e Ok(self.clone_nuevo_tipo(TipoSuscripcion::Super)),\n                TipoSuscripcion::Super =\u003e Err(\"No se puede mejorar una suscripcion Super\")\n            }\n        } else {\n            Err(\"Suscripcion no activa\")\n        }\n        \n    }\n\n    pub fn downgrade(\u0026mut self) -\u003e Result\u003cSelf, \u0026'static str\u003e {\n        if self.esta_activa() {\n            match self.tipo {\n                TipoSuscripcion::Basic =\u003e self.cancelar(),\n                TipoSuscripcion::Classic =\u003e Ok(self.clone_nuevo_tipo(TipoSuscripcion::Basic)),\n                TipoSuscripcion::Super =\u003e Ok(self.clone_nuevo_tipo(TipoSuscripcion::Classic))\n            }\n        } else {\n            Err(\"Suscripcion no activa\")\n        }\n    }\n\n    pub fn cancelar(\u0026mut self) -\u003e Result\u003cSelf, \u0026'static str\u003e {\n        if self.esta_activa() {\n            self.activa = false;\n            Ok(self.clone())\n        } else {\n            Err(\"Suscripcion ya cancelada\")\n        }\n    }\n\n    pub fn esta_activa(\u0026self) -\u003e bool {\n        self.activa\n    }\n}\n\n#[derive(PartialEq, Copy, Clone, Debug)]\npub enum TipoMedioPago {\n    Efectivo,\n    MercadoPago,\n    TarjetaCredito,\n    Transferencia,\n    Cripto\n}\n\nimpl TipoMedioPago {\n    const ALL: [Self; 5] = [\n        Self::Efectivo,\n        Self::MercadoPago,\n        Self::TarjetaCredito,\n        Self::Transferencia,\n        Self::Cripto,\n    ];\n\n    pub fn incrementar(medio: \u0026MedioPago, counts: \u0026mut [usize; 5]) {\n        match medio {\n            MedioPago::Efectivo =\u003e counts[0] += 1,\n            MedioPago::MercadoPago { .. } =\u003e counts[1] += 1,\n            MedioPago::TarjetaCredito { .. } =\u003e counts[2] += 1,\n            MedioPago::Transferencia { .. } =\u003e counts[3] += 1,\n            MedioPago::Cripto { .. } =\u003e counts[4] += 1,\n        }\n    }\n}\n\n#[derive(PartialEq, Clone, Debug)]\npub enum MedioPago {\n    Efectivo,\n    MercadoPago {\n        alias: String\n    },\n    TarjetaCredito {\n        numero_tarjeta: String, // 1234-5678-9123-4567\n        cvv: u16\n    },\n    Transferencia {\n        numero_cuenta: u64\n    },\n    Cripto {\n        direccion_wallet: String\n    }\n}\n\nimpl MedioPago {\n    pub fn es_tipo(\u0026self, tipo: \u0026TipoMedioPago) -\u003e bool {\n        match (self, tipo) {\n            (MedioPago::Efectivo, TipoMedioPago::Efectivo) |\n            (MedioPago::MercadoPago { .. }, TipoMedioPago::MercadoPago) |\n            (MedioPago::TarjetaCredito { .. }, TipoMedioPago::TarjetaCredito) |\n            (MedioPago::Transferencia { .. }, TipoMedioPago::Transferencia) |\n            (MedioPago::Cripto { .. }, TipoMedioPago::Cripto) =\u003e true,\n            _ =\u003e false\n        }\n    }\n}\n\n#[derive(PartialEq, Clone, Debug)]\npub struct Usuario {\n    pub id: u64,\n    pub nombre: String,\n    medio_pago: MedioPago\n}\n\nimpl Usuario {\n    pub fn new(id: u64, nombre: \u0026str, medio_pago: MedioPago) -\u003e Self {\n        Usuario { id, nombre: nombre.to_string(), medio_pago }\n    }\n}\n\n#[derive(PartialEq, Clone, Debug)]\npub struct Plataforma {\n    usuarios: BTreeMap\u003cu64, Usuario\u003e,\n    suscripciones: BTreeMap\u003cu64, Vec\u003cSuscripcion\u003e\u003e,\n    curr_id: u64\n}\n\nimpl Plataforma {\n    pub fn new() -\u003e Self {\n        Plataforma { usuarios: BTreeMap::new(), suscripciones: BTreeMap::new(), curr_id: 0 }\n    }\n\n    fn get_next_userid(\u0026mut self) -\u003e u64 {\n        let tmp = self.curr_id;\n        self.curr_id += 1;\n        tmp\n    }\n\n    pub fn crear_usuario(\u0026mut self, nombre: \u0026str, suscripcion: Suscripcion, medio_pago: MedioPago) {\n        let id = self.get_next_userid();\n        self.usuarios.insert(id, Usuario::new(id, nombre, medio_pago));\n        self.suscripciones.insert(id, vec![suscripcion]);\n    }\n\n    pub fn upgrade_suscripcion(\u0026mut self, id: u64) -\u003e Result\u003c(), \u0026'static str\u003e {\n        if let Some(vecsusc) = self.suscripciones.get_mut(\u0026id) {\n            let newsusc = vecsusc.last_mut().unwrap().upgrade()?;\n            vecsusc.push(newsusc); \n            Ok(())\n        } else {\n            Err(\"Usuario no existente\")\n        }\n    }\n\n    pub fn downgrade_suscripcion(\u0026mut self, id: u64) -\u003e Result\u003c(), \u0026'static str\u003e {\n        if let Some(vecsusc) = self.suscripciones.get_mut(\u0026id) {\n            let newsusc = vecsusc.last_mut().unwrap().downgrade()?;\n            if newsusc.esta_activa() { vecsusc.push(newsusc); }\n            Ok(())\n        } else {\n            Err(\"Usuario no existente\")\n        }\n    }\n\n    pub fn cancelar_suscripcion(\u0026mut self, id: u64) -\u003e Result\u003c(), \u0026'static str\u003e {\n        if let Some(vecsusc) = self.suscripciones.get_mut(\u0026id) {\n            vecsusc.last_mut().unwrap().cancelar()?;\n            Ok(())\n        } else {\n            Err(\"Usuario no existente\")\n        }\n    }\n\n    fn tiene_suscripcion_activa(\u0026self, id: u64) -\u003e bool {\n        self.suscripciones.get(\u0026id).unwrap().last().unwrap().esta_activa()\n    }\n\n    pub fn medio_pago_mas_usado(\u0026self) -\u003e TipoMedioPago {\n        let mut counts: [usize; 5] = [0; 5];\n        for user in self.usuarios.values() {\n            TipoMedioPago::incrementar(\u0026user.medio_pago, \u0026mut counts);\n        }\n        \n        let maxpos = counts.iter().enumerate().max_by_key(|\u0026(_, v)| v).unwrap().0;\n        TipoMedioPago::ALL[maxpos]\n    }\n\n    pub fn medio_pago_mas_usado_activas(\u0026self) -\u003e TipoMedioPago {\n        let mut counts: [usize; 5] = [0; 5];\n        for user in self.usuarios.iter()\n                .filter_map(|(uid, user)| {\n                    if self.tiene_suscripcion_activa(*uid) { Some(user) } else { None }\n                }) {\n            TipoMedioPago::incrementar(\u0026user.medio_pago, \u0026mut counts);\n        }\n        \n        let maxpos = counts.iter().enumerate().max_by_key(|\u0026(_, v)| v).unwrap().0;\n        TipoMedioPago::ALL[maxpos]\n    }\n\n    pub fn suscripcion_mas_contratada(\u0026self) -\u003e TipoSuscripcion {\n        let mut counts: [usize; 3] = [0; 3];\n        for susc in self.suscripciones.values().flatten() {\n            TipoSuscripcion::incrementar(\u0026susc.tipo, \u0026mut counts);\n        }\n        let maxpos = counts.iter().enumerate().max_by_key(|\u0026(_, v)| v).unwrap().0;\n        TipoSuscripcion::ALL[maxpos]\n    }\n\n    pub fn suscripcion_mas_contratada_activas(\u0026self) -\u003e TipoSuscripcion {\n        let mut counts: [usize; 3] = [0; 3];\n        for susc in self.suscripciones.values()\n                    .filter_map(|vecsusc| {\n                        let s = vecsusc.last().unwrap();\n                        if s.esta_activa() { Some(s) } else { None }\n                    }) {\n            TipoSuscripcion::incrementar(\u0026susc.tipo, \u0026mut counts);\n        }\n        let maxpos = counts.iter().enumerate().max_by_key(|\u0026(_, v)| v).unwrap().0;\n        TipoSuscripcion::ALL[maxpos]\n    }\n\n    pub fn cant_usuarios(\u0026self) -\u003e usize {\n        self.usuarios.len()\n    }\n\n    pub fn cant_suscripciones(\u0026self) -\u003e usize {\n        self.suscripciones.values().flatten().count()\n    }\n\n    pub fn cant_suscripciones_activas(\u0026self) -\u003e usize {\n        self.suscripciones.values().filter_map(|vecsusc| {\n            let s = vecsusc.last().unwrap();\n            if s.esta_activa() { Some(s) } else { None }\n        }).count()\n    }\n\n    pub fn get_user(\u0026self, id: u64) -\u003e Option\u003c\u0026Usuario\u003e {\n        self.usuarios.get(\u0026id)\n    }\n\n    pub fn get_user_suscripciones(\u0026self, id: u64) -\u003e Option\u003c\u0026Vec\u003cSuscripcion\u003e\u003e {\n        self.suscripciones.get(\u0026id)\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    fn crear_plataforma_base() -\u003e Plataforma {\n        let mut p = Plataforma::new();\n        p.crear_usuario(\n            \"user1\", \n            Suscripcion::new(TipoSuscripcion::Classic, 3, Fecha::new(17, 6, 2026)),\n            MedioPago::TarjetaCredito { numero_tarjeta: \"4459-2323-0091-8928\".to_string(), cvv: 621 }\n        );\n        p.crear_usuario(\n            \"pedro56\", \n            Suscripcion::new(TipoSuscripcion::Basic, 6, Fecha::new(12, 2, 2026)),\n            MedioPago::MercadoPago { alias: \"pedro.martinez56.mp\".to_string() }\n        );\n        p.crear_usuario(\n            \"juan.diaz1\", \n            Suscripcion::new(TipoSuscripcion::Super, 12, Fecha::new(3, 8, 2025)),\n            MedioPago::Cripto { direccion_wallet: \"0x73210aDxnUD9A90JD82\".to_string() }\n        );\n        p\n    }\n\n    #[test]\n    fn test_crear_usuario() {\n        let mut p = crear_plataforma_base();\n        assert_eq!(p.cant_usuarios(), 3);\n        assert_eq!(p.cant_suscripciones(), 3);\n\n        let u1 = p.get_user(0);\n        assert!(u1.is_some_and(|u| u.nombre == \"user1\" \u0026\u0026 u.medio_pago.es_tipo(\u0026TipoMedioPago::TarjetaCredito) \u0026\u0026 !u.medio_pago.es_tipo(\u0026TipoMedioPago::MercadoPago)));\n\n        let u2 = p.get_user(1);\n        assert!(u2.is_some_and(|u| u.nombre == \"pedro56\" \u0026\u0026 u.medio_pago.es_tipo(\u0026TipoMedioPago::MercadoPago)));\n\n        let u3 = p.get_user(2);\n        assert!(u3.is_some_and(|u| u.nombre == \"juan.diaz1\" \u0026\u0026 u.medio_pago.es_tipo(\u0026TipoMedioPago::Cripto)));\n    \n        assert!(p.get_user(3).is_none());\n        assert_eq!(p.get_user_suscripciones(0).unwrap().get(0).unwrap().fecha_inicio, Fecha::new(17, 6, 2026));\n        assert!(p.get_user_suscripciones(1).unwrap().get(0).unwrap().fecha_inicio != Fecha::new(17, 6, 2026));\n    }\n\n    #[test]\n    fn test_upgrade_suscripcion() {\n        let mut p = crear_plataforma_base();\n\n        assert!(p.get_user_suscripciones(0).unwrap().get(0).is_some_and(|s| s.tipo == TipoSuscripcion::Classic));\n\n        // upgrade Classic a Super\n        assert!(p.upgrade_suscripcion(0).is_ok());\n        let susc0 = p.get_user_suscripciones(0).unwrap();\n        assert!(susc0.get(0).is_some_and(|s| s.tipo == TipoSuscripcion::Classic \u0026\u0026 !s.esta_activa()));\n        assert!(susc0.get(1).is_some_and(|s| s.tipo == TipoSuscripcion::Super \u0026\u0026 s.esta_activa()));\n\n        // intentar upgrade de Super falla\n        assert!(p.upgrade_suscripcion(0).is_err());\n\n        // se guardan todas las suscripciones, pero no se agregan nuevas activas (1 por usuario)\n        assert_eq!(p.cant_suscripciones_activas(), p.cant_usuarios());\n        assert_eq!(p.cant_suscripciones(), p.cant_usuarios()+1);\n\n        // upgrade Basic a Classic\n        assert!(p.upgrade_suscripcion(1).is_ok());\n        let susc1 = p.get_user_suscripciones(1).unwrap();\n        assert!(susc1.get(0).is_some_and(|s| s.tipo == TipoSuscripcion::Basic \u0026\u0026 !s.esta_activa()));\n        assert!(susc1.get(1).is_some_and(|s| s.tipo == TipoSuscripcion::Classic \u0026\u0026 s.esta_activa()));\n\n        assert_eq!(p.cant_suscripciones_activas(), p.cant_usuarios());\n        assert_eq!(p.cant_suscripciones(), p.cant_usuarios()+2);\n\n        // upgrade a suscripcion no activa\n        p.cancelar_suscripcion(0);\n        assert!(p.upgrade_suscripcion(0).is_err());\n\n        // upgrade a usuario no existente\n        assert!(p.upgrade_suscripcion(100).is_err());\n    }\n\n    #[test]\n    fn test_downgrade_suscripcion() {\n        let mut p = crear_plataforma_base();\n\n        // downgrade Classic a Basic\n        assert!(p.downgrade_suscripcion(0).is_ok());\n        let susc0 = p.get_user_suscripciones(0).unwrap();\n        assert!(susc0.get(0).is_some_and(|s| s.tipo == TipoSuscripcion::Classic \u0026\u0026 !s.esta_activa()));\n        assert!(susc0.get(1).is_some_and(|s| s.tipo == TipoSuscripcion::Basic \u0026\u0026 s.esta_activa()));\n\n        // downgrade Basic cancela, sin agregar al historial una nueva entrada\n        assert!(p.downgrade_suscripcion(0).is_ok());\n        let susc0 = p.get_user_suscripciones(0).unwrap();\n        assert!(susc0.get(0).is_some_and(|s| s.tipo == TipoSuscripcion::Classic \u0026\u0026 !s.esta_activa()));\n        assert!(susc0.get(1).is_some_and(|s| s.tipo == TipoSuscripcion::Basic \u0026\u0026 !s.esta_activa()));\n        assert!(susc0.get(2).is_none());\n\n        // intentar downgrade con cancelada falla\n        assert!(p.downgrade_suscripcion(0).is_err());\n\n        // hay 3 usuarios, pero 1 cancelo\n        // 1 suscripcion activa a lo sumo por usuario, pero se guarda el historial\n        assert_eq!(p.cant_suscripciones_activas(), p.cant_usuarios()-1);\n        assert_eq!(p.cant_suscripciones(), p.cant_usuarios()+1);\n\n        // downgrade Super a Classic\n        assert!(p.downgrade_suscripcion(2).is_ok());\n        let susc2 = p.get_user_suscripciones(2).unwrap();\n        assert!(susc2.get(0).is_some_and(|s| s.tipo == TipoSuscripcion::Super \u0026\u0026 !s.esta_activa()));\n        assert!(susc2.get(1).is_some_and(|s| s.tipo == TipoSuscripcion::Classic \u0026\u0026 s.esta_activa()));\n\n        assert_eq!(p.cant_suscripciones_activas(), p.cant_usuarios()-1);\n        assert_eq!(p.cant_suscripciones(), p.cant_usuarios()+2);\n\n        // downgrade a usuario no existente\n        assert!(p.downgrade_suscripcion(100).is_err());\n    }\n\n    #[test]\n    fn test_cancelar_suscripcion() {\n        let mut p = crear_plataforma_base();\n\n        assert!(p.get_user_suscripciones(0).unwrap().get(0).is_some_and(|s| s.tipo == TipoSuscripcion::Classic));\n\n        // cancelar suscripcion de usuario 0 (no agrega al historial)\n        assert!(p.cancelar_suscripcion(0).is_ok());\n        let susc0 = p.get_user_suscripciones(0).unwrap();\n        assert!(susc0.get(0).is_some_and(|s| s.tipo == TipoSuscripcion::Classic \u0026\u0026 !s.esta_activa()));\n        assert!(susc0.get(1).is_none());\n\n        // intentar cancelar de nuevo falla\n        assert!(p.cancelar_suscripcion(0).is_err());\n\n        // hay 3 usuarios, 1 cancelo, no cambia la cantidad de suscripciones totales\n        assert_eq!(p.cant_suscripciones_activas(), p.cant_usuarios()-1);\n        assert_eq!(p.cant_suscripciones(), p.cant_usuarios());\n\n        // cancelo a usuario no existente\n        assert!(p.cancelar_suscripcion(100).is_err());\n    }\n\n    #[test]\n    fn test_medio_pago_mas_usado_activas() {\n        let mut p = crear_plataforma_base();\n        p.crear_usuario(\n            \"maria.a13\", \n            Suscripcion::new(TipoSuscripcion::Classic, 7, Fecha::new(25, 4, 2026)),\n            MedioPago::Cripto { direccion_wallet: \"0x834hDUjd9k29dna7DH9\".to_string() }\n        );\n\n        // id 0: TarjetaCredito (activo)\n        // id 1: MercadoPago (activo)\n        // id 2: Cripto (activo)\n        // id 3: Cripto (activo)\n        // mas usado activo -\u003e Cripto\n        let mp = p.medio_pago_mas_usado_activas();\n        assert_eq!(mp, TipoMedioPago::Cripto);\n\n        assert!(p.cancelar_suscripcion(2).is_ok());\n        assert!(p.cancelar_suscripcion(3).is_ok());\n\n        p.crear_usuario(\n            \"carlos_sanchez_12\", \n            Suscripcion::new(TipoSuscripcion::Basic, 4, Fecha::new(13, 5, 2026)),\n            MedioPago::MercadoPago { alias: \"carlos.sanchez.mp\".to_string() }\n        );\n        p.crear_usuario(\n            \"messi.crack10\", \n            Suscripcion::new(TipoSuscripcion::Super, 1, Fecha::new(2, 6, 2025)),\n            MedioPago::Transferencia { numero_cuenta: 1234567 }\n        );\n        p.crear_usuario(\n            \"garcia.perez2\", \n            Suscripcion::new(TipoSuscripcion::Classic, 26, Fecha::new(29, 4, 2026)),\n            MedioPago::Efectivo\n        );\n\n        // id 0: TarjetaCredito (activo)\n        // id 1: MercadoPago (activo)\n        // id 2: Cripto (inactivo)\n        // id 3: Cripto (inactivo)\n        // id 4: MercadoPago (activo)\n        // id 5: Transferencia (inactivo)\n        // id 6: Efectivo (inactivo)\n        // mas usado activo -\u003e MercadoPago\n        let mp = p.medio_pago_mas_usado_activas();\n        assert_eq!(mp, TipoMedioPago::MercadoPago);\n    }\n\n    #[test]\n    fn test_medio_pago_mas_usado() {\n        let mut p = crear_plataforma_base();\n        p.crear_usuario(\n            \"maria.a13\", \n            Suscripcion::new(TipoSuscripcion::Classic, 7, Fecha::new(25, 4, 2026)),\n            MedioPago::Cripto { direccion_wallet: \"0x834hDUjd9k29dna7DH9\".to_string() }\n        );\n\n        // id 0: TarjetaCredito (activo)\n        // id 1: MercadoPago (activo)\n        // id 2: Cripto (activo)\n        // id 3: Cripto (activo)\n        // mas usado general -\u003e Cripto\n        let mp = p.medio_pago_mas_usado();\n        assert_eq!(mp, TipoMedioPago::Cripto);\n\n        assert!(p.cancelar_suscripcion(1).is_ok());\n        assert!(p.cancelar_suscripcion(3).is_ok());\n\n        p.crear_usuario(\n            \"carlos_sanchez_12\", \n            Suscripcion::new(TipoSuscripcion::Basic, 4, Fecha::new(13, 5, 2026)),\n            MedioPago::MercadoPago { alias: \"carlos.sanchez.mp\".to_string() }\n        );\n        p.crear_usuario(\n            \"leonardo.da.vinci_9\", \n            Suscripcion::new(TipoSuscripcion::Super, 24, Fecha::new(1, 2, 2025)),\n            MedioPago::MercadoPago { alias: \"leonardito.mp\".to_string() }\n        );\n        assert!(p.cancelar_suscripcion(4).is_ok());\n        assert!(p.cancelar_suscripcion(5).is_ok());\n\n        // id 0: TarjetaCredito (activo)\n        // id 1: MercadoPago (inactivo)\n        // id 2: Cripto (activo)\n        // id 3: Cripto (inactivo)\n        // id 4: MercadoPago (inactivo)\n        // id 5: MercadoPago (inactivo)\n        // mas usado general -\u003e MercadoPago\n        let mp = p.medio_pago_mas_usado();\n        assert_eq!(mp, TipoMedioPago::MercadoPago);\n    }\n\n    #[test]\n    fn test_suscripcion_mas_contratada_activas() {\n        let mut p = crear_plataforma_base();\n        p.crear_usuario(\n            \"maria.a13\", \n            Suscripcion::new(TipoSuscripcion::Classic, 7, Fecha::new(25, 4, 2026)),\n            MedioPago::Cripto { direccion_wallet: \"0x834hDUjd9k29dna7DH9\".to_string() }\n        );\n\n        // id 0: Classic (activo)\n        // id 1: Basic (activo)\n        // id 2: Super (activo)\n        // id 3: Classic (activo)\n        // mas usado activo -\u003e Classic\n        let sus = p.suscripcion_mas_contratada_activas();\n        assert_eq!(sus, TipoSuscripcion::Classic);\n\n        assert!(p.cancelar_suscripcion(2).is_ok());\n        assert!(p.cancelar_suscripcion(3).is_ok());\n\n        p.crear_usuario(\n            \"carlos_sanchez_12\", \n            Suscripcion::new(TipoSuscripcion::Basic, 4, Fecha::new(13, 5, 2026)),\n            MedioPago::MercadoPago { alias: \"carlos.sanchez.mp\".to_string() }\n        );\n\n        // id 0: Classic (activo)\n        // id 1: Basic (activo)\n        // id 2: Super (inactivo)\n        // id 3: Classic (inactivo)\n        // id 4: Basic (activo)\n        // mas usado activo -\u003e Classic\n        let sus = p.suscripcion_mas_contratada_activas();\n        assert_eq!(sus, TipoSuscripcion::Basic);\n    }\n\n    #[test]\n    fn test_suscripcion_mas_contratada() {\n        let mut p = crear_plataforma_base();\n        p.crear_usuario(\n            \"maria.a13\", \n            Suscripcion::new(TipoSuscripcion::Classic, 7, Fecha::new(25, 4, 2026)),\n            MedioPago::Cripto { direccion_wallet: \"0x834hDUjd9k29dna7DH9\".to_string() }\n        );\n\n        // id 0: Classic (activo)\n        // id 1: Basic (activo)\n        // id 2: Super (activo)\n        // id 3: Classic (activo)\n        // mas usado general -\u003e Classic\n        let mp = p.suscripcion_mas_contratada();\n        assert_eq!(mp, TipoSuscripcion::Classic);\n\n        assert!(p.cancelar_suscripcion(1).is_ok());\n\n        p.crear_usuario(\n            \"carlos_sanchez_12\", \n            Suscripcion::new(TipoSuscripcion::Basic, 4, Fecha::new(13, 5, 2026)),\n            MedioPago::MercadoPago { alias: \"carlos.sanchez.mp\".to_string() }\n        );\n        p.crear_usuario(\n            \"leonardo.da.vinci_9\", \n            Suscripcion::new(TipoSuscripcion::Basic, 2, Fecha::new(1, 2, 2025)),\n            MedioPago::MercadoPago { alias: \"leonardito.mp\".to_string() }\n        );\n        assert!(p.cancelar_suscripcion(4).is_ok());\n        assert!(p.cancelar_suscripcion(5).is_ok());\n\n        // id 0: Classic (activo)\n        // id 1: Basic (inactivo)\n        // id 2: Super (activo)\n        // id 3: Classic (activo)\n        // id 4: Basic (inactivo)\n        // id 5: Basic (inactivo)\n        // mas usado general -\u003e Basic\n        let mp = p.suscripcion_mas_contratada();\n        assert_eq!(mp, TipoSuscripcion::Basic);\n    }\n}\n\n\n\n\n\n\n","traces":[{"line":6,"address":[795856],"length":1,"stats":{"Line":1}},{"line":7,"address":[795870],"length":1,"stats":{"Line":1}},{"line":10,"address":[795888],"length":1,"stats":{"Line":1}},{"line":11,"address":[795902],"length":1,"stats":{"Line":1}},{"line":27,"address":[614592],"length":1,"stats":{"Line":1}},{"line":28,"address":[614611],"length":1,"stats":{"Line":1}},{"line":29,"address":[614648,614735],"length":1,"stats":{"Line":3}},{"line":30,"address":[614768,614675],"length":1,"stats":{"Line":2}},{"line":31,"address":[614703,614796],"length":1,"stats":{"Line":4}},{"line":35,"address":[614992],"length":1,"stats":{"Line":7}},{"line":36,"address":[615010,615043],"length":1,"stats":{"Line":3}},{"line":37,"address":[615029],"length":1,"stats":{"Line":2}},{"line":38,"address":[615072,615021],"length":1,"stats":{"Line":8}},{"line":39,"address":[615058],"length":1,"stats":{"Line":7}},{"line":40,"address":[615050,615088],"length":1,"stats":{"Line":14}},{"line":41,"address":[615090],"length":1,"stats":{"Line":1}},{"line":43,"address":[6 612327],"length":1,"stats":{"Line":1}},{"line":278,"address":[612784],"length":1,"stats":{"Line":1}},{"line":279,"address":[612804],"length":1,"stats":{"Line":1}},{"line":280,"address":[612899,612861,612826],"length":1,"stats":{"Line":3}},{"line":281,"address":[755184],"length":1,"stats":{"Line":2}},{"line":282,"address":[755211],"length":1,"stats":{"Line":1}},{"line":283,"address":[755255],"length":1,"stats":{"Line":1}},{"line":285,"address":[612967],"length":1,"stats":{"Line":1}},{"line":287,"address":[612983],"length":1,"stats":{"Line":3}},{"line":288,"address":[613057,613114],"length":1,"stats":{"Line":1}},{"line":291,"address":[609776],"length":1,"stats":{"Line":1}},{"line":292,"address":[609781],"length":1,"stats":{"Line":1}},{"line":295,"address":[610368],"length":1,"stats":{"Line":1}},{"line":296,"address":[610386],"length":1,"stats":{"Line":1}},{"line":299,"address":[611984],"length":1,"stats":{"Line":1}},{"line":300,"address":[754928],"length":1,"stats":{"Line":2}},{"line":301,"address":[754955],"length":1,"stats":{"Line":1}},{"line":302,"address":[754999],"length":1,"stats":{"Line":1}},{"line":303,"address":[612029],"length":1,"stats":{"Line":2}},{"line":306,"address":[613296],"length":1,"stats":{"Line":1}},{"line":307,"address":[613310],"length":1,"stats":{"Line":1}},{"line":310,"address":[611840],"length":1,"stats":{"Line":1}},{"line":311,"address":[611854],"length":1,"stats":{"Line":1}}],"covered":132,"coverable":132},{"path":["/","home","cosk","rust","practicas","src","tp04","ej4.rs"],"content":"#![allow(unused)]\nuse crate::tp03::ej3::Fecha;\nuse std::collections::HashMap;\n\n#[derive(Hash, Eq, PartialEq, Clone, Debug)]\npub enum Categoria {\n    Ropa, Deportes, Juguetes, Libros, Belleza,\n    Comida, Salud, Hogar, Automotor, Electronica\n}\n\nimpl Categoria {\n    fn get_descuento(\u0026self) -\u003e f64 {\n        match self {\n            Categoria::Ropa =\u003e 0.95,\n            Categoria::Deportes =\u003e 1.0,\n            Categoria::Juguetes =\u003e 1.0,\n            Categoria::Libros =\u003e 0.9,\n            Categoria::Belleza =\u003e 0.95,\n            Categoria::Comida =\u003e 0.95,\n            Categoria::Salud =\u003e 1.0,\n            Categoria::Hogar =\u003e 0.9,\n            Categoria::Automotor =\u003e 1.0,\n            Categoria::Electronica =\u003e 1.0\n        }\n    }\n}\n\n#[derive(PartialEq, Clone, Debug)]\npub struct Producto {\n    pub nombre: String,\n    pub categoria: Categoria,\n    pub precio_base: f64\n}\n\nimpl Producto {\n    pub fn new(nombre: \u0026str, categoria: Categoria, precio_base: f64) -\u003e Self {\n        Producto { nombre: nombre.to_string(), categoria, precio_base }\n    }\n\n    pub fn get_precio_final(\u0026self) -\u003e f64 {\n        self.precio_base * self.categoria.get_descuento()\n    }\n}\n\n#[derive(PartialEq, Clone, Debug)]\npub struct Cliente {\n    pub nombre: String,\n    pub apellido: String,\n    pub direccion: String,\n    pub email: Option\u003cString\u003e,\n    pub dni: u32\n}\n\nimpl Cliente {\n    pub fn new(nombre: \u0026str, apellido: \u0026str, direccion: \u0026str, email: Option\u003c\u0026str\u003e, dni: u32) -\u003e Self {\n        Cliente { nombre: nombre.to_string(), apellido: apellido.to_string(), direccion: direccion.to_string(), \n            email: email.map(|x| x.to_string()), dni }\n    }\n}\n\n#[derive(PartialEq, Clone, Debug)]\npub struct Vendedor {\n    pub legajo: u16,\n    pub antiguedad: u16,\n    pub salario: f64\n}\n\nimpl Vendedor {\n    pub fn new(legajo: u16, antiguedad: u16, salario: f64) -\u003e Self {\n        Vendedor { legajo, antiguedad, salario }\n    }\n}\n\n#[derive(PartialEq, Clone, Debug)]\npub enum MedioPago {\n    TarjetaCredito, TarjetaDebito, Transferencia, Efectivo\n}\n\n#[derive(PartialEq, Clone, Debug)]\npub struct Venta {\n    fecha: Fecha,\n    cliente: Cliente,\n    vendedor: Vendedor,\n    medio_pago: MedioPago,\n    productos: Vec\u003c(Producto, u32)\u003e\n}\n\nimpl Venta {\n    pub fn new(fecha: Fecha, cliente: Cliente, vendedor: Vendedor, medio_pago: MedioPago, productos: Vec\u003c(Producto, u32)\u003e) -\u003e Self {\n        Venta { fecha, cliente, vendedor, medio_pago, productos }\n    }\n}\n\n#[derive(PartialEq, Debug, Clone)]\npub enum ErrorVenta {\n    ListaProductosVacia, PrecioCeroNegativo, CantidadCero\n}\n\npub struct SistemaVentas {\n    ventas: Vec\u003cVenta\u003e,\n    vendedores: HashMap\u003cu16, Vendedor\u003e,\n}\n\nimpl SistemaVentas {\n    pub fn new() -\u003e Self {\n        SistemaVentas { ventas: vec![], vendedores: HashMap::new() }\n    }\n\n    pub fn registrar_venta(\u0026mut self, fecha: Fecha, cliente: Cliente, vendedor: Vendedor, \n        medio_pago: MedioPago, productos: Vec\u003c(Producto, u32)\u003e) -\u003e Result\u003c(), ErrorVenta\u003e {\n        if productos.is_empty() {\n            Err(ErrorVenta::ListaProductosVacia)\n        } else {\n            productos.iter().try_for_each(|(p, cant)| {\n                if p.precio_base \u003c= 0.0 {\n                    Err(ErrorVenta::PrecioCeroNegativo)\n                } else if *cant == 0 {\n                    Err(ErrorVenta::CantidadCero)\n                } else {\n                    Ok(())\n                }\n            })?;\n            let venta = Venta::new(fecha, cliente, vendedor.clone(), medio_pago, productos);\n            self.vendedores.entry(vendedor.legajo).or_insert(vendedor);\n\n            self.ventas.push(venta);\n            Ok(())\n        }\n    }\n\n    fn get_descuento_newsteller(\u0026self, cliente: \u0026Cliente) -\u003e f64 {\n        if cliente.email.is_some() { 0.9 } // 10% si esta suscrito\n        else { 1.0 } // sin descuento si no esta suscrito\n    }\n\n    fn calcular_precio_final(\u0026self, prod: \u0026Producto, cant: u32) -\u003e f64 {\n        prod.get_precio_final()*f64::from(cant)\n    }\n\n    pub fn calcular_precio_total(\u0026self, venta: \u0026Venta) -\u003e f64 {\n        let precio_prods: f64 = venta.productos.iter()\n            .map(|(p, cant)| self.calcular_precio_final(p, *cant))\n            .sum();\n        precio_prods*self.get_descuento_newsteller(\u0026venta.cliente)\n    }\n\n    pub fn get_venta(\u0026self, index: usize) -\u003e Option\u003c\u0026Venta\u003e {\n        self.ventas.get(index)\n    }\n\n    pub fn get_vendedor(\u0026self, legajo: u16) -\u003e Option\u003c\u0026Vendedor\u003e {\n        self.vendedores.get(\u0026legajo)\n    }\n\n    pub fn reporte_ventas_categoria(\u0026self) -\u003e HashMap\u003cCategoria, f64\u003e {\n        let mut reporte = HashMap::new();\n\n        self.ventas.iter().for_each(|v| {\n            let descuento = self.get_descuento_newsteller(\u0026v.cliente);\n            v.productos.iter().for_each(|(p, cant)|\n                *reporte.entry(p.categoria.clone()).or_insert(0.0) += self.calcular_precio_final(p, *cant)*descuento\n            )\n        });\n\n        reporte\n    }\n\n    pub fn reporte_ventas_vendedor(\u0026self) -\u003e HashMap\u003cu16, f64\u003e {\n        let mut reporte = HashMap::new();\n\n        self.ventas.iter().for_each(|v|\n            *reporte.entry(v.vendedor.legajo).or_insert(0.0) += self.calcular_precio_total(\u0026v)\n        );\n\n        reporte\n    }\n}\n\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    \n    fn crear_sistema_base() -\u003e SistemaVentas {\n        let mut sv = SistemaVentas::new();\n        assert!(sv.registrar_venta(\n            Fecha::new(1, 2, 2026),\n            Cliente::new(\"Pedro\", \"Perez\", \"7 y 47\", Some(\"pedro.perez@gmail.com\"), 43_298_371), \n            Vendedor::new(1234, 6, 900_000.0), \n            MedioPago::Efectivo, \n            vec![\n                (Producto::new(\"Arroz 1Kg\", Categoria::Comida, 1050.0), 2),\n                (Producto::new(\"Fideos Tallarin\", Categoria::Comida, 1250.0), 4),\n                (Producto::new(\"Cargador Celular\", Categoria::Electronica, 5649.99), 1),\n                (Producto::new(\"Par Medias\", Categoria::Ropa, 3999.99), 1),\n            ]).is_ok());\n        assert!(sv.registrar_venta(\n            Fecha::new(26, 5, 2026),\n            Cliente::new(\"Maria\", \"Sanchez\", \"4 y 42\", None, 39_876_019), \n            Vendedor::new(1234, 6, 900_000.0), \n            MedioPago::Efectivo, \n            vec![\n                (Producto::new(\"Queso Crema\", Categoria::Comida, 2349.99), 2),\n                (Producto::new(\"Aceite Auto\", Categoria::Automotor, 44499.99), 1),\n                (Producto::new(\"36u Bloques Construccion\", Categoria::Juguetes, 30000.0), 1),\n            ]).is_ok());\n        assert!(sv.registrar_venta(\n            Fecha::new(3, 6, 2026),\n            Cliente::new(\"Juan\", \"Martinez\", \"2 y 37\", Some(\"juan.martinez@gmail.com\"), 44_414_141), \n            Vendedor::new(5678, 15, 1_200_000.0), \n            MedioPago::TarjetaDebito, \n            vec![\n                (Producto::new(\"Desodorante\", Categoria::Belleza, 6500.0), 1),\n                (Producto::new(\"Mancuerna 5kg\", Categoria::Deportes, 14999.99), 2),\n                (Producto::new(\"Harry Potter\", Categoria::Libros, 34999.99), 1),\n                (Producto::new(\"Lampara LED\", Categoria::Hogar, 7000.0), 1)\n            ]).is_ok());\n\n        sv\n    }\n\n    #[test]\n    fn test_crear_venta() {\n        let mut sv = SistemaVentas::new();\n        assert!(sv.registrar_venta(\n            Fecha::new(1, 2, 2026),\n            Cliente::new(\"Pedro\", \"Perez\", \"7 y 47\", Some(\"pedro.perez@gmail.com\"), 43_298_371), \n            Vendedor::new(1234, 6, 900_000.0), \n            MedioPago::Efectivo, \n            vec![ \n                (Producto::new(\"Arroz 1Kg\", Categoria::Comida, 1050.0), 2),\n                (Producto::new(\"Fideos Tallarin\", Categoria::Comida, 1250.0), 4),\n                (Producto::new(\"Cargador Celular\", Categoria::Electronica, 5649.99), 1),\n                (Producto::new(\"Par Medias\", Categoria::Ropa, 3999.99), 1),\n            ]).is_ok());\n ".to_string());\n    assert_eq!(p2.obtener_edad(), 28 as u8);\n    assert_eq!(p2.direccion, Some(\"3 y 47 Nro 1111\".to_string()));\n}\n\n#[test]\nfn test_persona_actualizar_direccion() {\n    let mut p1 = Persona::new(\"Juan Pedro\", 23, None);\n    p1.actualizar_direccion(\"2 y 50 Nro 1234\");\n    assert_eq!(p1.direccion, Some(\"2 y 50 Nro 1234\".to_string()));\n    p1.actualizar_direccion(\"\");\n    assert_eq!(p1.direccion, Some(\"\".to_string()));\n}\n\n#[test]\nfn test_persona_to_string() {\n    let p1 = Persona::new(\"Carlos\", 26, None);\n    assert_eq!(p1.to_string(), \"Carlos; 26\".to_string());\n    let p2 = Persona::new(\"Violeta\", 22, Some(\"4 y 49 Nro 3421\".to_string()));\n    assert_eq!(p2.to_string(), \"Violeta; 22; 4 y 49 Nro 3421\".to_string());\n    let p3 = Persona::new(\"Ricardo\", 24, Some(\"\".to_string()));\n    assert_eq!(p3.to_string(), \"Ricardo; 24; \".to_string());\n}","traces":[{"line":9,"address":[929024,929206],"length":1,"stats":{"Line":3}},{"line":10,"address":[929119,929067],"length":1,"stats":{"Line":6}},{"line":13,"address":[929232],"length":1,"stats":{"Line":1}},{"line":14,"address":[929262],"length":1,"stats":{"Line":1}},{"line":15,"address":[929321],"length":1,"stats":{"Line":1}},{"line":16,"address":[929549],"length":1,"stats":{"Line":1}},{"line":20,"address":[928832],"length":1,"stats":{"Line":1}},{"line":21,"address":[928837],"length":1,"stats":{"Line":1}},{"line":24,"address":[928848,928950],"length":1,"stats":{"Line":1}},{"line":25,"address":[928981,928923,928877],"length":1,"stats":{"Line":2}}],"covered":10,"coverable":10},{"path":["/","home","cosk","rust","practicas","src","tp03","ej10.rs"],"content":"#![allow(unused)]\nuse std::collections::HashMap;\nuse super::ej3::Fecha;\n\n#[derive(Debug, Clone)]\npub enum Genero {\n    NOVELA, INFANTIL, TECNICO, OTRO\n}\n\nimpl Genero {\n    pub fn equals(\u0026self, other: \u0026Self) -\u003e bool {\n        match (self, other) {\n            (Genero::NOVELA, Genero::NOVELA) =\u003e true, (Genero::TECNICO, Genero::TECNICO) =\u003e true,\n            (Genero::INFANTIL, Genero::INFANTIL) =\u003e true, (Genero::OTRO, Genero::OTRO) =\u003e true,\n            _ =\u003e false\n        }\n    }\n}\n\n#[derive(Debug, Clone)]\npub enum Estado {\n    Devuelto, EnPrestamo\n}\n\nimpl Estado {\n    pub fn equals(\u0026self, other: \u0026Self) -\u003e bool {\n        match (self, other) {\n            (Estado::Devuelto, Estado::Devuelto) =\u003e true,\n            (Estado::EnPrestamo, Estado::EnPrestamo) =\u003e true,\n            _ =\u003e false\n        }\n    }\n}\n\n#[derive(Debug, Clone)]\npub struct Libro {\n    isbn: String,\n    titulo: String,\n    autor: String,\n    paginas: usize,\n    genero: Genero\n}\n\nimpl Libro {\n    pub fn new(isbn: \u0026str, titulo: \u0026str, autor: \u0026str, paginas: usize, genero: Genero) -\u003e Self {\n        Libro { isbn: isbn.to_string(), titulo: titulo.to_string(), autor: autor.to_string(), paginas, genero }\n    }\n\n    pub fn equals(\u0026self, other: \u0026Self) -\u003e bool {\n        self.isbn == other.isbn \u0026\u0026 self.titulo == other.titulo \u0026\u0026 self.autor == other.autor \u0026\u0026\n        self.paginas == other.paginas \u0026\u0026 self.genero.equals(\u0026other.genero)\n    }\n}\n\n#[derive(Debug, Clone)]\npub struct Cliente {\n    nombre: String,\n    telefono: String,\n    email: String\n}\n\nimpl Cliente {\n    pub fn new(nombre: \u0026str, telefono: \u0026str, email: \u0026str) -\u003e Self {\n        Cliente { nombre: nombre.to_string(), telefono: telefono.to_string(), email: email.to_string() }\n    }\n\n    pub fn equals(\u0026self, other: \u0026Self) -\u003e bool {\n        self.nombre == other.nombre \u0026\u0026 self.telefono == other.telefono \u0026\u0026 self.email == other.email\n    }\n}\n\n#[derive(Debug)]\npub struct Prestamo {\n    libro: Libro,\n    cliente: Cliente,\n    fecha_vencimiento: Fecha,\n    fecha_devolucion: Option\u003cFecha\u003e,\n    estado: Estado\n}\n\nimpl Prestamo {\n    pub fn new(libro: Libro, cliente: Cliente, fecha_vencimiento: Fecha, fecha_devolucion: Option\u003cFecha\u003e, estado: Estado) -\u003e Self {\n        Prestamo { libro, cliente, fecha_devolucion, fecha_vencimiento, estado }\n    }\n}\n\n#[derive(Debug)]\npub struct Biblioteca {\n    nombre: String,\n    direccion: String,\n    libros_disponibles: HashMap\u003cString, usize\u003e,\n    prestamos_efectuados: Vec\u003cPrestamo\u003e\n}\n\nimpl Biblioteca {\n    pub fn new(nombre: \u0026str, direccion: \u0026str) -\u003e Self {\n        Biblioteca { nombre: nombre.to_string(), direccion: direccion.to_string(), libros_disponibles: HashMap::new(), prestamos_efectuados: vec![] }\n    }\n\n    pub fn cantidad_copias(\u0026self, libro: \u0026Libro) -\u003e usize {\n        if let Some(cant) = self.libros_disponibles.get(\u0026libro.isbn) {\n            return *cant\n        }\n        0\n    }\n\n    pub fn decrementar_copias(\u0026mut self, libro: \u0026Libro) -\u003e bool {\n        if let Some(cant) = self.libros_disponibles.get_mut(\u0026libro.isbn) {\n            if *cant \u003e 0 {\n                *cant -= 1;\n                return true\n            }\n        }\n        false\n    }\n\n    pub fn incrementar_copias(\u0026mut self, libro: \u0026Libro) {\n        if let Some(cant) = self.libros_disponibles.get_mut(\u0026libro.isbn) {\n            *cant += 1;\n        } else {\n            self.libros_disponibles.insert(libro.isbn.clone(), 1);\n        }\n    }\n\n    pub fn contar_prestamos(\u0026self, email_cliente: \u0026str) -\u003e usize {\n        let mut cant = 0_usize;\n        for prestamo in \u0026self.prestamos_efectuados {\n            if prestamo.cliente.email.as_str() == email_cliente \u0026\u0026 prestamo.estado.equals(\u0026Estado::EnPrestamo) {\n                cant += 1;\n            }\n        }\n        cant\n    }\n\n    pub fn realizar_prestamo(\u0026mut self, cliente: Cliente, libro: Libro, fecha_vencimiento: Fecha) -\u003e bool {\n        if self.contar_prestamos(\u0026cliente.email) \u003e 5 {\n            return false\n        }\n\n        if (!self.decrementar_copias(\u0026libro)) {\n            return false\n        }\n\n        self.prestamos_efectuados.push(Prestamo::new(\n            libro, cliente, fecha_vencimiento, None, Estado::EnPrestamo\n        ));\n        true\n    }\n\n    pub fn prestamos_a_vencer(\u0026self, antes_de_dias: u32) -\u003e Vec\u003c\u0026Prestamo\u003e {\n        let mut prest_vencer = vec![];\n        let mut fecha_limite = Fecha::fecha_actual(); fecha_limite.sumar_dias(antes_de_dias);\n        for prestamo in \u0026self.prestamos_efectuados {\n            if prestamo.estado.equals(\u0026Estado::EnPrestamo) \u0026\u0026 fecha_limite.es_mayor(\u0026prestamo.fecha_vencimiento) {\n                prest_vencer.push(prestamo);\n            }\n        }\n        prest_vencer\n    }\n\n    pub fn prestamos_vencidos(\u0026self) -\u003e Vec\u003c\u0026Prestamo\u003e {\n        self.prestamos_a_vencer(0)\n    }\n\n    pub fn buscar_prestamo(\u0026mut self, libro: \u0026Libro, cliente: \u0026Cliente) -\u003e Option\u003c\u0026mut Prestamo\u003e {\n        for prestamo in self.prestamos_efectuados.iter_mut() {\n            if prestamo.libro.equals(libro) \u0026\u0026 prestamo.cliente.equals(cliente) {\n                return Some(prestamo)\n            }\n        }\n        None\n    }\n\n    pub fn devolver_libro(\u0026mut self, libro: \u0026Libro, cliente: \u0026Cliente, fecha_devolucion: Fecha) -\u003e bool {\n        if let Some(prestamo) = self.buscar_prestamo(libro, cliente) {\n            if prestamo.estado.equals(\u0026Estado::EnPrestamo) {\n                prestamo.estado = Estado::Devuelto;\n                prestamo.fecha_devolucion = Some(fecha_devolucion);\n                self.incrementar_copias(libro);\n                return true\n            }\n        }\n        false\n    }\n}\n\n#[test]\nfn test_biblioteca_cantidad_copias() {\n    let mut b = Biblioteca::new(\"Biblioteca La Plata\", \"Plaza Dardo Rocha 137\");\n    let l1 = Libro::new(\n        \"978-0-306-40615-7\", \"Harry Potter y la Piedra Filosofal\", \n        \"J. K. Rowling\", 260, Genero::NOVELA\n    );\n    assert_eq!(b.cantidad_copias(\u0026l1), 0);\n    b.incrementar_copias(\u0026l1);\n    assert_eq!(b.cantidad_copias(\u0026l1), 1);\n}\n\n#[test]\nfn test_biblioteca_incrementar_copias() {\n    let mut b = Biblioteca::new(\"Biblioteca La Plata\", \"Plaza Dardo Rocha 137\");\n    let l1 = Libro::new(\n        \"978-8-478-88445-2\" , \"Harry Potter y la Piedra Filosofal\", \n        \"J. K. Rowling\", 260, Genero::NOVELA\n    );\n    let l2 = Libro::new(\n        \"978-8-427-20212-2\", \"Los Juegos del Hambre\", \n        \"Suzanne Collins\", 396, Genero::OTRO\n    );\n    b.incrementar_copias(\u0026l1);\n    assert_eq!(b.cantidad_copias(\u0026l1), 1);\n    b.incrementar_copias(\u0026l1);\n    assert_eq!(b.cantidad_copias(\u0026l1), 2);\n    b.incrementar_copias(\u0026l2);\n    assert_eq!(b.cantidad_copias(\u0026l2), 1);\n}\n\n#[test]\nfn test_biblioteca_decrementar_copias() {\n    let mut b = Biblioteca::new(\"Biblioteca La Plata\", \"Plaza Dardo Rocha 137\");\n    let l1 = Libro::new(\n        \"978-8-478-88445-2\" , \"Harry Potter y la Piedra Filosofal\", \n        \"J. K. Rowling\", 260, Genero::NOVELA\n    );\n    let l2 = Libro::new(\n        \"978-8-427-20212-2\", \"Los Juegos del Hambre\", \n        \"Suzanne Collins\", 396, Genero::OTRO\n    );\n    assert!(!b.decrementar_copias(\u0026l1));\n    assert!(!b.decrementar_copias(\u0026l2));\n\n    b.incrementar_copias(\u0026l1);\n    b.incrementar_copias(\u0026l1);\n\n    b.incrementar_copias(\u0026l2);\n    b.incrementar_copias(\u0026l2);\n    b.incrementar_copias(\u0026l2);\n\n    assert!(b.decrementar_copias(\u0026l1));\n    assert_eq!(b.cantidad_copias(\u0026l1), 1);\n    assert!(b.decrementar_copias(\u0026l1));\n    assert_eq!(b.cantidad_copias(\u0026l1), 0);\n    assert!(!b.decrementar_copias(\u0026l1));\n\n    assert!(b.decrementar_copias(\u0026l2));\n    assert_eq!(b.cantidad_copias(\u0026l2), 2);\n    assert!(b.decrementar_copias(\u0026l2));\n    assert_eq!(b.cantidad_copias(\u0026l2), 1);\n    assert!(b.decrementar_copias(\u0026l2));\n    assert_eq!(b.cantidad_copias(\u0026l2), 0);\n    assert!(!b.decrementar_copias(\u0026l2));\n}\n\n#[test]\nfn test_biblioteca_contar_prestamos() {\n    let mut b = Biblioteca::new(\"Biblioteca La Plata\", \"Plaza Dardo Rocha 137\");\n    let l1 = Libro::new(\n        \"978-8-478-88445-2\" , \"Harry Potter y la Piedra Filosofal\", \n        \"J. K. Rowling\", 260, Genero::NOVELA\n    );\n    let l2 = Libro::new(\n        \"978-8-427-20212-2\", \"Los Juegos del Hambre\", \n        \"Suzanne Collins\", 396, Genero::OTRO\n    );\n    b.incrementar_copias(\u0026l1); b.incrementar_copias(\u0026l1); b.incrementar_copias(\u0026l1);\n    \n\n    let cliente = Cliente::new(\"Pedro\", \"221 123-4567\", \"pedro@gmail.com\");\n    assert_eq!(b.contar_prestamos(\"pedro@gmail.com\"), 0);\n    assert!(b.realizar_prestamo(cliente.clone(), l1.clone(), Fecha::new(16, 6, 2026)));\n    assert_eq!(b.contar_prestamos(\"pedro@gmail.com\"), 1);\n    assert!(b.realizar_prestamo(cliente.clone(), l1.clone(), Fecha::new(16, 6, 2026)));\n    assert_eq!(b.contar_prestamos(\"pedro@gmail.com\"), 2);\n\n    assert_eq!(b.contar_prestamos(\"maria@hotmail.com\"), 0);\n\n    assert!(b.devolver_libro(\u0026l1, \u0026cliente, Fecha::new(19, 5, 2026)));\n    assert_eq!(b.contar_prestamos(cliente.email.as_str()), 1);\n}\n\n#[test]\nfn test_biblioteca_realizar_prestamo() {\n    let mut b = Biblioteca::new(\"Biblioteca La Plata\", \"Plaza Dardo Rocha 137\");\n    let l1 = Libro::new(\n        \"978-8-478-88445-2\" , \"Harry Potter y la Piedra Filosofal\", \n        \"J. K. Rowling\", 260, Genero::NOVELA\n    );\n    let l2 = Libro::new(\n        \"978-8-427-20212-2\", \"Los Juegos del Hambre\", \n        \"Suzanne Collins\", 396, Genero::OTRO\n    );\n    for i in 0..5 { // 5 copias de cada libro\n        b.incrementar_copias(\u0026l1);\n        b.incrementar_copias(\u0026l2);\n    }\n    \n\n    let cliente = Cliente::new(\"Pedro\", \"221 123-4567\", \"pedro@gmail.com\");\n    assert!(!b.realizar_prestamo(cliente.clone(), Libro::new(\"1234\", \"libro\", \"autor\", 1000, Genero::OTRO), Fecha::new(15, 7, 2026))); // libro no existe\n    assert!(b.realizar_prestamo(cliente.clone(), l1.clone(), Fecha::new(16, 6, 2026)));\n    assert!(b.realizar_prestamo(cliente.clone(), l1.clone(), Fecha::new(18, 6, 2026)));\n    assert!(b.realizar_prestamo(cliente.clone(), l2.clone(), Fecha::new(5, 6, 2026)));\n    assert!(b.realizar_prestamo(cliente.clone(), l2.clone(), Fecha::new(24, 5, 2026)));\n    assert!(b.realizar_prestamo(cliente.clone(), l1.clone(), Fecha::new(29, 7, 2026)));\n    assert!(b.realizar_prestamo(cliente.clone(), l2.clone(), Fecha::new(4, 8, 2026)));\n    assert!(!b.realizar_prestamo(cliente.clone(), l2.clone(), Fecha::new(15, 7, 2026))); // mas de 5 prestamos \"en prestamo\" alcanzados\n\n    b.devolver_libro(\u0026l1, \u0026cliente, Fecha::new(19, 5, 2026));\n    assert!(b.realizar_prestamo(cliente.clone(), l1.clone(), Fecha::new(15, 7, 2026))); // mas de 5 prestamos alcanzados pero 5 \"en prestamo\", 1 \"devuelto\"\n}\n\n#[test]\nfn test_biblioteca_prestamos_a_vencer() {\n    let mut b = Biblioteca::new(\"Biblioteca La Plata\", \"Plaza Dardo Rocha 137\");\n    let l1 = Libro::new(\n        \"978-8-478-88445-2\" , \"Harry Potter y la Piedra Filosofal\", \n        \"J. K. Rowling\", 260, Genero::NOVELA\n    );\n    let l2 = Libro::new(\n        \"978-8-427-20212-2\", \"Los Juegos del Hambre\", \n        \"Suzanne Collins\", 396, Genero::OTRO\n    );\n    for i in 0..5 {\n        b.incrementar_copias(\u0026l1);\n        b.incrementar_copias(\u0026l2);\n    }\n    \n    // fecha actual es 17/5/2026 (para testear)\n    assert!(Fecha::fecha_actual().equals_fecha(17, 5, 2026));\n\n    let cliente = Cliente::new(\"Pedro\", \"221 123-4567\", \"pedro@gmail.com\");\n    assert!(b.realizar_prestamo(cliente.clone(), l2.clone(), Fecha::new(24, 5, 2026))); // vence en 8 dias (dia siguiente al 24)\n    assert!(b.realizar_prestamo(cliente.clone(), l2.clone(), Fecha::new( 5, 6, 2026))); // vence en 20 dias\n    assert!(b.realizar_prestamo(cliente.clone(), l1.clone(), Fecha::new(16, 6, 2026))); // vence en 31 dias\n    assert!(b.realizar_prestamo(cliente.clone(), l1.clone(), Fecha::new(18, 6, 2026))); // vence en 33 dias\n    assert!(b.realizar_prestamo(cliente.clone(), l1.clone(), Fecha::new(29, 7, 2026))); // vence en 74 dias\n    assert!(b.realizar_prestamo(cliente.clone(), l2.clone(), Fecha::new( 4, 8, 2026))); // vence en 80 dias\n\n    assert_eq!(b.prestamos_a_vencer(15).len(), 1); // en 15 dias -\u003e 1/6/2026\n    assert_eq!(b.prestamos_a_vencer(30).len(), 2); // en 30 dias -\u003e 16/6/2026\n    assert_eq!(b.prestamos_a_vencer(31).len(), 3); // en 31 dias -\u003e 17/6/2026\n    assert_eq!(b.prestamos_a_vencer(74).len(), 5); // en 60 dias -\u003e 30/7/2026\n    assert_eq!(b.prestamos_a_vencer(100).len(), 6); // en 100 dias -\u003e 25/8/2026\n}\n\n#[test]\nfn test_biblioteca_prestamos_vencidos() {\n    let mut b = Biblioteca::new(\"Biblioteca La Plata\", \"Plaza Dardo Rocha 137\");\n    let l1 = Libro::new(\n        \"978-8-478-88445-2\" , \"Harry Potter y la Piedra Filosofal\", \n        \"J. K. Rowling\", 260, Genero::NOVELA\n    );\n    let l2 = Libro::new(\n        \"978-8-427-20212-2\", \"Los Juegos del Hambre\", \n        \"Suzanne Collins\", 396, Genero::OTRO\n    );\n    for i in 0..5 {\n        b.incrementar_copias(\u0026l1);\n        b.incrementar_copias(\u0026l2);\n    }\n    \n    // fecha actual es 17/5/2026 (para testear)\n    assert!(Fecha::fecha_actual().equals_fecha(17, 5, 2026));\n\n    let cliente = Cliente::new(\"Pedro\", \"221 123-4567\", \"pedro@gmail.com\");\n    assert!(b.realizar_prestamo(cliente.clone(), l2.clone(), Fecha::new(10, 4, 2026))); // vencido\n    assert!(b.realizar_prestamo(cliente.clone(), l2.clone(), Fecha::new(28, 4, 2026))); // vencido \n    assert!(b.realizar_prestamo(cliente.clone(), l1.clone(), Fecha::new(13, 5, 2026))); // vencido\n    assert!(b.realizar_prestamo(cliente.clone(), l1.clone(), Fecha::new(18, 5, 2026))); // no vencido\n    assert!(b.realizar_prestamo(cliente.clone(), l1.clone(), Fecha::new( 5, 6, 2026))); // no vencido\n    assert!(b.realizar_prestamo(cliente.clone(), l2.clone(), Fecha::new(15, 7, 2026))); // no vencido\n\n    assert_eq!(b.prestamos_vencidos().len(), 3);\n}\n\n#[test]\nfn test_biblioteca_buscar_prestamo() {\n    let mut b = Biblioteca::new(\"Biblioteca La Plata\", \"Plaza Dardo Rocha 137\");\n    let l1 = Libro::new(\n        \"978-8-478-88445-2\" , \"Harry Potter y la Piedra Filosofal\", \n        \"J. K. Rowling\", 260, Genero::NOVELA\n    );\n    let l2 = Libro::new(\n        \"978-8-427-20212-2\", \"Los Juegos del Hambre\", \n        \"Suzanne Collins\", 396, Genero::OTRO\n    );\n    for i in 0..5 {\n        b.incrementar_copias(\u0026l1);\n        b.incrementar_copias(\u0026l2);\n    }\n\n    let cliente = Cliente::new(\"Pedro\", \"221 123-4567\", \"pedro@gmail.com\");\n    assert!(b.realizar_prestamo(cliente.clone(), l2.clone(), Fecha::new(10, 6, 2026)));\n    assert!(b.realizar_prestamo(cliente.clone(), l1.clone(), Fecha::new(13, 7, 2026)));\n\n    assert!(b.buscar_prestamo(\u0026l1, \u0026cliente).unwrap().cliente.equals(\u0026cliente));\n    assert!(b.buscar_prestamo(\n        \u0026Libro::new(\n            \"978-8-427-20212-2\", \"Los Juegos del Hambre\", \n            \"Suzanne Collins\", 396, Genero::OTRO\n        ),\n        \u0026Cliente::new(\"Pedro\", \"221 123-4567\", \"pedro@gmail.com\")\n    ).unwrap().estado.equals(\u0026Estado::EnPrestamo));\n\n    assert!(b.devolver_libro(\u0026l1, \u0026cliente, Fecha::new(20, 5, 2026)));\n    assert!(b.buscar_prestamo(\u0026l1, \u0026cliente).unwrap().estado.equals(\u0026Estado::Devuelto));\n\n    assert!(b.buscar_prestamo(\u0026l1, \u0026Cliente::new(\"abc\", \"def\", \"ghi@jkl.mno\")).is_none()); // prestamo que no existe\n    let mut l2 = l1.clone();\n    l2.genero = Genero::INFANTIL;\n    assert!(b.buscar_prestamo(\u0026l2, \u0026cliente).is_none()); // libro de distinto genero\n}\n\n#[test]\nfn test_biblioteca_devolver_libro() {\n    let mut b = Biblioteca::new(\"Biblioteca La Plata\", \"Plaza Dardo Rocha 137\");\n    let l1 = Libro::new(\n        \"978-8-478-88445-2\" , \"Harry Potter y la Piedra Filosofal\", \n        \"J. K. Rowling\", 260, Genero::NOVELA\n    );\n    let l2 = Libro::new(\n        \"978-8-427-20212-2\", \"Los Juegos del Hambre\", \n        \"Suzanne Collins\", 396, Genero::OTRO\n    );\n    for i in 0..5 {\n        b.incrementar_copias(\u0026l1);\n        b.incrementar_copias(\u0026l2);\n    }\n\n    let cliente = Cliente::new(\"Pedro\", \"221 123-4567\", \"pedro@gmail.com\");\n    assert!(b.realizar_prestamo(cliente.clone(), l2.clone(), Fecha::new(10, 6, 2026)));\n    assert!(b.realizar_prestamo(cliente.clone(), l1.clone(), Fecha::new(13, 7, 2026)));\n\n    assert!(b.devolver_libro(\u0026l1, \u0026cliente, Fecha::new(20, 5, 2026)));\n    assert!(!b.devolver_libro(\u0026l1, \u0026cliente, Fecha::new(20, 5, 2026))); // libro ya devuelto, no se puede volver a devolver\n    assert!(b.devolver_libro(\u0026l2, \u0026cliente, Fecha::new(20, 5, 2026)));\n}","traces":[{"line":11,"address":[925052,925008],"length":1,"stats":{"Line":3}},{"line":12,"address":[925023,925059],"length":1,"stats":{"Line":6}},{"line":13,"address":[925118,925144],"length":1,"stats":{"Line":3}},{"line":14,"address":[925137,925151],"length":1,"stats":{"Line":1}},{"line":15,"address":[925125],"length":1,"stats":{"Line":1}},{"line":26,"address":[924896],"length":1,"stats":{"Line":4}},{"line":27,"address":[924911],"length":1,"stats":{"Line":4}},{"line":28,"address":[924975],"length":1,"stats":{"Line":1}},{"line":29,"address":[924987],"length":1,"stats":{"Line":4}},{"line":3    assert_eq!(r.calcular_perimetro(), 10.42);\n\n    let r = Rectangulo::new(1.0, 1.0);\n    assert_eq!(r.calcular_perimetro(), 4.0);\n}\n\n#[test]\nfn test_rectangulo_es_cuadrado() {\n    let r = Rectangulo::new(3.0, 4.0);\n    assert_eq!(r.es_cuadrado(), false);\n\n    let r = Rectangulo::new(1.45, 3.76);\n    assert_eq!(r.es_cuadrado(), false);\n\n    let r = Rectangulo::new(1.0, 1.0);\n    assert_eq!(r.es_cuadrado(), true);\n\n    let r = Rectangulo::new(f64::MAX, f64::MAX);\n    assert_eq!(r.es_cuadrado(), true);\n}","traces":[{"line":8,"address":[716016],"length":1,"stats":{"Line":7}},{"line":9,"address":[716057],"length":1,"stats":{"Line":7}},{"line":10,"address":[716083],"length":1,"stats":{"Line":2}},{"line":12,"address":[716072],"length":1,"stats":{"Line":5}},{"line":13,"address":[716136],"length":1,"stats":{"Line":2}},{"line":18,"address":[715952],"length":1,"stats":{"Line":1}},{"line":19,"address":[715957],"length":1,"stats":{"Line":1}},{"line":22,"address":[715968],"length":1,"stats":{"Line":1}},{"line":23,"address":[715973],"length":1,"stats":{"Line":1}},{"line":26,"address":[715920],"length":1,"stats":{"Line":1}},{"line":27,"address":[715925],"length":1,"stats":{"Line":1}}],"covered":11,"coverable":11},{"path":["/","home","cosk","rust","practicas","src","tp03","ej3.rs"],"content":"#![allow(unused)]\n#[derive(Debug, Clone)] // TODO\npub struct Fecha {\n    pub dia: u32,\n    pub mes: u32,\n    pub anio: u64\n}\n\nimpl Fecha {\n    pub fn new(dia: u32, mes: u32, anio: u64) -\u003e Self {\n        Fecha { dia, mes, anio }\n    }\n\n    fn dias_del_mes(\u0026self) -\u003e [u32; 12] {\n        let febrero: u32 = if self.es_bisiesto() { 29 } else { 28 };\n        [31, febrero, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31]\n    }\n\n    pub fn es_bisiesto(\u0026self) -\u003e bool {\n        self.anio % 4 == 0 \u0026\u0026 (self.anio % 100 != 0 || self.anio % 400 == 0)\n    }\n\n    pub fn es_fecha_valida(\u0026self) -\u003e bool {\n        let dias_por_mes = self.dias_del_mes();\n        self.mes \u003e 0 \u0026\u0026 self.mes \u003c= 12 \u0026\u0026 self.dia \u003e 0 \u0026\u0026 self.dia \u003c= dias_por_mes[(self.mes-1) as usize]\n    }\n\n    pub fn sumar_dias(\u0026mut self, mut dias: u32) {\n        if !self.es_fecha_valida() {\n            panic!(\"Fecha invalida\")\n        }\n\n        while dias \u003e 0 {\n            // calculo en cada iteracion por si el año cambia a uno bisiesto\n            let dias_por_mes = self.dias_del_mes();\n            let dias_mes_actual: u32 = dias_por_mes[(self.mes-1) as usize];\n\n            let restantes = dias_mes_actual - self.dia;\n            if dias \u003c= restantes {\n                self.dia += dias;\n                break;\n            } else {\n                dias -= restantes + 1;\n                self.dia = 1;\n                self.mes += 1;\n                if self.mes \u003e 12 {\n                    self.mes = 1;\n                    self.anio += 1;\n                }\n            }\n        }\n    }\n\n    pub fn restar_dias(\u0026mut self, mut dias: u32) {\n        if !self.es_fecha_valida() {\n            panic!(\"Fecha invalida\")\n        }\n\n        while dias \u003e 0 {\n            if dias \u003c self.dia {\n                self.dia -= dias;\n                break;\n            } else {\n                dias -= self.dia;\n\n                self.mes -= 1;\n                if self.mes == 0 {\n                    self.mes = 12;\n                    self.anio -= 1;\n                }\n\n                let dias_por_mes = self.dias_del_mes();\n                let dias_mes_actual: u32 = dias_por_mes[(self.mes-1) as usize];\n                \n                self.dia = dias_mes_actual;\n            }\n        }\n    }\n\n    pub fn es_mayor(\u0026self, other: \u0026Fecha) -\u003e bool {\n        if !self.es_fecha_valida() || !other.es_fecha_valida() {\n            panic!(\"Fechas invalidas a comparar\")\n        }\n        self.anio \u003e other.anio || \n        (self.anio == other.anio \u0026\u0026 self.mes \u003e other.mes) ||\n        (self.anio == other.anio \u0026\u0026 self.mes == other.mes \u0026\u0026 self.dia \u003e other.dia)\n    }\n\n    pub fn equals_fecha(\u0026self, dia: u32, mes: u32, anio: u64) -\u003e bool {\n        self.dia == dia \u0026\u0026 self.mes == mes \u0026\u0026 self.anio == anio\n    }\n\n    pub fn not_equals_fecha(\u0026self, dia: u32, mes: u32, anio: u64) -\u003e bool {\n        !self.equals_fecha(dia, mes, anio)\n    }\n\n    pub fn equals(\u0026self, other: \u0026Self) -\u003e bool {\n        self.equals_fecha(other.dia, other.mes, other.anio)\n    }\n    pub fn not_equals(\u0026self, other: \u0026Self) -\u003e bool {\n        !self.equals(other)\n    }\n\n    // para usar en el ejercicio 10\n    pub fn fecha_actual() -\u003e Fecha {\n        Fecha::new(17, 5, 2026)\n    }\n}\n\n#[test]\nfn test_fecha_equals() {\n    let f = Fecha::new(2, 6, 2004);\n    assert!(f.equals(\u0026Fecha::new(2, 6, 2004)));\n    assert!(f.equals_fecha(2, 6, 2004));\n    assert!(f.not_equals(\u0026Fecha::new(3, 6, 2004)));\n    assert!(f.not_equals_fecha(3, 6, 2004));\n    assert!(f.not_equals(\u0026Fecha::new(2, 7, 2004)));\n    assert!(f.not_equals_fecha(2, 7, 2004));\n    assert!(f.not_equals(\u0026Fecha::new(2, 6, 2005)));\n    assert!(f.not_equals_fecha(2, 6, 2005));\n}\n\n#[test]\nfn test_fecha_es_valida() {\n    let f = Fecha::new(15, 12, 2026);\n    assert!(f.es_fecha_valida());\n\n    let f = Fecha::new(32, 12, 2026); // dia 32\n    assert!(!f.es_fecha_valida());\n\n    let f = Fecha::new(31, 2, 2026); // 31 de febrero\n    assert!(!f.es_fecha_valida());\n\n    let f = Fecha::new(15, 14, 2026); // mes 14\n    assert!(!f.es_fecha_valida());\n\n    let f = Fecha::new(29, 2, 2026); // 29 de febrero año no bisiesto\n    assert!(!f.es_fecha_valida());\n\n    let f = Fecha::new(29, 2, 2024); // 29 de febrero año bisiesto\n    assert!(f.es_fecha_valida());\n}\n\n#[test]\nfn test_fecha_bisiesto() {\n    let f = Fecha::new(15, 12, 2026);\n    assert!(!f.es_bisiesto());\n\n    let f = Fecha::new(15, 12, 2024);\n    assert!(f.es_bisiesto());\n\n    let f = Fecha::new(15, 12, 2000);\n    assert!(f.es_bisiesto());\n\n    let f = Fecha::new(15, 12, 1600);\n    assert!(f.es_bisiesto());\n\n    let f = Fecha::new(15, 12, 1700);\n    assert!(!f.es_bisiesto());\n}\n\n#[test]\nfn test_fecha_sumar_dias() {\n    let mut f = Fecha::new(15, 12, 2026);\n    f.sumar_dias(4); // suma normal\n    assert!(f.equals_fecha(19, 12, 2026));\n    f.sumar_dias(12); // se queda al borde de cambiar de mes/año\n    assert!(f.equals_fecha(31, 12, 2026));\n    f.sumar_dias(1); // pasa de año\n    assert!(f.equals_fecha(1, 1, 2027));\n    f.sumar_dias(365); // todo un año\n    assert!(f.equals_fecha(1, 1, 2028));\n    f.sumar_dias(60); // como 2028 es bisiesto, queda 1/3/2028 en lugar de 2/3/2028\n    assert!(f.equals_fecha(1, 3, 2028));\n\n    let mut f = Fecha::new(1, 1, 2025);\n    f.sumar_dias(60); // como 2025 no es bisiesto, queda 2/3/2025 en lugar de 1/3/2025\n    assert!(f.equals_fecha(2, 3, 2025));\n}\n\n#[should_panic(expected=\"Fecha invalida\")]\n#[test]\nfn test_fecha_sumar_dias_invalido() {\n    let mut f = Fecha::new(100, 27, 2025);\n    f.sumar_dias(10);\n}\n\n#[test]\nfn test_fecha_restar_dias() {\n    let mut f = Fecha::new(15, 12, 2026);\n    f.restar_dias(6); // resta normal\n    assert!(f.equals_fecha(9, 12, 2026));\n    f.restar_dias(8); // se queda en el primer dia\n    assert!(f.equals_fecha(1, 12, 2026));\n    f.restar_dias(1); // cambia al siguiente mes con la cantidad de dias de ese mes\n    assert!(f.equals_fecha(30, 11, 2026));\n    f.restar_dias(365); // todo un año\n    assert!(f.equals_fecha(30, 11, 2025));\n    f.restar_dias(365*2u32); // dos años donde uno de los años es bisiesto\n    assert!(f.equals_fecha(1, 12, 2023));\n}\n\n#[should_panic(expected=\"Fecha invalida\")]\n#[test]\nfn test_fecha_restar_dias_invalido() {\n    let mut f = Fecha::new(100, 27, 2025);\n    f.restar_dias(10);\n}\n\n#[test]\nfn test_fecha_es_mayor() {\n    let f1 = Fecha::new(16, 12, 2026);\n    let f2 = Fecha::new(15, 12, 2026);\n    assert!(f1.es_mayor(\u0026f2)); // mayor por 1 dia\n\n    let f1 = Fecha::new(10, 12, 2026);\n    let f2 = Fecha::new(15, 12, 2026);\n    assert!(!f1.es_mayor(\u0026f2)); // menor\n\n    let f1 = Fecha::new(15, 12, 2026);\n    let f2 = Fecha::new(15, 11, 2026);\n    assert!(f1.es_mayor(\u0026f2)); // mayor por 1 mes\n\n    let f1 = Fecha::new(15, 12, 2027);\n    let f2 = Fecha::new(15, 12, 2026);\n    assert!(f1.es_mayor(\u0026f2)); // mayor por 1 año\n\n    let f1 = Fecha::new(15, 12, 2026);\n    let f2 = Fecha::new(15, 12, 2026);\n    assert!(!f1.es_mayor(\u0026f2)); // iguales\n}\n\n#[should_panic(expected=\"Fechas invalidas a comparar\")]\n#[test]\nfn test_fecha_es_mayor_self_invalido() {\n    let f1 = Fecha::new(67, 21, 2026);\n    let f2 = Fecha::new(15, 12, 2026);\n    f1.es_mayor(\u0026f2);\n}\n\n#[should_panic(expected=\"Fechas invalidas a comparar\")]\n#[test]\nfn test_fecha_es_mayor_other_invalido() {\n    let f1 = Fecha::new(15, 12, 2026);\n    let f2 = Fecha::new(1, 69, 2026);\n    f1.es_mayor(\u0026f2);\n}","traces":[{"line":10,"address":[795552],"length":1,"stats":{"Line":1}},{"line":14,"address":[795008],"length":1,"stats":{"Line":1}},{"line":15,"address":[795038],"length":1,"stats":{"Line":1}},{"line":16,"address":[795075],"length":1,"stats":{"Line":1}},{"line":19,"address":[794448],"length":1,"stats":{"Line":1}},{"line":20,"address":[794458,794516],"length":1,"stats":{"Line":2}},{"line":23,"address":[795312],"length":1,"stats":{"Line":1}},{"line":24,"address":[795329],"length":1,"stats":{"Line":1}},{"line":25,"address":[795425,795344],"length":1,"stats":{"Line":2}},{"line":28,"address":[793936],"length":1,"stats":{"Line":1}},{"line":29,"address":[793957],"length":1,"stats":{"Line":1}},{"line":30,"address":[793966],"length":1,"stats":{"Line":1}},{"line":33,"address":[794002],"length":1,"stats":{"Line":1}},{ (\n        (vals[0], vals[1], vals[2])\n    }\n\n    pub fn determinar_tipo(\u0026self) -\u003e TipoTriangulo {\n        if self.a == self.b \u0026\u0026 self.b == self.c {\n            TipoTriangulo::EQUILATERO\n        } else if (self.a == self.b) || (self.a == self.c) || (self.b == self.c) {\n            TipoTriangulo::ISOSCELES\n        } else {\n            TipoTriangulo::ESCALENO\n        }\n    }\n\n    pub fn calcular_area(\u0026self) -\u003e f64 {\n        let s = (self.a+self.b+self.c)/2.0;\n        (s*(s-self.a)*(s-self.b)*(s-self.c)).sqrt()\n    }\n\n    pub fn calcular_perimetro(\u0026self) -\u003e f64 {\n        self.a + self.b + self.c\n    }\n}\n\n#[should_panic(expected=\"Lados del triangulo deben ser mayor a 0\")]\n#[test]\nfn test_triangulo_creacion_negativo_a() {\n    Triangulo::new(-1.0, 0.1, 0.0);\n}\n#[should_panic(expected=\"Lados del triangulo deben ser mayor a 0\")]\n#[test]\nfn test_triangulo_creacion_negativo_b() {\n    Triangulo::new(0.5, 0.0, 0.3);\n}\n#[should_panic(expected=\"Lados del triangulo deben ser mayor a 0\")]\n#[test]\nfn test_triangulo_creacion_negativo_c() {\n    Triangulo::new(0.1, 0.2, -0.1);\n}\n#[should_panic(expected=\"Lado mayor debe ser menor que la suma de los 2 menores\")]\n#[test]\nfn test_triangulo_creacion_invalida() {\n    Triangulo::new(1.0, 2.0, 1.0);\n}\n\n\n#[test]\nfn test_triangulo_tipo() {\n    let tipo = Triangulo::new(1.0, 1.0, 1.0).determinar_tipo();\n    assert!(tipo.equals(\u0026TipoTriangulo::EQUILATERO));\n    assert!(!tipo.equals(\u0026TipoTriangulo::ISOSCELES));\n    assert!(!tipo.equals(\u0026TipoTriangulo::ESCALENO));\n\n    let tipo = Triangulo::new(2.0, 2.0, 1.0).determinar_tipo();\n    assert!(tipo.equals(\u0026TipoTriangulo::ISOSCELES));\n    assert!(!tipo.equals(\u0026TipoTriangulo::EQUILATERO));\n    assert!(!tipo.equals(\u0026TipoTriangulo::ESCALENO));\n\n    let tipo = Triangulo::new(1.0, 2.0, 2.0).determinar_tipo();\n    assert!(tipo.equals(\u0026TipoTriangulo::ISOSCELES));\n    assert!(!tipo.equals(\u0026TipoTriangulo::EQUILATERO));\n    assert!(!tipo.equals(\u0026TipoTriangulo::ESCALENO));\n\n    let tipo = Triangulo::new(2.0, 1.0, 2.0).determinar_tipo();\n    assert!(tipo.equals(\u0026TipoTriangulo::ISOSCELES));\n    assert!(!tipo.equals(\u0026TipoTriangulo::EQUILATERO));\n    assert!(!tipo.equals(\u0026TipoTriangulo::ESCALENO));\n\n    let tipo = Triangulo::new(1.4, 2.5, 3.6).determinar_tipo();\n    assert!(tipo.equals(\u0026TipoTriangulo::ESCALENO));\n    assert!(!tipo.equals(\u0026TipoTriangulo::EQUILATERO));\n    assert!(!tipo.equals(\u0026TipoTriangulo::ISOSCELES));\n}\n\n#[test]\nfn test_triangulo_area() {\n    let t = Triangulo::new(1.0, 1.0, 1.0);\n    assert_eq!(t.calcular_area(), 0.1875_f64.sqrt());\n\n    let t = Triangulo::new(2.0, 3.0, 4.0);\n    assert_eq!(t.calcular_area(), (4.5*(4.5-2.0)*(4.5-3.0)*(4.5-4.0) as f64).sqrt());\n\n    let t = Triangulo::new(1.5, 2.0, 1.0);\n    assert_eq!(t.calcular_area(), (2.25*(2.25-1.5)*(2.25-2.0)*(2.25-1.0) as f64).sqrt());\n}\n\n#[test]\nfn test_triangulo_perimetro() {\n    let t = Triangulo::new(1.0, 1.0, 1.0);\n    assert_eq!(t.calcular_perimetro(), 3.0);\n\n    let t = Triangulo::new(2.0, 3.0, 4.0);\n    assert_eq!(t.calcular_perimetro(), 9.0);\n\n    let t = Triangulo::new(1.5, 2.0, 1.0);\n    assert_eq!(t.calcular_perimetro(), 4.5);\n}","traces":[{"line":7,"address":[764637,764592],"length":1,"stats":{"Line":1}},{"line":8,"address":[764607,764644],"length":1,"stats":{"Line":2}},{"line":9,"address":[764687],"length":1,"stats":{"Line":1}},{"line":10,"address":[764706],"length":1,"stats":{"Line":1}},{"line":11,"address":[764713],"length":1,"stats":{"Line":1}},{"line":12,"address":[764694],"length":1,"stats":{"Line":1}},{"line":24,"address":[767104],"length":1,"stats":{"Line":2}},{"line":25,"address":[767229,767163],"length":1,"stats":{"Line":4}},{"line":26,"address":[767187],"length":1,"stats":{"Line":3}},{"line":28,"address":[767256],"length":1,"stats":{"Line":2}},{"line":29,"address":[7  * porcentaje / 100.0\n    }\n\n    pub fn calcular_precio_total(\u0026self, porcentaje_impuestos: Option\u003cf64\u003e, porcentaje_descuento: Option\u003cf64\u003e) -\u003e f64 {\n        let mut precio_total = self.precio_bruto;\n        if let Some(pimp) = porcentaje_impuestos {\n            precio_total += self.calcular_impuestos(pimp);\n        }\n        if let Some(pdesc) = porcentaje_descuento {\n            precio_total -= self.aplicar_descuento(pdesc);\n        }\n        precio_total\n    }\n}\n\n\n#[should_panic(expected=\"El precio no puede ser negativo\")]\n#[test]\nfn test_producto_creacion_invalido() {\n    Producto::new(\"invalido\", -1.0, 1);\n}\n\n#[test]\nfn test_producto_impuestos() {\n    let p = Producto::new(\"coca cola\", 2500.0, 1);\n    assert_eq!(p.calcular_impuestos(21.0), 525.0);\n\n    let p = Producto::new(\"pepsi\", 2000.0, 2);\n    assert_eq!(p.calcular_impuestos(0.0), 0.0);\n\n    let p = Producto::new(\"cunnington\", 1800.0, 3);\n    assert_eq!(p.calcular_impuestos(100.0), 1800.0);\n}\n\n#[should_panic(expected=\"El porcentaje debe ser positivo\")]\n#[test]\nfn test_producto_impuestos_negativo() {\n    let p = Producto::new(\"coca cola\", 2500.0, 1);\n    p.calcular_impuestos(-21.0);\n}\n\n#[test]\nfn test_producto_descuento() {\n    let p = Producto::new(\"coca cola\", 2500.0, 1);\n    assert_eq!(p.aplicar_descuento(10.0), 250.0);\n\n    let p = Producto::new(\"pepsi\", 2000.0, 2);\n    assert_eq!(p.aplicar_descuento(0.0), 0.0);\n\n    let p = Producto::new(\"cunnington\", 1800.0, 3);\n    assert_eq!(p.aplicar_descuento(100.0), 1800.0);\n}\n\n#[should_panic(expected=\"El porcentaje debe ser positivo\")]\n#[test]\nfn test_producto_descuento_negativo() {\n    let p = Producto::new(\"coca cola\", 2500.0, 1);\n    p.aplicar_descuento(-21.0);\n}\n#[should_panic(expected=\"El porcentaje debe ser menor o igual a 100\")]\n#[test]\nfn test_producto_descuento_mayor_100() {\n    let p = Producto::new(\"coca cola\", 2500.0, 1);\n    p.aplic  marca: marca.to_string(), modelo: modelo.to_string(), anio, precio_bruto, color }\n    }\n\n    pub fn calcular_precio(\u0026self) -\u003e f64 {\n        let mut precio_final = self.precio_bruto;\n        if self.color.es_primario() {\n            precio_final += precio_final * 0.25;\n        } else {\n            precio_final -= precio_final * 0.1;\n        }\n\n        if self.marca.to_lowercase() == \"bmw\" {\n            precio_final += precio_final * 0.15;\n        }\n\n        if self.anio \u003c 2000 {\n            precio_final -= precio_final * 0.05;\n        }\n\n        precio_final\n    }\n\n    pub fn equals(\u0026self, other: \u0026Self) -\u003e bool {\n        self.marca == other.marca \u0026\u0026 self.modelo == other.modelo \u0026\u0026 self.anio == other.anio \u0026\u0026\n        self.precio_bruto == other.precio_bruto \u0026\u0026 self.color.equals(\u0026other.color)\n    }\n}\n\npub struct ConcesionarioAuto {\n    pub nombre: String,\n    pub direccion: String,\n    autos: Vec\u003cAuto\u003e,\n    capacidad: usize\n}\n\nimpl ConcesionarioAuto {\n    pub fn new(nombre: \u0026str, direccion: \u0026str, autos: Vec\u003cAuto\u003e, capacidad: usize) -\u003e Self {\n        ConcesionarioAuto { nombre: nombre.to_string(), direccion: direccion.to_string(), autos, capacidad }\n    }\n\n    pub fn agregar_auto(\u0026mut self, auto: Auto) -\u003e bool {\n        if self.autos.len() \u003c self.capacidad  {\n            self.autos.push(auto);\n            true\n        } else {\n            false\n        }\n    }\n\n    pub fn buscar_auto(\u0026self, auto: \u0026Auto) -\u003e Option\u003c\u0026Auto\u003e {\n        for au in \u0026self.autos {\n            if au.equals(auto) {\n                return Some(au);\n            }\n        }\n        None\n    }\n\n    fn buscar_indice_auto(\u0026self, auto: \u0026Auto) -\u003e usize {\n        let mut i = 0;\n        for a in \u0026self.autos {\n            if a.equals(auto) {\n                return i\n            }\n            i += 1;\n        }\n        i // se asume que existe\n    }\n    \n    pub fn eliminar_auto(\u0026mut self, auto: \u0026Auto) -\u003e bool {\n        if let Some(auto_borrar) = self.buscar_auto(auto) {\n            self.autos.swap_remove(self.buscar_indice_auto(auto_borrar));\n            true\n        } else {\n            false\n        }\n    }\n}\n\n#[test]\nfn test_color_es_primario() {\n    assert!(Color::ROJO.es_primario());\n    assert!(!Color::NEGRO.es_primario());\n}\n\n#[test]\nfn test_auto_calcular_precio() {\n    let a = Auto::new(\"Peugeot\", \"208\", 2006, 10_000_000.0, Color::BLANCO);\n    assert_eq!(a.calcular_precio(), 9_000_000.0);\n\n    let a = Auto::new(\"Peugeot\", \"206\", 1999, 5_000_000.0, Color::AZUL);\n    assert_eq!(a.calcular_precio(), 5_937_500.0);\n\n    let a = Auto::new(\"BMW\", \"Serie 1\", 2012, 75_000_000.0, Color::ROJO);\n    assert_eq!(a.calcular_precio(), 107_812_500.0);\n}\n\n#[test]\nfn test_concesionario_agregar_auto() {\n    let mut c = ConcesionarioAuto::new(\"Concesionario Peugeot\", \"4 y 50\", vec![], 3);\n    assert!(c.agregar_auto(Auto::new(\"Peugeot\", \"208\", 2006, 10_000_000.0, Color::BLANCO)));\n    assert!(c.agregar_auto(Auto::new(\"Peugeot\", \"206\", 1999, 5_000_000.0, Color::ROJO)));\n    assert!(c.agregar_auto(Auto::new(\"Peugeot\", \"301\", 2010, 19_000_000.0, Color::AZUL)));\n    assert!(!c.agregar_auto(Auto::new(\"Peugeot\", \"306\", 2015, 30_000_000.0, Color::NEGRO))); // max capacidad alcanzada\n}\n\n#[test]\nfn test_concesionario_eliminar_auto() {\n    let mut c = ConcesionarioAuto::new(\"Concesionario Peugeot\", \"4 y 50\", \n    vec![\n            Auto::new(\"Peugeot\", \"208\", 2006, 10_000_000.0, Color::BLANCO),\n            Auto::new(\"Peugeot\", \"206\", 1999, 5_000_000.0, Color::ROJO),\n            Auto::new(\"Peugeot\", \"301\", 2010, 19_000_000.0, Color::AZUL),\n            Auto::new(\"Peugeot\", \"306\", 2015, 30_000_000.0, Color::NEGRO)\n        ], 5);\n    assert!(c.eliminar_auto(\u0026Auto::new(\"Peugeot\", \"208\", 2006, 10_000_000.0, Color::BLANCO)));\n    assert!(!c.eliminar_auto(\u0026Auto::new(\"Peugeot\", \"206\", 1999, 5_000_000.0, Color::AZUL))); // todo igual menos el color\n    assert!(!c.eliminar_auto(\u0026Auto::new(\"BMW\", \"Serie 1\", 2012, 75_000_000.0, Color::AMARILLO))) // todo distinto\n}\n\n#[test]\nfn test_concesionario_buscar_auto() {\n    let c = ConcesionarioAuto::new(\"Concesionario Peugeot\", \"4 y 50\", \n    vec![\n            Auto::new(\"Peugeot\", \"208\", 2006, 10_000_000.0, Color::BLANCO),\n            Auto::new(\"Peugeot\", \"206\", 1999, 5_000_000.0, Color::ROJO),\n            Auto::new(\"Peugeot\", \"301\", 2010, 19_000_000.0, Color::AZUL),\n            Auto::new(\"Peugeot\", \"306\", 2015, 30_000_000.0, Color::NEGRO)\n        ], 5);\n    assert!(c.buscar_auto(\u0026Auto::new(\"Peugeot\", \"208\", 2006, 10_000_000.0, Color::BLANCO)).is_some());\n    assert!(c.buscar_auto(\u0026Auto::new(\"Peugeot\", \"206\", 1999, 5_000_000.0, Color::AZUL)).is_none()); // todo igual menos el color\n    assert!(c.buscar_auto(\u0026Auto::new(\"BMW\", \"Serie 1\", 2012, 75_000_000.0, Color::AMARILLO)).is_none()) // todo distinto\n}\n\n","traces":[{"line":9,"address":[641776],"length":1,"stats":{"Line":1}},{"line":10,"address":[641789],"length":1,"stats":{"Line":1}},{"line":13,"address":[641916,641872],"length":1,"stats":{"Line":1}},{"line":14,"address":[641923,641887],"length":1,"stats":{"Line":2}},{"line":15,"address":[642014,642047],"length":1,"stats":{"Line":1}},{"line":16,"address":[642054,642033],"length":1,"stats":{"Line":2}},{"line":17,"address":[642040,642061],"length":1,"stats":{"Line":1}},{"line":18,"address":[642021],"length":1,"stats":{"Line":1}},{"line":33,"address":[641344,641595,641601],"length":1,"stats":{"Line":2}},{"line":34,"address":[641437],"length":1,"stats":{"Line":1}},{"line":37,"address":[641024,641322,641328],"length":1,"stats":{"Line":1}},{"line":38,"address":[641038],"length":1,"stats"
